<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KCHΛT | Ultra Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        body { background-color: #050507; color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .post-card { background: #111118; border: 1px solid rgba(255,255,255,0.05); border-radius: 2.5rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .gender-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: 0.3s; }
        .gender-btn.active { border-color: #a855f7; background: rgba(168, 85, 247, 0.2); box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Persistência de Dados
        const DB = {
            get: (key, def) => JSON.parse(localStorage.getItem(key)) || def,
            save: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
            session: (val) => val ? sessionStorage.setItem('user', JSON.stringify(val)) : JSON.parse(sessionStorage.getItem('user'))
        };

        function App() {
            const [user, setUser] = useState(DB.session());
            const [dbUsers, setDbUsers] = useState(DB.get('users', []));
            const [posts, setPosts] = useState(DB.get('posts', []));
            const [messages, setMessages] = useState(DB.get('messages', []));
            const [view, setView] = useState('feed');
            const [targetUser, setTargetUser] = useState(null);
            const [search, setSearch] = useState('');

            // Sincronização em tempo real entre estados
            useEffect(() => {
                DB.save('users', dbUsers);
                DB.save('posts', posts);
                DB.save('messages', messages);
                if(user) {
                    const me = dbUsers.find(u => u.id === user.id);
                    if(me) DB.session(me);
                }
            }, [dbUsers, posts, messages]);

            // Funções de Autenticação
            const login = (name, pass) => {
                const found = dbUsers.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
                if (found) { setUser(found); DB.session(found); }
                else alert("Dados incorretos!");
            };

            const register = (data) => {
                if(dbUsers.find(u => u.name === data.name)) return alert("Nome já existe!");
                const newUser = { ...data, id: crypto.randomUUID(), posts: [], bio: '', followers: [] };
                setDbUsers([...dbUsers, newUser]);
                setUser(newUser);
                DB.session(newUser);
            };

            const openProfile = (u) => {
                setTargetUser(u);
                setView(u.id === user.id ? 'profile' : 'other_profile');
            };

            if (!user) return <Auth onLogin={login} onRegister={register} />;

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto bg-[#050507] relative shadow-2xl">
                    {/* Header */}
                    <header className="h-16 flex items-center justify-between px-6 sticky top-0 glass z-50">
                        <h1 className="text-2xl font-black italic text-purple-500 tracking-tighter" onClick={() => setView('feed')}>KCHΛT</h1>
                        <div className="flex gap-4">
                            <i className="bi bi-bell text-xl text-slate-400"></i>
                            <i className="bi bi-chat-dots text-xl text-slate-400" onClick={() => setView('chats')}></i>
                        </div>
                    </header>

                    {/* Conteúdo Principal */}
                    <main className="flex-1 overflow-y-auto pb-24 hide-scrollbar">
                        {view === 'feed' && <Feed posts={posts} onUserClick={openProfile} />}
                        
                        {view === 'search' && (
                            <div className="p-6 fade-in">
                                <input className="w-full bg-[#111118] p-4 rounded-2xl outline-none border border-white/5 mb-6" 
                                    placeholder="Buscar no KChat..." value={search} onChange={e => setSearch(e.target.value)} />
                                {dbUsers.filter(u => u.name.includes(search) && u.id !== user.id).map(u => (
                                    <div key={u.id} onClick={() => openProfile(u)} className="flex items-center gap-4 p-4 mb-2 bg-[#111118] rounded-2xl">
                                        <img src={u.avatar} className="w-12 h-12 rounded-full border border-purple-500/30" />
                                        <div className="flex-1 font-bold">@{u.name}</div>
                                        <i className="bi bi-arrow-right text-slate-600"></i>
                                    </div>
                                ))}
                            </div>
                        )}

                        {(view === 'profile' || view === 'other_profile') && (
                            <Profile 
                                profile={view === 'profile' ? dbUsers.find(u => u.id === user.id) : targetUser} 
                                isMe={view === 'profile'} 
                                posts={posts}
                                onUpdate={(data) => setDbUsers(dbUsers.map(u => u.id === user.id ? {...u, ...data} : u))}
                                onLogout={() => { sessionStorage.clear(); window.location.reload(); }}
                                onMessage={(u) => { setTargetUser(u); setView('room'); }}
                            />
                        )}

                        {view === 'chats' && <ChatList users={dbUsers} me={user} messages={messages} onSelect={(u) => { setTargetUser(u); setView('room'); }} />}
                        
                        {view === 'room' && <ChatRoom partner={targetUser} me={user} messages={messages} setMessages={setMessages} onBack={() => setView('chats')} />}

                        {view === 'create' && <CreatePost user={user} onDone={(p) => { setPosts([p, ...posts]); setView('feed'); }} />}
                    </main>

                    {/* Navbar */}
                    <nav className="fixed bottom-0 left-0 right-0 h-20 glass flex items-center justify-around z-50 max-w-md mx-auto rounded-t-[2.5rem]">
                        <i className={`bi bi-house-door${view==='feed'?'-fill text-purple-500':' text-slate-600'} text-2xl`} onClick={()=>setView('feed')}></i>
                        <i className={`bi bi-search${view==='search'?'-fill text-purple-500':' text-slate-600'} text-2xl`} onClick={()=>setView('search')}></i>
                        <div className="w-12 h-12 bg-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-500/40" onClick={()=>setView('create')}>
                            <i className="bi bi-plus-lg text-white text-xl"></i>
                        </div>
                        <i className={`bi bi-person${view==='profile'?'-fill text-purple-500':' text-slate-600'} text-2xl`} onClick={()=>setView('profile')}></i>
                    </nav>
                </div>
            );
        }

        // --- COMPONENTES ---

        function Auth({ onLogin, onRegister }) {
            const [isReg, setIsReg] = useState(false);
            const [form, setForm] = useState({ name: '', pass: '', gender: 'N/B', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix' });
            
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#050507]">
                    <div className="w-full max-w-sm bg-[#111118] p-10 rounded-[3rem] text-center fade-in">
                        <h2 className="text-4xl font-black italic text-purple-600 mb-8 tracking-tighter">KCHΛT</h2>
                        <div className="space-y-4">
                            <input className="w-full bg-white/5 p-4 rounded-2xl outline-none" placeholder="Nome de usuário" onChange={e => setForm({...form, name: e.target.value})} />
                            <input className="w-full bg-white/5 p-4 rounded-2xl outline-none" type="password" placeholder="Senha" onChange={e => setForm({...form, pass: e.target.value})} />
                            
                            {isReg && (
                                <div className="flex justify-center gap-4 py-4">
                                    {['gender-male', 'gender-female', 'gender-ambiguous'].map((icon, i) => (
                                        <button key={i} className={`gender-btn ${form.gender === icon ? 'active' : 'bg-white/5'}`} onClick={() => setForm({...form, gender: icon})}>
                                            <i className={`bi bi-${icon} text-xl`}></i>
                                        </button>
                                    ))}
                                </div>
                            )}

                            <button className="w-full py-4 bg-purple-600 rounded-2xl font-bold uppercase tracking-widest mt-4" 
                                onClick={() => isReg ? onRegister(form) : onLogin(form.name, form.pass)}>
                                {isReg ? 'Criar Conta' : 'Entrar'}
                            </button>
                            <p className="text-slate-500 text-xs mt-4" onClick={() => setIsReg(!isReg)}>
                                {isReg ? 'Voltar para Login' : 'Não tem conta? Cadastre-se'}
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        function Feed({ posts, onUserClick }) {
            return (
                <div className="p-4 space-y-6 fade-in">
                    {posts.length === 0 ? (
                        <div className="text-center py-20 text-slate-600">Nenhuma postagem ainda...</div>
                    ) : (
                        posts.map(p => (
                            <article key={p.id} className="post-card overflow-hidden">
                                <div className="p-4 flex items-center gap-3" onClick={() => onUserClick({name: p.user, avatar: p.avatar, id: p.userId})}>
                                    <img src={p.avatar} className="w-9 h-9 rounded-full border border-purple-500/20" />
                                    <span className="font-bold text-sm tracking-tight">@{p.user}</span>
                                </div>
                                <img src={p.img} className="w-full aspect-square object-cover" loading="lazy" />
                                <div className="p-5">
                                    <div className="flex gap-4 mb-3">
                                        <i className="bi bi-heart text-xl text-purple-500"></i>
                                        <i className="bi bi-chat text-xl text-slate-300"></i>
                                    </div>
                                    <p className="text-sm text-slate-300 font-medium">{p.text}</p>
                                </div>
                            </article>
                        ))
                    )}
                </div>
            );
        }

        function Profile({ profile, isMe, posts, onUpdate, onLogout, onMessage }) {
            const [editing, setEditing] = useState(false);
            const [bio, setBio] = useState(profile?.bio || '');
            const myPosts = posts.filter(p => p.user === profile?.name);

            return (
                <div className="fade-in">
                    <div className="p-8 flex flex-col items-center relative">
                        {isMe && (
                            <i className={`bi bi-${editing?'check2':'pencil'} absolute top-6 right-6 text-xl bg-purple-600/20 p-3 rounded-full text-purple-500`} 
                                onClick={() => { if(editing) onUpdate({bio}); setEditing(!editing); }}></i>
                        )}
                        <img src={profile?.avatar} className="w-28 h-28 rounded-full border-4 border-purple-600 p-1 mb-4 shadow-2xl shadow-purple-500/20" />
                        <h3 className="text-xl font-black uppercase italic tracking-tighter">@{profile?.name}</h3>
                        
                        {editing ? (
                            <textarea className="w-full bg-white/5 rounded-2xl p-4 mt-4 text-sm text-center outline-none border border-purple-500" 
                                value={bio} onChange={e => setBio(e.target.value)} placeholder="Sua nova biografia..." />
                        ) : (
                            <p className="text-slate-400 text-sm mt-3 text-center px-6">"{profile?.bio || 'Membro oficial do KChat'}"</p>
                        )}

                        <div className="flex gap-3 mt-8 w-full px-4">
                            {!isMe ? (
                                <>
                                    <button className="flex-1 py-4 bg-purple-600 rounded-2xl font-bold text-xs uppercase" onClick={() => onMessage(profile)}>Mensagem</button>
                                    <button className="flex-1 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold text-xs uppercase">Seguir</button>
                                </>
                            ) : (
                                <button onClick={onLogout} className="w-full py-4 border border-red-500/30 text-red-500 rounded-2xl font-bold text-xs uppercase">Sair da Conta</button>
                            )}
                        </div>
                    </div>
                    <div className="grid grid-cols-3 gap-1 px-1">
                        {myPosts.map(p => <img key={p.id} src={p.img} className="aspect-square object-cover rounded-lg" />)}
                    </div>
                </div>
            );
        }

        function ChatList({ users, me, messages, onSelect }) {
            const contacts = users.filter(u => u.id !== me.id);
            return (
                <div className="p-6 fade-in space-y-4">
                    <h2 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Mensagens Diretas</h2>
                    {contacts.map(u => {
                        const last = [...messages].reverse().find(m => (m.from === me.id && m.to === u.id) || (m.from === u.id && m.to === me.id));
                        return (
                            <div key={u.id} onClick={() => onSelect(u)} className="flex items-center gap-4 p-4 bg-[#111118] rounded-[2rem] border border-white/5">
                                <img src={u.avatar} className="w-12 h-12 rounded-full border border-purple-500/20" />
                                <div className="flex-1">
                                    <p className="font-bold text-sm">@{u.name}</p>
                                    <p className="text-xs text-slate-500 truncate">{last ? last.text : 'Diga oi para ' + u.name + '!'}</p>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function ChatRoom({ partner, me, messages, setMessages, onBack }) {
            const [text, setText] = useState('');
            const chatLog = messages.filter(m => (m.from === me.id && m.to === partner.id) || (m.from === partner.id && m.to === me.id));

            const send = () => {
                if(!text.trim()) return;
                const m = { id: Date.now(), from: me.id, to: partner.id, text, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                setMessages([...messages, m]);
                setText('');
            };

            return (
                <div className="flex flex-col h-[calc(100vh-64px)] fixed inset-0 z-[60] bg-[#050507] max-w-md mx-auto">
                    <div className="p-4 flex items-center gap-4 glass">
                        <i className="bi bi-arrow-left text-xl" onClick={onBack}></i>
                        <img src={partner.avatar} className="w-9 h-9 rounded-full" />
                        <span className="font-bold">@{partner.name}</span>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-4 hide-scrollbar">
                        {chatLog.map(m => (
                            <div key={m.id} className={`flex ${m.from === me.id ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[75%] p-4 rounded-[1.8rem] text-sm ${m.from === me.id ? 'bg-purple-600 text-white rounded-tr-none' : 'bg-[#111118] text-slate-200 rounded-tl-none'}`}>
                                    {m.text}
                                    <p className="text-[9px] opacity-40 mt-1 text-right">{m.time}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-6 flex gap-3 bg-[#050507]">
                        <input className="flex-1 bg-[#111118] p-4 rounded-2xl outline-none" placeholder="Mensagem..." value={text} onChange={e => setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} />
                        <button onClick={send} className="bg-purple-600 w-14 h-14 rounded-2xl flex items-center justify-center"><i className="bi bi-send-fill"></i></button>
                    </div>
                </div>
            );
        }

        function CreatePost({ user, onDone }) {
            const [img, setImg] = useState(null);
            const [text, setText] = useState('');
            const handleFile = (e) => {
                const reader = new FileReader();
                reader.onload = () => setImg(reader.result);
                reader.readAsDataURL(e.target.files[0]);
            };
            return (
                <div className="p-8 space-y-6 fade-in">
                    <label className="block aspect-square bg-[#111118] border-2 border-dashed border-white/10 rounded-[3rem] overflow-hidden flex items-center justify-center cursor-pointer relative">
                        {img ? <img src={img} className="w-full h-full object-cover" /> : <div className="text-center"><i className="bi bi-camera text-4xl text-purple-600 block mb-2"></i><span className="text-xs text-slate-500 uppercase font-black">Escolha uma foto</span></div>}
                        <input type="file" className="hidden" accept="image/*" onChange={handleFile} />
                    </label>
                    <textarea className="w-full bg-transparent border-b border-white/10 p-4 outline-none text-white h-24" placeholder="Legenda..." onChange={e => setText(e.target.value)} />
                    <button onClick={() => img && onDone({id: Date.now(), userId: user.id, user: user.name, avatar: user.avatar, img, text})} 
                        className="w-full py-5 bg-purple-600 rounded-[2rem] font-black uppercase tracking-widest shadow-lg shadow-purple-500/30">Publicar</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
