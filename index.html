<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K. Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        /* Mantendo o seu estilo original das fotos */
        :root { --primary: #8a2be2; --bg: #000; --card: #111; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: flex; }
        .auth-container { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        input { background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; color: #fff; width: 100%; margin-bottom: 10px; outline: none; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 25px; width: 100%; font-weight: bold; cursor: pointer; }
        .pfp-preview { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 20px; }
        .nav { position: fixed; bottom: 15px; width: 90%; left: 5%; height: 70px; background: rgba(15,15,15,0.9); border-radius: 35px; border: 1px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .plus { background: linear-gradient(45deg, #c026d3, #db2777); width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-top: -15px; color: white; }
    </style>
</head>
<body>

    <div id="scr-auth" class="screen active">
        <div class="auth-container">
            <h1 style="color:var(--primary); font-size: 3rem; margin-bottom: 20px;">K.</h1>
            <input type="text" id="u" placeholder="Nome de usuário">
            <input type="password" id="p" placeholder="Senha">
            <button class="btn-main" onclick="handleAuth()">Entrar / Registrar</button>
        </div>
    </div>

    <div id="scr-setup" class="screen">
        <div class="auth-container">
            <h2>Complete seu Perfil</h2>
            <img src="https://via.placeholder.com/120" id="pfp-img" class="pfp-preview">
            <input type="file" id="pfp-input" accept="image/*">
            <input type="number" id="age" placeholder="Idade">
            <div style="margin: 20px 0;">
                <input type="radio" name="g" value="m"> ♂️
                <input type="radio" name="g" value="f"> ♀️
                <input type="radio" name="g" value="o"> ⚧️
            </div>
            <button class="btn-main" id="btn-save" onclick="saveProfile()">Criar Conta</button>
        </div>
    </div>

    <div id="scr-feed" class="screen">
        <div style="padding: 20px;">
            <h1 style="color:var(--primary)">K.</h1>
            <h2>Global Feed</h2>
            <div id="post-list" style="margin-top:20px"></div>
        </div>
        <nav class="nav">
            <i class="fa fa-compass" onclick="show('scr-feed')"></i>
            <div class="plus" onclick="openPost()"><i class="fa fa-plus"></i></div>
            <i class="fa fa-user" onclick="logout()"></i> </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPlWGrAgR6wvMilamQ1Z83nAhXJAaRHD0",
            authDomain: "kchat-1debf.firebaseapp.com",
            projectId: "kchat-1debf",
            storageBucket: "kchat-1debf.firebasestorage.app",
            appId: "1:622333653477:web:dab185145cfa4b18983f0c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let curUser = null;

        // VERIFICA SE JÁ EXISTE LOGIN SALVO AO ABRIR
        window.onload = () => {
            const savedUser = localStorage.getItem('k_user');
            if(savedUser) {
                curUser = JSON.parse(savedUser);
                show('scr-feed');
            }
        };

        window.handleAuth = async () => {
            const name = document.getElementById('u').value.trim();
            const pass = document.getElementById('p').value;
            if(!name) return alert("Digite um nome!");
            
            const ref = doc(db, "users", name);
            const snap = await getDoc(ref);

            if(snap.exists()) {
                if(snap.data().pass === pass) { 
                    curUser = snap.data(); 
                    loginDone();
                } else alert("Senha errada!");
            } else {
                curUser = { name, pass };
                show('scr-setup');
            }
        };

        window.saveProfile = async () => {
            const btn = document.getElementById('btn-save');
            btn.innerText = "Processando...";
            curUser.age = document.getElementById('age').value;
            curUser.gender = document.querySelector('input[name="g"]:checked')?.value || 'o';
            
            await setDoc(doc(db, "users", curUser.name), curUser);
            loginDone();
        };

        function loginDone() {
            localStorage.setItem('k_user', JSON.stringify(curUser));
            show('scr-feed');
        }

        window.logout = () => {
            localStorage.removeItem('k_user');
            location.reload();
        };

        window.show = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>
</body>
</html>
