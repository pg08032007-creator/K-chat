<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Cloud Premium</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-dark: #0a0a0c; 
            --bg-card: #141417; 
            --accent-purple: #a855f7; 
            --accent-pink: #ec4899; 
            --text-main: #ffffff; 
            --text-dim: #a1a1aa;
            --input-inner: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        
        /* Estrutura de Telas */
        .screen { display: none; min-height: 100vh; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Auth & Inputs */
        .auth-container { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .logo-k { font-size: 42px; font-weight: 900; background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .custom-input-group { width: 100%; background: var(--bg-card); border-radius: 18px; padding: 18px; border: 1px solid #1f1f23; display: flex; align-items: center; box-shadow: var(--input-inner); }
        .custom-input-group input { background: transparent; border: none; width: 100%; color: white; outline: none; margin-left: 10px; }
        
        .btn-premium { width: 100%; padding: 18px; border-radius: 20px; border: none; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; font-weight: 800; cursor: pointer; transition: transform 0.2s; }
        .btn-premium:active { transform: scale(0.95); }

        /* Feed & Cards */
        .app-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: var(--bg-dark); z-index: 100; border-bottom: 1px solid #1a1a1e; }
        .search-bar { flex: 1; background: #1a1a1e; border-radius: 12px; display: flex; align-items: center; padding: 8px 15px; border: 1px solid #27272a; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        .post-card { background: var(--bg-card); border-radius: 20px; padding: 15px; margin: 15px; border: 1px solid #1f1f23; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #222; }
        
        /* Chat UI */
        #chat-messages { padding: 20px; display: flex; flex-direction: column; gap: 12px; height: calc(100vh - 180px); overflow-y: auto; }
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; position: relative; }
        .msg-me { align-self: flex-end; background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); color: white; border-bottom-right-radius: 4px; }
        .msg-other { align-self: flex-start; background: #27272a; color: white; border-bottom-left-radius: 4px; }

        /* Navigation */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(15, 15, 18, 0.95); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 12px; backdrop-filter: blur(15px); border: 1px solid #222; z-index: 1000; }
        nav div { cursor: pointer; color: #555; font-size: 20px; transition: 0.3s; }
        nav div.active { color: var(--accent-pink); }
        .plus-fab { background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); width: 55px; height: 55px; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white !important; margin-top: -45px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        /* Modals */
        .modal-embed { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-body { background: var(--bg-card); padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; border: 1px solid #333; }

        /* Profile Grid */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; background: #000; }
        .grid-item { aspect-ratio: 1/1; background: #111; overflow: hidden; position: relative; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        .avatar-carousel { display: flex; gap: 10px; overflow-x: auto; padding: 10px; width: 100%; scrollbar-width: none; }
        .avatar-opt { width: 65px; height: 65px; border-radius: 50%; border: 3px solid transparent; flex-shrink: 0; }
        .avatar-opt.selected { border-color: var(--accent-pink); transform: scale(1.1); }
    </style>
</head>
<body>

    <!-- MODAL: Editar Perfil -->
    <div id="modal-edit" class="modal-embed" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-body">
            <h3>Editar Perfil</h3><br>
            <div style="text-align:center">
                <img id="edit-img-preview" src="" style="width:90px; height:90px; border-radius:50%; border:2px solid var(--accent-pink); object-fit:cover"><br>
                <button onclick="document.getElementById('edit-file-input').click()" style="background:none; border:none; color:var(--accent-pink); margin:10px 0;">Alterar Foto</button>
                <input type="file" id="edit-file-input" hidden onchange="processImage(this, 'edit')">
            </div>
            <div class="custom-input-group"><input type="text" id="edit-status-input" placeholder="Sua nova Bio"></div><br>
            <button class="btn-premium" onclick="saveFullEdit()">Atualizar</button>
        </div>
    </div>

    <!-- MODAL: Novo Post -->
    <div id="modal-post" class="modal-embed" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-body">
            <h3>Novo Post</h3><br>
            <div class="custom-input-group"><input type="text" id="post-text-input" placeholder="O que está rolando?"></div><br>
            <div id="post-media-preview" style="border-radius:15px; overflow:hidden; margin-bottom:10px;"></div>
            <button onclick="document.getElementById('post-file-input').click()" style="width:100%; padding:12px; border-radius:12px; background:#222; border:1px solid #444; color:white;"><i class="fas fa-camera"></i> Galeria</button>
            <input type="file" id="post-file-input" hidden accept="image/*,video/*" onchange="previewMedia(this)"><br><br>
            <button class="btn-premium" onclick="submitPost()">Publicar Agora</button>
        </div>
    </div>

    <!-- TELA: Login -->
    <div id="screen-login" class="screen active">
        <div class="auth-container">
            <div class="logo-k">K.</div>
            <div class="custom-input-group"><i class="fas fa-user"></i><input type="text" id="login-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><i class="fas fa-lock"></i><input type="password" id="login-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="handleLogin()">Entrar</button>
            <p onclick="showScreen('register')" style="color:#666">Novo por aqui? <span style="color:var(--accent-pink)">Criar conta</span></p>
        </div>
    </div>

    <!-- TELA: Cadastro -->
    <div id="screen-register" class="screen">
        <div class="auth-container">
            <div class="logo-k">k.chat</div>
            <div class="custom-input-group"><input type="text" id="reg-user" placeholder="Nome de usuário"></div>
            <div class="custom-input-group"><input type="password" id="reg-pass" placeholder="Crie uma senha"></div>
            <button class="btn-premium" onclick="showScreen('onboarding')">Próximo</button>
            <p onclick="showScreen('login')" style="color:#666">Já tenho conta</p>
        </div>
    </div>

    <!-- TELA: Onboarding (Avatar/Bio) -->
    <div id="screen-onboarding" class="screen">
        <div class="auth-container">
            <h2>Quase lá...</h2>
            <img id="img-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent-purple);">
            <div class="avatar-carousel" id="avatar-list">
                <!-- Gerado via JS -->
            </div>
            <div class="custom-input-group"><input type="text" id="onb-status" placeholder="Sua bio (ex: Amando o k.chat!)"></div>
            <button class="btn-premium" onclick="handleRegister()">Começar a Usar</button>
        </div>
    </div>

    <!-- TELA: Feed Social -->
    <div id="screen-feed" class="screen">
        <header class="app-header">
            <div class="logo-k" style="font-size:24px">K.</div>
            <div class="search-bar"><i class="fas fa-search" style="color:#444"></i><input type="text" placeholder="Buscar posts..." oninput="searchContent(this.value)"></div>
            <i class="fas fa-paper-plane" onclick="showScreen('chat')" style="color:var(--accent-purple); font-size:20px"></i>
        </header>
        <div id="feed-content"></div>
    </div>

    <!-- TELA: Chat Geral -->
    <div id="screen-chat" class="screen">
        <header class="app-header">
            <i class="fas fa-chevron-left" onclick="showScreen('feed')"></i>
            <h3 style="flex:1; text-align:center">Chat Global</h3>
        </header>
        <div id="chat-messages"></div>
        <div style="position: fixed; bottom: 90px; width: 100%; padding: 15px; display: flex; gap: 10px; background: var(--bg-dark);">
            <input type="text" id="chat-input" placeholder="Mensagem..." style="flex:1; background: #1a1a1e; border: 1px solid #333; border-radius: 25px; padding: 12px 20px; color: white; outline: none;">
            <button onclick="sendMessage()" style="background: var(--accent-purple); border: none; width: 48px; height: 48px; border-radius: 50%; color: white;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- TELA: Perfil -->
    <div id="screen-profile" class="screen">
        <div class="auth-container" style="padding-bottom:10px">
            <div style="width:100%; display:flex; justify-content:flex-end">
                <i class="fas fa-cog" onclick="openEditModal()" style="color:#555; font-size:22px"></i>
            </div>
            <img id="my-pic" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent-pink); object-fit:cover">
            <h2 id="my-name">@user</h2>
            <p id="my-status" style="color:#777; font-size:14px"></p>
            <div style="display:flex; gap:20px; margin-top:10px">
                <div style="text-align:center"><b id="post-count">0</b><br><small style="color:#555">Posts</small></div>
            </div>
            <button class="btn-premium" onclick="logout()" style="background:#222; margin-top:15px; height:40px; padding:0 30px; width:auto">Sair</button>
        </div>
        <div id="my-posts-grid" class="profile-grid"></div>
    </div>

    <!-- Navegação Fixa -->
    <nav id="main-nav" style="display:none">
        <div id="nav-feed" onclick="showScreen('feed')"><i class="fas fa-home"></i></div>
        <div class="plus-fab" onclick="openPostModal()"><i class="fas fa-plus"></i></div>
        <div id="nav-profile" onclick="showScreen('profile')"><i class="fas fa-user"></i></div>
    </nav>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
            authDomain: "kchat-web-8415c.firebaseapp.com",
            projectId: "kchat-web-8415c",
            storageBucket: "kchat-web-8415c.firebasestorage.app",
            messagingSenderId: "878265144053",
            appId: "1:878265144053:web:407389cd133d955f76abbc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        let base64Avatar = "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix";
        let base64PostMedia = "";

        // --- PERSISTÊNCIA & CARREGAMENTO ---
        window.onload = () => {
            const saved = localStorage.getItem('kchat_session');
            if(saved) {
                currentUser = JSON.parse(saved);
                enterApp();
            }
            renderAvatarOptions();
        };

        function renderAvatarOptions() {
            const seeds = ['Felix', 'Aneka', 'Jack', 'Mimi', 'Jasper', 'Luna', 'Simba', 'Zoey'];
            const container = document.getElementById('avatar-list');
            seeds.forEach(s => {
                const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${s}`;
                container.innerHTML += `<img src="${url}" class="avatar-opt" onclick="selectAvatar('${url}', this)">`;
            });
        }

        function selectAvatar(url, el) {
            base64Avatar = url;
            document.getElementById('img-preview').src = url;
            document.querySelectorAll('.avatar-opt').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        // --- AUTH LOGIC ---
        async function handleLogin() {
            const user = document.getElementById('login-user').value.toLowerCase().trim();
            const pass = document.getElementById('login-pass').value;
            const doc = await db.collection("usuarios").doc(user).get();
            if(doc.exists && doc.data().pass === pass) {
                currentUser = doc.data();
                enterApp();
            } else { alert("Dados incorretos!"); }
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            const pass = document.getElementById('reg-pass').value;
            const status = document.getElementById('onb-status').value || "Explorando o k.chat 🚀";
            const userData = { user, pass, status, pic: base64Avatar, joined: Date.now() };
            await db.collection("usuarios").doc(user).set(userData);
            currentUser = userData;
            enterApp();
        }

        function enterApp() {
            localStorage.setItem('kchat_session', JSON.stringify(currentUser));
            document.getElementById('main-nav').style.display = 'flex';
            showScreen('feed');
            listenPosts();
            listenMessages();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
            if(id === 'feed' || id === 'profile') document.getElementById('nav-' + id).classList.add('active');
            if(id === 'profile') loadProfile();
        }

        // --- FEED & POSTS ---
        function listenPosts(filter = "") {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                const container = document.getElementById('feed-content');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const post = doc.data();
                    const postId = doc.id;
                    if(filter && !post.content.toLowerCase().includes(filter) && !post.author.toLowerCase().includes(filter)) return;
                    
                    const hasLiked = post.likes_list?.includes(currentUser.user);

                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <img src="${post.authorPic}" class="user-avatar">
                                <b>@${post.author}</b>
                            </div>
                            <p style="margin-bottom:10px">${post.content}</p>
                            ${post.media ? (post.media.includes('video') ? `<video src="${post.media}" style="width:100%; border-radius:15px" autoplay muted loop></video>` : `<img src="${post.media}" style="width:100%; border-radius:15px">`) : ''}
                            <div style="margin-top:15px; display:flex; gap:20px; align-items:center">
                                <i class="${hasLiked ? 'fas' : 'far'} fa-heart" onclick="toggleLike('${postId}', ${JSON.stringify(post.likes_list || [])})" style="color:${hasLiked ? 'var(--accent-pink)' : '#666'}; font-size:20px"></i>
                                <span style="font-size:14px; color:#666">${post.likes || 0} curtidas</span>
                            </div>
                        </div>`;
                });
            });
        }

        async function toggleLike(id, list) {
            const ref = db.collection("posts").doc(id);
            if(list.includes(currentUser.user)) {
                await ref.update({ likes: firebase.firestore.FieldValue.increment(-1), likes_list: firebase.firestore.FieldValue.arrayRemove(currentUser.user) });
            } else {
                await ref.update({ likes: firebase.firestore.FieldValue.increment(1), likes_list: firebase.firestore.FieldValue.arrayUnion(currentUser.user) });
            }
        }

        // --- CHAT LOGIC ---
        async function sendMessage() {
            const msg = document.getElementById('chat-input').value;
            if(!msg.trim()) return;
            await db.collection("messages").add({ sender: currentUser.user, text: msg, time: Date.now() });
            document.getElementById('chat-input').value = "";
        }

        function listenMessages() {
            db.collection("messages").orderBy("time", "asc").onSnapshot(snap => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isMe = m.sender === currentUser.user;
                    box.innerHTML += `<div class="msg-bubble ${isMe ? 'msg-me' : 'msg-other'}">
                        <small style="opacity:0.7; font-size:10px">${m.sender}</small><br>${m.text}
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- PERFIL & MÍDIA ---
        async function loadProfile() {
            document.getElementById('my-pic').src = currentUser.pic;
            document.getElementById('my-name').innerText = "@" + currentUser.user;
            document.getElementById('my-status').innerText = currentUser.status;
            
            const snap = await db.collection("posts").where("author", "==", currentUser.user).get();
            document.getElementById('post-count').innerText = snap.size;
            
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `<div class="grid-item">${p.media ? (p.media.includes('video') ? `<video src="${p.media}"></video>` : `<img src="${p.media}">`) : '<p style="font-size:10px; padding:10px">'+p.content+'</p>'}</div>`;
            });
        }

        function previewMedia(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    base64PostMedia = e.target.result;
                    const preview = document.getElementById('post-media-preview');
                    preview.innerHTML = input.files[0].type.includes('video') ? `<video src="${base64PostMedia}" style="width:100%" autoplay muted loop></video>` : `<img src="${base64PostMedia}" style="width:100%">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function submitPost() {
            const text = document.getElementById('post-text-input').value;
            if(!text && !base64PostMedia) return;
            await db.collection("posts").add({
                author: currentUser.user, authorPic: currentUser.pic,
                content: text, media: base64PostMedia, time: Date.now(), likes: 0, likes_list: []
            });
            document.getElementById('modal-post').style.display = 'none';
            document.getElementById('post-text-input').value = "";
            base64PostMedia = "";
            document.getElementById('post-media-preview').innerHTML = "";
        }

        function openPostModal() { document.getElementById('modal-post').style.display = 'flex'; }
        function openEditModal() { 
            document.getElementById('edit-img-preview').src = currentUser.pic;
            document.getElementById('edit-status-input').value = currentUser.status;
            document.getElementById('modal-edit').style.display = 'flex'; 
        }

        async function saveFullEdit() {
            const newStatus = document.getElementById('edit-status-input').value;
            const update = { status: newStatus, pic: base64Avatar || currentUser.pic };
            await db.collection("usuarios").doc(currentUser.user).update(update);
            currentUser = {...currentUser, ...update};
            enterApp();
            document.getElementById('modal-edit').style.display = 'none';
        }

        function processImage(input, mode) {
            const reader = new FileReader();
            reader.onload = e => {
                base64Avatar = e.target.result;
                document.getElementById('edit-img-preview').src = base64Avatar;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function searchContent(v) { listenPosts(v.toLowerCase()); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
