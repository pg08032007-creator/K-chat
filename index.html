<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K. Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #8a2be2; --accent: linear-gradient(45deg, #c026d3, #db2777); --bg: #000; --card: #111; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* Telas */
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: flex; }

        /* Estilo Login e Registro (Igual image_3 e image_4) */
        .auth-container { padding: 40px 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .pfp-wrapper { position: relative; width: 120px; height: 120px; margin-bottom: 20px; }
        #pfp-preview { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); background: #222; }
        .pfp-label { position: absolute; bottom: 0; right: 0; background: var(--primary); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        input { background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; color: #fff; width: 100%; margin-bottom: 15px; outline: none; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 25px; width: 100%; font-weight: bold; cursor: pointer; }

        /* Feed (Igual image_0) */
        .top-bar { position: sticky; top: 0; background: var(--bg); display: flex; align-items: center; padding: 15px; gap: 15px; z-index: 10; }
        .search-box { background: #121212; flex: 1; display: flex; align-items: center; padding: 10px 15px; border-radius: 12px; border: 1px solid #1a1a1a; }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; margin-left: 10px; outline: none; }
        
        /* Navegação Inferior (Igual image_0) */
        .bottom-nav { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 50; }
        .nav-container { background: rgba(10,10,10,0.9); width: 90%; height: 75px; border-radius: 35px; border: 1px solid #222; display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(10px); }
        .plus-btn { background: var(--accent); width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-top: -15px; box-shadow: 0 8px 20px rgba(192, 38, 211, 0.4); cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div id="scr-auth" class="screen active">
        <div class="auth-container">
            <h1 style="color:var(--primary); font-size: 3.5rem; font-weight: 800; margin-bottom: 20px;">K.</h1>
            <input type="text" id="u" placeholder="Nome de usuário">
            <input type="password" id="p" placeholder="Senha">
            <button class="btn-main" onclick="handleAuth()">Entrar / Próximo</button>
        </div>
    </div>

    <div id="scr-setup" class="screen">
        <div class="auth-container">
            <h2 style="margin-bottom:20px">Complete seu Perfil</h2>
            <div class="pfp-wrapper">
                <img src="https://via.placeholder.com/120" id="pfp-img">
                <label class="pfp-label" for="pfp-input"><i class="fa fa-camera"></i></label>
                <input type="file" id="pfp-input" hidden accept="image/*">
            </div>
            <input type="number" id="age" placeholder="Sua idade">
            <div style="display:flex; gap:30px; margin-bottom:20px;">
                <label><input type="radio" name="g" value="m"> ♂️</label>
                <label><input type="radio" name="g" value="f"> ♀️</label>
                <label><input type="radio" name="g" value="o"> ⚧️</label>
            </div>
            <button class="btn-main" id="btn-save" onclick="saveProfile()">Criar Conta</button>
        </div>
    </div>

    <div id="scr-feed" class="screen">
        <header class="top-bar">
            <span style="color:var(--primary); font-weight:bold; font-size:26px">K.</span>
            <div class="search-box"><i class="fa fa-search"></i><input type="text" placeholder="Teste"></div>
        </header>
        <div style="padding:20px">
            <h1 style="font-size: 28px; font-weight: 800;">Global Feed</h1>
            <div id="posts-container"></div>
        </div>
        <nav class="bottom-nav">
            <div class="nav-container">
                <i class="fa-solid fa-compass" style="font-size:24px"></i>
                <div class="plus-btn" onclick="alert('Postar em breve!')"><i class="fa-solid fa-plus"></i></div>
                <i class="fa-solid fa-user-astronaut" style="font-size:24px" onclick="logout()"></i>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPlWGrAgR6wvMilamQ1Z83nAhXJAaRHD0",
            authDomain: "kchat-1debf.firebaseapp.com",
            projectId: "kchat-1debf",
            storageBucket: "kchat-1debf.firebasestorage.app",
            appId: "1:622333653477:web:dab185145cfa4b18983f0c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let curUser = null;

        // Persistência de Login (Lembrar usuário)
        window.onload = () => {
            const saved = localStorage.getItem('k_user');
            if(saved) { curUser = JSON.parse(saved); show('scr-feed'); }
        };

        window.handleAuth = async () => {
            const name = document.getElementById('u').value.trim();
            const pass = document.getElementById('p').value;
            if(!name || !pass) return alert("Preencha tudo!");
            
            const snap = await getDoc(doc(db, "users", name));
            if(snap.exists()) {
                if(snap.data().pass === pass) { curUser = snap.data(); loginDone(); }
                else alert("Senha incorreta!");
            } else {
                curUser = { name, pass };
                show('scr-setup');
            }
        };

        window.saveProfile = async () => {
            const btn = document.getElementById('btn-save');
            btn.innerText = "Processando...";
            curUser.age = document.getElementById('age').value;
            curUser.gender = document.querySelector('input[name="g"]:checked')?.value || 'o';
            await setDoc(doc(db, "users", curUser.name), curUser);
            loginDone();
        };

        function loginDone() {
            localStorage.setItem('k_user', JSON.stringify(curUser));
            show('scr-feed');
        }

        window.logout = () => { localStorage.removeItem('k_user'); location.reload(); };
        window.show = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // Preview da foto
        document.getElementById('pfp-input').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('pfp-img').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
