<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KChat - Social & Discovery</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; outline: none; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #000; color: white; }
        .hidden { display: none !important; }
        .logo { font-size: 32px; font-weight: bold; background: linear-gradient(45deg, #f09433, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* AUTH & PROFILE SETUP */
        .full-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        input, textarea { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #262626; background: #121212; color: #fff; }
        .btn-blue { width: 100%; background: #0095f6; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* FEED & UI */
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100; border-bottom: 0.1px solid #262626; }
        .page { margin-top: 55px; padding-bottom: 70px; min-height: 100vh; }
        .post { border-bottom: 0.1px solid #262626; padding-bottom: 15px; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        /* CHAT */
        #chat-content { height: 70vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { background: #262626; padding: 10px; border-radius: 12px; max-width: 80%; width: fit-content; }

        /* NAV */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 55px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.1px solid #262626; }
    </style>
</head>
<body>

    <div id="login-screen" class="full-screen">
        <div class="logo">KChat</div>
        <input type="email" id="l-email" placeholder="E-mail">
        <input type="password" id="l-pass" placeholder="Senha">
        <button class="btn-blue" onclick="authAction('login')">Entrar</button>
        <button class="btn-blue" style="background:transparent; color:#0095f6" onclick="showAuth('signup-screen')">Criar nova conta</button>
    </div>

    <div id="signup-screen" class="full-screen hidden">
        <div class="logo">KChat</div>
        <input type="email" id="s-email" placeholder="E-mail">
        <input type="password" id="s-pass" placeholder="Senha (min. 6)">
        <button class="btn-blue" onclick="authAction('signup')">Cadastrar</button>
        <button class="btn-blue" style="background:transparent; color:#0095f6" onclick="showAuth('login-screen')">Já tenho conta</button>
    </div>

    <div id="setup-screen" class="full-screen hidden">
        <h2>Complete seu Perfil</h2>
        <input type="text" id="p-name" placeholder="Seu Nome">
        <textarea id="p-bio" placeholder="Sua Bio..."></textarea>
        <input type="text" id="p-img" placeholder="URL da foto de perfil">
        <button class="btn-blue" onclick="saveProfile()">Começar a usar</button>
    </div>

    <div id="app-screen" class="hidden">
        <div class="header">
            <span class="logo" style="font-size: 22px;">KChat</span>
            <i data-lucide="log-out" onclick="firebase.auth().signOut()"></i>
        </div>

        <div id="home-page" class="page">
            <div id="feed-list"></div>
        </div>

        <div id="chat-page" class="page hidden">
            <div id="chat-content"></div>
            <div style="padding: 10px; display: flex; gap: 5px;">
                <input type="text" id="msg-input" placeholder="Mensagem...">
                <button onclick="sendMsg()" style="background:#0095f6; border:none; padding:10px; border-radius:8px; color:white;">Enviar</button>
            </div>
        </div>

        <div id="post-page" class="page hidden">
            <div class="full-screen" style="height: auto;">
                <h3>Novo Post</h3>
                <input type="text" id="post-url" placeholder="URL da Imagem">
                <textarea id="post-caption" placeholder="Legenda..."></textarea>
                <button class="btn-blue" onclick="createPost()">Publicar</button>
            </div>
        </div>

        <nav class="nav-bottom">
            <i data-lucide="home" onclick="showPage('home-page')"></i>
            <i data-lucide="plus-square" onclick="showPage('post-page')"></i>
            <i data-lucide="message-circle" onclick="showPage('chat-page')"></i>
            <i data-lucide="user"></i>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDPlWGrAgR6wvMilamQ1Z83nAhXJAaRHD0",
            authDomain: "kchat-1debf.firebaseapp.com",
            databaseURL: "https://kchat-1debf-default-rtdb.firebaseio.com",
            projectId: "kchat-1debf",
            storageBucket: "kchat-1debf.firebasestorage.app",
            messagingSenderId: "622333653477",
            appId: "1:622333653477:web:2ac2e18023e8a07a983f0c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        lucide.createIcons();

        let userData = null;

        // AUTH LOGIC
        function showAuth(id) {
            document.querySelectorAll('.full-screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function authAction(type) {
            const email = type === 'login' ? document.getElementById('l-email').value : document.getElementById('s-email').value;
            const pass = type === 'login' ? document.getElementById('l-pass').value : document.getElementById('s-pass').value;
            
            try {
                if(type === 'login') await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
            } catch(e) { alert(e.message); }
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const snapshot = await db.ref('users/' + user.uid).once('value');
                if(!snapshot.exists()) {
                    showAuth('setup-screen');
                } else {
                    userData = snapshot.val();
                    document.querySelectorAll('.full-screen').forEach(s => s.classList.add('hidden'));
                    document.getElementById('app-screen').classList.remove('hidden');
                    loadFeed();
                    loadChat();
                }
            } else {
                showAuth('login-screen');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        // PROFILE SETUP
        function saveProfile() {
            const name = document.getElementById('p-name').value;
            const bio = document.getElementById('p-bio').value;
            const img = document.getElementById('p-img').value || "https://api.dicebear.com/7.x/avataaars/svg?seed=" + name;
            
            if(!name) return alert("Nome é obrigatório!");
            
            db.ref('users/' + auth.currentUser.uid).set({ name, bio, img })
            .then(() => location.reload());
        }

        // FEED & POSTS
        function createPost() {
            const url = document.getElementById('post-url').value;
            const cap = document.getElementById('post-caption').value;
            if(!url) return;

            db.ref('posts').push({
                userName: userData.name,
                userImg: userData.img,
                postImg: url,
                caption: cap,
                timestamp: Date.now()
            }).then(() => {
                showPage('home-page');
                document.getElementById('post-url').value = "";
                document.getElementById('post-caption').value = "";
            });
        }

        function loadFeed() {
            db.ref('posts').on('value', snap => {
                const list = document.getElementById('feed-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const p = d.val();
                    list.innerHTML = `
                        <div class="post">
                            <div style="padding:10px; display:flex; align-items:center; gap:10px;">
                                <img src="${p.userImg}" style="width:30px; height:30px; border-radius:50%">
                                <strong>${p.userName}</strong>
                            </div>
                            <img src="${p.postImg}" class="post-img">
                            <div style="padding:10px;"><strong>${p.userName}</strong> ${p.caption}</div>
                        </div>
                    ` + list.innerHTML;
                });
            });
        }

        // CHAT LOGIC
        function sendMsg() {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            db.ref('chat').push({ name: userData.name, text: input.value });
            input.value = "";
        }

        function loadChat() {
            db.ref('chat').limitToLast(20).on('value', snap => {
                const cont = document.getElementById('chat-content');
                cont.innerHTML = "";
                snap.forEach(d => {
                    const m = d.val();
                    cont.innerHTML += `<div class="bubble"><strong>${m.name}:</strong><br>${m.text}</div>`;
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
