<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KChat | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #ff007f;
            --bg: #050508;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: 0.3s; font-family: 'Plus Jakarta Sans', sans-serif; }
        body, html { margin: 0; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* --- AUTH --- */
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100%; background: radial-gradient(circle, #1a152e, #050508); }
        .auth-card { background: var(--card); backdrop-filter: blur(20px); padding: 35px; border-radius: 35px; width: 90%; max-width: 380px; border: 1px solid var(--border); text-align: center; }
        
        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 15px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 12px; font-size: 0.9em; opacity: 0.5; }
        .tab.active { background: white; color: black; opacity: 1; font-weight: bold; }

        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; outline: none; }
        
        .gen-select { display: flex; justify-content: center; gap: 25px; margin: 15px 0; }
        .gen-icon { font-size: 1.5em; cursor: pointer; opacity: 0.3; padding: 10px; border-radius: 50%; border: 1px solid transparent; }
        .gen-icon.selected { opacity: 1; color: var(--primary); border-color: var(--primary); transform: scale(1.2); }

        .btn-main { width: 100%; padding: 16px; border-radius: 15px; border: none; background: white; color: #000; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* --- APP --- */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.5); }
        .search-wrap { flex: 1; position: relative; }
        .search-wrap input { padding: 10px 10px 10px 40px; margin: 0; border-radius: 12px; font-size: 0.85em; }
        .search-wrap i { position: absolute; left: 15px; top: 12px; opacity: 0.5; }

        .content { flex: 1; overflow-y: auto; padding: 20px 20px 120px; }
        .post { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid var(--border); }

        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; padding: 10px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; }
        nav i { font-size: 1.4em; color: rgba(255,255,255,0.3); cursor: pointer; padding: 10px; }
        nav i.active { color: white; }
        .plus-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 15px rgba(138,43,226,0.3); }

        #profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 999; display: none; padding: 40px 20px; text-align: center; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="margin-bottom: 25px; letter-spacing: -1px; font-weight: 800; color: var(--primary);">KChat</h2>
            <div class="tabs">
                <div class="tab active" id="t-login" onclick="setMode('login')">Login</div>
                <div class="tab" id="t-reg" onclick="setMode('reg')">Registro</div>
            </div>
            
            <div id="auth-main-fields">
                <input type="text" id="user-in" placeholder="Nome de usuário">
                <input type="password" id="pass-in" placeholder="Senha">
            </div>
            
            <div id="reg-box" style="display: none; border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px;">
                <p style="font-size: 0.8em; opacity: 0.6;">Nome disponível! Complete os dados:</p>
                <input type="number" id="age-in" placeholder="Idade">
                <div class="gen-select">
                    <i class="fas fa-mars gen-icon" onclick="pickGen(this, 'M')"></i>
                    <i class="fas fa-venus gen-icon" onclick="pickGen(this, 'F')"></i>
                    <i class="fas fa-genderless gen-icon" onclick="pickGen(this, 'NB')"></i>
                </div>
            </div>
            
            <button class="btn-main" onclick="handleAuth()" id="btn-label">ENTRAR</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div style="font-weight: 900; color: var(--primary); font-size: 1.2em;">K.</div>
            <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Buscar usuários reais..." oninput="searchUsers()">
            </div>
        </header>

        <div id="search-results" class="content" style="display:none; position:fixed; background:var(--bg); z-index:100; width:100%;"></div>

        <div id="home" class="content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0;">Feed Global</h3>
                <button onclick="renderPosts()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer;"><i class="fas fa-sync"></i> Update</button>
            </div>
            <div id="feed"></div>
        </div>

        <div id="profile" class="content" style="display:none; text-align:center;">
            <div style="position: relative; display: inline-block; margin-top: 30px;">
                <img id="me-avatar" src="" style="width:110px; height:110px; border-radius:40px; border:3px solid var(--primary); object-fit: cover;">
                <div onclick="editBio()" style="position: absolute; bottom: 0; right: 0; background: #fff; color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--bg);"><i class="fas fa-pencil-alt" style="font-size: 0.8em;"></i></div>
            </div>
            <h2 id="me-name" style="margin: 15px 0 5px;"></h2>
            <p id="me-bio" style="opacity:0.6; padding: 0 40px;"></p>
        </div>

        <nav>
            <i class="fas fa-home active" onclick="show('home', this)"></i>
            <div class="plus-btn" onclick="newPost()"><i class="fas fa-plus"></i></div>
            <i class="fas fa-user" onclick="show('profile', this)"></i>
        </nav>
    </div>

    <div id="profile-modal">
        <div style="text-align:left;"><i class="fas fa-arrow-left" onclick="this.parentElement.parentElement.style.display='none'" style="font-size:1.5em; cursor:pointer;"></i></div>
        <div id="profile-target"></div>
    </div>

    <script>
        let mode = 'login';
        let selectedGen = '';
        let currentUser = null;
        let tempUserData = null;

        let users = JSON.parse(localStorage.getItem('k_users')) || [
            {user: 'KChat', pass: '123', bio: 'Bem-vindo ao KChat oficial!', followers: 999, img: 'https://api.dicebear.com/7.x/bottts/svg?seed=KChat'}
        ];
        let posts = JSON.parse(localStorage.getItem('k_posts')) || [{u: 'KChat', t: 'Olá! Crie sua conta e comece a postar globalmente.'}];

        function setMode(m) {
            mode = m;
            tempUserData = null;
            document.getElementById('reg-box').style.display = 'none';
            document.getElementById('auth-main-fields').style.opacity = '1';
            document.getElementById('t-login').classList.toggle('active', m === 'login');
            document.getElementById('t-reg').classList.toggle('active', m === 'reg');
            document.getElementById('btn-label').innerText = m === 'reg' ? 'VERIFICAR NOME' : 'ENTRAR';
        }

        function pickGen(el, g) {
            selectedGen = g;
            document.querySelectorAll('.gen-icon').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        function handleAuth() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();

            if (!u || !p) return alert("Preencha nome e senha!");

            if (mode === 'reg') {
                // ETAPA 1: Validar se o nome já existe
                if (!tempUserData) {
                    if (users.some(x => x.user.toLowerCase() === u.toLowerCase())) {
                        return alert("Este nome de usuário já existe!");
                    }
                    tempUserData = { user: u, pass: p };
                    document.getElementById('reg-box').style.display = 'block';
                    document.getElementById('btn-label').innerText = "CONCLUIR REGISTRO";
                    alert("Nome disponível! Agora complete o resto.");
                } else {
                    // ETAPA 2: Finalizar registro
                    const age = document.getElementById('age-in').value;
                    if (!age || !selectedGen) return alert("Preencha a idade e selecione o gênero!");

                    const newUser = { 
                        user: tempUserData.user, 
                        pass: tempUserData.pass, 
                        age: age,
                        gender: selectedGen,
                        bio: 'Explorando o KChat!', 
                        img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${tempUserData.user}`,
                        followers: 0
                    };
                    users.push(newUser);
                    localStorage.setItem('k_users', JSON.stringify(users));
                    alert("Conta criada! Pode fazer login.");
                    setMode('login');
                }
            } else {
                // LOGIN: Verifica se existe e se a senha bate
                const found = users.find(x => x.user.toLowerCase() === u.toLowerCase());
                if (!found) return alert("Usuário inexistente! Por favor, registre-se.");
                if (found.pass !== p) return alert("Senha incorreta!");

                currentUser = found;
                startApp();
            }
        }

        function startApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('me-name').innerText = currentUser.user;
            document.getElementById('me-bio').innerText = currentUser.bio;
            document.getElementById('me-avatar').src = currentUser.img;
            renderPosts();
        }

        function show(id, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('nav i').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            document.getElementById('search-results').style.display = 'none';
        }

        function newPost() {
            const txt = prompt("O que está acontecendo no seu mundo?");
            if(txt && txt.trim() !== "") {
                posts.push({ u: currentUser.user, t: txt });
                localStorage.setItem('k_posts', JSON.stringify(posts));
                renderPosts();
            }
        }

        function renderPosts() {
            const feed = document.getElementById('feed');
            feed.innerHTML = posts.slice().reverse().map(p => `
                <div class="post">
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer;" onclick="openUser('${p.u}')">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${p.u}" style="width:35px; height:35px; border-radius:12px; background:rgba(255,255,255,0.1);">
                        <b style="font-size:0.95em;">@${p.u}</b>
                    </div>
                    <p style="margin:0; opacity:0.9; line-height:1.5;">${p.t}</p>
                </div>
            `).join('');
        }

        function searchUsers() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const res = document.getElementById('search-results');
            if(q.length > 0) {
                res.style.display = 'block';
                const filtered = users.filter(u => u.user.toLowerCase().includes(q));
                res.innerHTML = filtered.map(u => `
                    <div onclick="openUser('${u.user}')" style="display:flex; align-items:center; gap:15px; padding:15px; border-bottom:1px solid var(--border);">
                        <img src="${u.img}" style="width:45px; height:45px; border-radius:15px;">
                        <div><b style="font-size:1.1em;">${u.user}</b><br><small style="opacity:0.5">${u.followers} seguidores</small></div>
                    </div>
                `).join('');
            } else { res.style.display = 'none'; }
        }

        function openUser(name) {
            const u = users.find(x => x.user === name);
            if(!u) return;
            const modal = document.getElementById('profile-modal');
            document.getElementById('profile-target').innerHTML = `
                <img src="${u.img}" style="width:120px; height:120px; border-radius:45px; border:3px solid var(--primary); margin-top:20px; object-fit: cover;">
                <h1 style="margin:15px 0 5px;">${u.user}</h1>
                <p style="opacity:0.6; padding: 0 30px;">${u.bio}</p>
                <div style="display:flex; justify-content:center; gap:40px; margin:30px 0;">
                    <div><b style="font-size:1.2em;">${u.followers}</b><br><small>Seguidores</small></div>
                    <div><b style="font-size:1.2em;">${Math.floor(u.followers/2)}</b><br><small>Seguindo</small></div>
                </div>
                <button onclick="this.innerText='Seguindo'; this.style.opacity='0.5';" style="width:80%; padding:18px; border-radius:20px; border:none; background:white; color:black; font-weight:800; cursor:pointer;">SEGUIR</button>
            `;
            modal.style.display = 'block';
        }

        function editBio() {
            const b = prompt("Escreva algo sobre você:", currentUser.bio);
            if(b !== null) {
                currentUser.bio = b;
                document.getElementById('me-bio').innerText = b;
                const idx = users.findIndex(x => x.user === currentUser.user);
                users[idx] = currentUser;
                localStorage.setItem('k_users', JSON.stringify(users));
            }
        }
    </script>
</body>
</html>
