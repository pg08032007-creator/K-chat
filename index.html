<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K. App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h1 class="logo-k">K<span>.</span></h1>
            <div class="tabs">
                <button id="tab-login" class="active" onclick="switchAuth('login')">Login</button>
                <button id="tab-register" onclick="switchAuth('register')">Registrar</button>
            </div>
            
            <form id="auth-form">
                <input type="text" id="username" placeholder="Nome de usuário" required>
                <input type="password" id="password" placeholder="Senha" required>
                <button type="submit" id="auth-submit">Entrar</button>
            </form>
            <p id="auth-msg"></p>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="auth-container">
            <h2>Complete seu Perfil</h2>
            <div class="profile-upload">
                <label for="pfp-input">Escolher Foto de Perfil</label>
                <input type="file" id="pfp-input" accept="image/*">
            </div>
            <input type="number" id="age-input" placeholder="Sua idade">
            
            <div class="gender-selection">
                <p>Gênero:</p>
                <label><input type="radio" name="gender" value="masc"> ♂️</label>
                <label><input type="radio" name="gender" value="fem"> ♀️</label>
                <label><input type="radio" name="gender" value="outro"> ⚧️</label>
            </div>
            <button onclick="finishProfile()">Continuar</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <header class="top-bar">
            <span class="logo-small">K.</span>
            <div class="search-container">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="Teste">
            </div>
        </header>

        <main class="content">
            <div class="feed-header">
                <h1>Global Feed</h1>
                <i class="fa-solid fa-arrows-rotate refresh-icon"></i>
            </div>
            </main>

        <nav class="bottom-nav">
            <div class="nav-container">
                <div class="nav-item active-nav"><i class="fa-solid fa-compass"></i></div>
                <div class="plus-btn"><i class="fa-solid fa-plus"></i></div>
                <div class="nav-item"><i class="fa-solid fa-robot"></i></div>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
