<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Cloud Premium</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg-dark: #0a0a0c; --bg-card: #141417; --accent-purple: #a855f7; --accent-pink: #ec4899; --text-main: #ffffff; --input-inner: inset 2px 2px 5px rgba(0,0,0,0.3); --text-dim: #a1a1aa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); }
        .screen { display: none; min-height: 100vh; padding-bottom: 90px; }
        .screen.active { display: block; }
        
        .auth-container { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .logo-k { font-size: 42px; font-weight: 900; background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .custom-input-group { width: 100%; background: var(--bg-card); border-radius: 18px; padding: 18px; border: 1px solid #1f1f23; display: flex; align-items: center; box-shadow: var(--input-inner); }
        .custom-input-group input { background: transparent; border: none; width: 100%; color: white; outline: none; margin-left: 10px; }
        
        .gender-selector { display: flex; justify-content: space-between; width: 100%; gap: 10px; margin: 10px 0; }
        .gender-option { flex: 1; position: relative; text-align: center; background: var(--bg-card); border-radius: 15px; padding: 15px; border: 1px solid #1f1f23; cursor: pointer; }
        .gender-option input { position: absolute; opacity: 0; }
        .gender-option i { font-size: 24px; color: #444; }
        .gender-option input:checked ~ i { color: var(--accent-pink); transform: scale(1.1); }
        .gender-option span { display: block; font-size: 10px; text-transform: uppercase; margin-top: 5px; color: #555; }

        .btn-premium { width: 100%; padding: 20px; border-radius: 20px; border: none; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; font-weight: 800; cursor: pointer; }
        
        .app-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: var(--bg-dark); z-index: 100; border-bottom: 1px solid #1a1a1e; }
        .search-bar { flex: 1; background: #1a1a1e; border-radius: 12px; display: flex; align-items: center; padding: 8px 15px; border: 1px solid #27272a; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        .post-card { background: var(--bg-card); border-radius: 20px; padding: 15px; margin: 15px; border: 1px solid #1f1f23; position: relative; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        
        .post-media-wrapper { width: 100%; margin-top: 12px; border-radius: 15px; overflow: hidden; border: 1px solid #27272a; background: #000; display: flex; justify-content: center; align-items: center; }
        .post-media-wrapper img, .post-media-wrapper video { width: 100%; max-height: 450px; object-fit: contain; display: block; }

        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(15, 15, 18, 0.9); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 12px; backdrop-filter: blur(15px); border: 1px solid #222; z-index: 1000; }
        nav div { cursor: pointer; color: #555; font-size: 18px; }
        .plus-fab { background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); width: 60px; height: 60px; border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white !important; margin-top: -40px; }

        .modal-embed { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-body { background: var(--bg-card); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #333; }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; }
        .grid-item { aspect-ratio: 1/1; background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #333; position: relative; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .grid-item i { position: absolute; top: 5px; right: 5px; color: white; text-shadow: 0 0 5px black; font-size: 10px; }

        .avatar-carousel { display: flex; gap: 10px; overflow-x: auto; padding: 10px; width: 100%; }
        .avatar-opt { width: 60px; height: 60px; border-radius: 50%; border: 2px solid transparent; flex-shrink: 0; cursor: pointer; }
        .avatar-opt.selected { border-color: var(--accent-pink); }

        #chat-content { height: 70vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 14px; position: relative; }
        .bubble-me { align-self: flex-end; background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); border-bottom-right-radius: 2px; }
        .bubble-other { align-self: flex-start; background: #27272a; border-bottom-left-radius: 2px; }

        .post-time { font-size: 10px; color: #555; display: block; }
        .nav-badge { position: absolute; top: -5px; right: -5px; background: #ff0000; color: white; font-size: 10px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg-dark); }
        .notif-item { padding: 15px; border-bottom: 1px solid #1a1a1e; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .notif-unseen { background: rgba(168, 85, 247, 0.1); border-left: 3px solid var(--accent-purple); }
        .stat-row { display: flex; gap: 20px; margin: 10px 0; }
        .stat-row div { text-align: center; }
        .stat-row b { display: block; font-size: 16px; color: var(--accent-pink); }
        .stat-row span { font-size: 10px; color: #555; }

        .banner-container { width: 100%; height: 160px; background: #1a1a1e; position: relative; border-radius: 0 0 20px 20px; overflow: hidden; }
        #my-banner-img, .view-banner-img { width: 100%; height: 100%; object-fit: cover; }
        .comment-item { padding: 8px; border-bottom: 1px solid #1a1a1e; font-size: 12px; }
        .chat-list-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #1a1a1e; cursor: pointer; }
    </style>
</head>
<body>

    <div id="modal-edit" class="modal-embed" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-body">
            <h3>Editar Perfil</h3><br>
            <div style="text-align:center">
                <p style="font-size:10px; color:#555">Toque na capa para mudar</p>
                <img id="edit-banner-preview" src="" style="width:100%; height:80px; border-radius:10px; object-fit:cover; margin-bottom:10px; background: #222" onclick="document.getElementById('banner-input').click()">
                <input type="file" id="banner-input" hidden accept="image/*" onchange="processBanner(this)">
                
                <img id="edit-img-preview" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--accent-pink); background: #222"><br>
                <button onclick="document.getElementById('edit-file-input').click()" style="background:none; border:none; color:var(--accent-pink); font-size:12px; margin:10px 0;">Trocar Foto</button>
                <input type="file" id="edit-file-input" hidden accept="image/*" onchange="processImage(this, 'edit')">
            </div>
            <div class="custom-input-group"><input type="text" id="edit-status-input" placeholder="Nova Bio"></div><br>
            <button class="btn-premium" onclick="saveFullEdit()">Salvar Alterações</button>
        </div>
    </div>

    <div id="modal-comments" class="modal-embed" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-body" style="max-height: 80vh; overflow-y: auto;">
            <h4 id="comment-post-title">Comentários</h4><br>
            <div id="comments-list" style="margin-bottom:20px"></div>
            <div class="custom-input-group">
                <input type="text" id="new-comment-input" placeholder="Escreva algo...">
                <i class="fas fa-paper-plane" onclick="sendComment()" style="color:var(--accent-purple)"></i>
            </div>
        </div>
    </div>

    <div id="modal-post" class="modal-embed" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-body">
            <h3>Criar Post</h3><br>
            <div class="custom-input-group"><input type="text" id="post-text-input" placeholder="No que está pensando?"></div><br>
            <div id="post-media-preview" style="width:100%; max-height:150px; overflow:hidden; border-radius:10px; margin-bottom:10px;"></div>
            <button onclick="document.getElementById('post-file-input').click()" style="width:100%; padding:10px; border-radius:10px; background:#222; border:1px solid #444; color:white;"><i class="fas fa-photo-video"></i> Foto ou Vídeo (MP4)</button>
            <input type="file" id="post-file-input" hidden accept="image/*,video/mp4" onchange="previewMedia(this)"><br><br>
            <button class="btn-premium" id="btn-submit-post" onclick="submitPost()">Publicar</button>
        </div>
    </div>

    <div id="screen-login" class="screen active">
        <div class="auth-container">
            <div class="logo-k">K.</div>
            <div class="custom-input-group"><i class="fas fa-user"></i><input type="text" id="login-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><i class="fas fa-lock"></i><input type="password" id="login-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="handleLogin()">Entrar</button>
            <p onclick="showScreen('register')" style="color:#666">Não tem conta? <span style="color:var(--accent-pink)">Cadastre-se</span></p>
        </div>
    </div>

    <div id="screen-register" class="screen">
        <div class="auth-container">
            <div class="logo-k">Cadastro</div>
            <div class="custom-input-group"><input type="text" id="reg-user" placeholder="Nome de usuário" onblur="checkUserExists(this.value)"></div>
            <div id="reg-warn" style="color:var(--accent-pink); font-size:12px; display:none">Este nome já existe!</div>
            <div class="custom-input-group"><input type="password" id="reg-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="showScreen('onboarding')">Continuar</button>
            <p onclick="showScreen('login')" style="color:#666">Já tenho conta</p>
        </div>
    </div>

    <div id="screen-onboarding" class="screen">
        <div class="auth-container">
            <h2>Seu Perfil</h2>
            <div style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent-purple); overflow:hidden; margin:0 auto;" onclick="document.getElementById('file-input').click()">
                <img id="img-preview" src="https://via.placeholder.com/110?text=+" style="width:100%; height:100%; object-fit:cover;">
                <input type="file" id="file-input" accept="image/*" onchange="processImage(this, 'reg')" hidden>
            </div>
            <p style="font-size:12px; color:#555">Ou escolha um avatar:</p>
            <div class="avatar-carousel" id="avatar-list">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-opt" onclick="selectAvatar(this.src, this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar-opt" onclick="selectAvatar(this.src, this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Jack" class="avatar-opt" onclick="selectAvatar(this.src, this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mimi" class="avatar-opt" onclick="selectAvatar(this.src, this)">
            </div>
            <div class="custom-input-group"><i class="fas fa-calendar-alt" style="color:#555"></i><input type="date" id="onb-date"></div>
            <div class="custom-input-group"><input type="text" id="onb-status" placeholder="Sua Bio/Status"></div>
            <div class="gender-selector">
                <label class="gender-option"><input type="radio" name="gen" value="Ele" checked><i class="fas fa-mars"></i><span>Ele</span></label>
                <label class="gender-option"><input type="radio" name="gen" value="Ela"><i class="fas fa-venus"></i><span>Ela</span></label>
                <label class="gender-option"><input type="radio" name="gen" value="Neutro"><i class="fas fa-genderless"></i><span>Neutro</span></label>
            </div>
            <button class="btn-premium" onclick="handleRegister()">Finalizar Registro</button>
        </div>
    </div>

    <div id="screen-feed" class="screen">
        <header class="app-header">
            <div class="logo-k" style="font-size:24px">K.</div>
            <div class="search-bar"><i class="fas fa-search" style="color:#444"></i><input type="text" placeholder="Buscar..." oninput="searchContent(this.value)"></div>
            <div style="position:relative; cursor:pointer" onclick="showScreen('notifications')">
                <i class="fas fa-bell" style="color:var(--accent-purple); font-size:20px"></i>
                <div id="notif-badge" class="nav-badge" style="display:none">0</div>
            </div>
            <i class="fas fa-comment-dots" onclick="showScreen('chat-list')" style="color:var(--accent-purple); font-size:20px; cursor:pointer"></i>
        </header>
        <div id="feed-content"></div>
    </div>

    <div id="screen-notifications" class="screen">
        <header class="app-header">
            <i class="fas fa-arrow-left" onclick="showScreen('feed')"></i>
            <h3 style="flex:1; text-align:center">Notificações</h3>
        </header>
        <div id="notif-content"></div>
    </div>

    <div id="screen-chat-list" class="screen">
        <header class="app-header">
            <i class="fas fa-arrow-left" onclick="showScreen('feed')"></i>
            <h3 style="flex:1; text-align:center">Mensagens</h3>
        </header>
        <div id="chat-list-content"></div>
    </div>

    <div id="screen-chat" class="screen">
        <header class="app-header">
            <i class="fas fa-arrow-left" onclick="showScreen('chat-list')"></i>
            <h3 id="chat-target-name" style="flex:1; text-align:center">Chat</h3>
        </header>
        <div id="chat-content"></div>
        <div style="position: fixed; bottom: 90px; width: 100%; padding: 15px; display: flex; gap: 10px; background: var(--bg-dark); border-top: 1px solid #222">
            <input type="text" id="chat-input" placeholder="Conversar..." style="flex:1; background: #1a1a1e; border: 1px solid #333; border-radius: 20px; padding: 12px; color: white; outline: none;">
            <button id="btn-send-msg" style="background: var(--accent-purple); border: none; width: 45px; height: 45px; border-radius: 50%; color: white;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="screen-profile" class="screen">
        <div class="banner-container">
            <img id="my-banner-img" src="">
        </div>
        <div class="auth-container" style="margin-top:-90px; position:relative; z-index:2">
            <div style="width:100%; display:flex; justify-content:flex-end; padding-right:20px">
                <i class="fas fa-pencil-alt" onclick="openEditModal()" style="color:#fff; background:rgba(0,0,0,0.5); padding:10px; border-radius:50%; font-size:16px; cursor:pointer"></i>
            </div>
            <img id="my-pic" src="" style="width:120px; height:120px; border-radius:50%; border:4px solid var(--bg-dark); object-fit:cover; background:var(--bg-dark)">
            <h2 id="my-name">@user</h2>
            <p id="my-gender" style="font-size:12px; color:var(--accent-pink); margin-top:-10px"></p>
            <div class="stat-row">
                <div><b id="my-followers-count">0</b><span>Seguidores</span></div>
                <div><b id="my-following-count">0</b><span>Seguindo</span></div>
                <div><b id="my-post-count">0</b><span>Posts</span></div>
            </div>
            <p id="my-status" style="color:#777; max-width: 80%"></p>
            <button class="btn-premium" onclick="logout()" style="background:#222; margin-top:10px; height:40px; padding:0 20px; width:auto">Sair</button>
        </div>
        <div style="border-top: 1px solid #222; margin-top: 10px;">
            <div style="padding: 10px; font-size: 12px; color: #555; text-transform: uppercase; font-weight: bold;"><i class="fas fa-th"></i> Publicações</div>
            <div id="my-posts-grid" class="profile-grid"></div>
        </div>
    </div>

    <div id="screen-view-profile" class="screen">
        <div id="view-profile-header"></div>
        <div style="border-top: 1px solid #222; margin-top: 10px;">
             <div style="padding: 10px; font-size: 12px; color: #555; text-transform: uppercase; font-weight: bold;"><i class="fas fa-th"></i> Publicações</div>
             <div id="view-posts-grid" class="profile-grid"></div>
        </div>
    </div>

    <nav id="main-nav" style="display:none">
        <div onclick="showScreen('feed')"><i class="fas fa-compass"></i></div>
        <div class="plus-fab" onclick="openPostModal()"><i class="fas fa-plus"></i></div>
        <div onclick="showScreen('profile')"><i class="fas fa-user-astronaut"></i></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
            authDomain: "kchat-web-8415c.firebaseapp.com",
            projectId: "kchat-web-8415c",
            storageBucket: "kchat-web-8415c.firebasestorage.app",
            messagingSenderId: "878265144053",
            appId: "1:878265144053:web:407389cd133d955f76abbc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        let base64Avatar = "";
        let base64Banner = ""; 
        let base64PostMedia = "";
        let currentPostId = null; 
        let activeChatTarget = null;
        let chatUnsubscribe = null;

        const DEFAULT_BANNER = "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000";

        function timeAgo(timestamp) {
            if(!timestamp) return "...";
            const diff = Date.now() - timestamp;
            const seconds = Math.floor(diff / 1000);
            if (seconds < 60) return "agora";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `há ${minutes}min`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `há ${hours}h`;
            return new Date(timestamp).toLocaleDateString();
        }

        window.onload = () => {
            const saved = localStorage.getItem('kchat_user');
            if(saved) {
                currentUser = JSON.parse(saved);
                enterApp();
            }
        }

        // Lógica de Media
        function selectAvatar(url, el) {
            base64Avatar = url;
            document.getElementById('img-preview').src = url;
            document.querySelectorAll('.avatar-opt').forEach(img => img.classList.remove('selected'));
            el.classList.add('selected');
        }

        function processImage(input, mode) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if(mode === 'reg') { 
                        base64Avatar = e.target.result; 
                        document.getElementById('img-preview').src = base64Avatar; 
                    } else { 
                        base64Avatar = e.target.result; 
                        document.getElementById('edit-img-preview').src = base64Avatar; 
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function processBanner(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Banner = e.target.result;
                    document.getElementById('edit-banner-preview').src = base64Banner;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function previewMedia(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64PostMedia = e.target.result;
                    const container = document.getElementById('post-media-preview');
                    if(file.type.includes('video')) {
                        container.innerHTML = `<video src="${base64PostMedia}" style="width:100%" autoplay muted loop></video>`;
                    } else {
                        container.innerHTML = `<img src="${base64PostMedia}" style="width:100%">`;
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        // Auth
        async function checkUserExists(user) {
            if(!user) return;
            const doc = await db.collection("usuarios").doc(user.toLowerCase().trim()).get();
            document.getElementById('reg-warn').style.display = doc.exists ? 'block' : 'none';
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(id === 'profile') loadProfile();
            if(id === 'chat-list') loadChatList();
            if(id === 'notifications') markNotificationsAsSeen();
            window.scrollTo(0,0);
        }

        async function handleLogin() {
            const user = document.getElementById('login-user').value.toLowerCase().trim();
            const pass = document.getElementById('login-pass').value;
            const doc = await db.collection("usuarios").doc(user).get();
            if (doc.exists && doc.data().pass === pass) { 
                currentUser = doc.data(); 
                enterApp(); 
            } else { alert("Usuário ou senha incorretos!"); }
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            const pass = document.getElementById('reg-pass').value;
            const gen = document.querySelector('input[name="gen"]:checked').value;
            const status = document.getElementById('onb-status').value || "Oi! Estou no k.chat";
            if(!user || !pass) return alert("Preencha os campos");

            const userData = { 
                user, pass, status, gen, 
                pic: base64Avatar || "https://api.dicebear.com/7.x/avataaars/svg?seed="+user, 
                banner: DEFAULT_BANNER, 
                followers: [], following: [], joined: Date.now() 
            };
            await db.collection("usuarios").doc(user).set(userData);
            currentUser = userData; 
            enterApp();
        }

        function enterApp() { 
            localStorage.setItem('kchat_user', JSON.stringify(currentUser));
            document.getElementById('main-nav').style.display = 'flex'; 
            showScreen('feed'); 
            listenPosts(); 
            listenNotifications();
        }

        // Feed e Posts
        function listenPosts(filter = "") {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('feed-content');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const postId = doc.id;
                    if(filter && !post.content.toLowerCase().includes(filter) && !post.author.toLowerCase().includes(filter)) return;
                    
                    const isLiked = post.likes_list && post.likes_list.includes(currentUser.user);
                    const isVideo = post.media && post.media.includes("data:video");

                    container.innerHTML += `
                        <div class="post-card">
                            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px">
                                <div style="display:flex; align-items:center; gap:10px; cursor:pointer" onclick="openUserProfile('${post.author}')">
                                    <img src="${post.authorPic || 'https://via.placeholder.com/40'}" class="user-avatar">
                                    <div>
                                        <strong>@${post.author}</strong>
                                        <span class="post-time">${timeAgo(post.time)}</span>
                                    </div>
                                </div>
                                ${post.author === currentUser.user ? `<i class="fas fa-trash-alt" style="color:#ff4444; font-size:14px; cursor:pointer" onclick="deletePost('${postId}')"></i>` : ''}
                            </div>
                            <p style="font-size:14px; margin-bottom:5px">${post.content}</p>
                            ${post.media ? `
                                <div class="post-media-wrapper">
                                    ${isVideo ? `<video src="${post.media}" autoplay muted loop playsinline></video>` : `<img src="${post.media}">`}
                                </div>` : ''}
                            <div style="margin-top:12px; display:flex; gap:20px; align-items:center">
                                <div onclick="toggleLike('${postId}', ${JSON.stringify(post.likes_list || [])}, '${post.author}')" style="cursor:pointer">
                                    <i class="${isLiked ? 'fas' : 'far'} fa-heart" style="color:${isLiked ? '#ec4899' : '#555'}"></i>
                                    <span style="font-size:13px; color:#666; margin-left:5px">${post.likes || 0}</span>
                                </div>
                                <div onclick="openComments('${postId}')" style="cursor:pointer">
                                    <i class="far fa-comment" style="color:#555"></i>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        async function submitPost() {
            const text = document.getElementById('post-text-input').value;
            if(!text && !base64PostMedia) return;
            
            const btn = document.getElementById('btn-submit-post');
            btn.innerText = "Publicando...";
            btn.disabled = true;

            await db.collection("posts").add({
                author: currentUser.user, 
                authorPic: currentUser.pic || "",
                content: text, 
                media: base64PostMedia, 
                time: Date.now(), 
                likes: 0, 
                likes_list: []
            });

            document.getElementById('modal-post').style.display = 'none';
            base64PostMedia = ""; 
            document.getElementById('post-media-preview').innerHTML = "";
            document.getElementById('post-text-input').value = "";
            btn.innerText = "Publicar";
            btn.disabled = false;
        }

        async function deletePost(postId) {
            if(confirm("Deseja apagar esta publicação permanentemente?")) {
                await db.collection("posts").doc(postId).delete();
            }
        }

        // Comentários e Likes
        async function openComments(id) {
            currentPostId = id;
            document.getElementById('modal-comments').style.display = 'flex';
            db.collection("posts").doc(id).collection("comentarios").orderBy("time", "asc").onSnapshot(snap => {
                const list = document.getElementById('comments-list');
                list.innerHTML = snap.empty ? "<p style='color:#555; font-size:12px'>Nenhum comentário ainda.</p>" : "";
                snap.forEach(c => {
                    const data = c.data();
                    list.innerHTML += `<div class="comment-item"><b>@${data.user}</b> ${data.text}</div>`;
                });
            });
        }

        async function sendComment() {
            const input = document.getElementById('new-comment-input');
            if(!input.value.trim()) return;
            const text = input.value;
            input.value = "";
            await db.collection("posts").doc(currentPostId).collection("comentarios").add({
                user: currentUser.user, text: text, time: Date.now()
            });
            const post = await db.collection("posts").doc(currentPostId).get();
            sendNotification(post.data().author, `comentou no seu post: "${text.substring(0,20)}..."`);
        }

        async function toggleLike(postId, likesList, author) {
            const ref = db.collection("posts").doc(postId);
            if(likesList.includes(currentUser.user)) {
                await ref.update({ likes: firebase.firestore.FieldValue.increment(-1), likes_list: firebase.firestore.FieldValue.arrayRemove(currentUser.user) });
            } else {
                await ref.update({ likes: firebase.firestore.FieldValue.increment(1), likes_list: firebase.firestore.FieldValue.arrayUnion(currentUser.user) });
                sendNotification(author, "curtiu seu post");
            }
        }

        // Notificações Real-time
        async function sendNotification(toUser, text) {
            if(toUser === currentUser.user) return;
            await db.collection("notificacoes").add({ 
                to: toUser, from: currentUser.user, text, time: Date.now(), seen: false 
            });
        }

        function listenNotifications() {
            db.collection("notificacoes").where("to", "==", currentUser.user).orderBy("time", "desc").onSnapshot(snap => {
                const badge = document.getElementById('notif-badge');
                const unseen = snap.docs.filter(d => !d.data().seen).length;
                
                badge.innerText = unseen > 99 ? "99+" : unseen;
                badge.style.display = unseen > 0 ? 'flex' : 'none';

                const container = document.getElementById('notif-content');
                if(container) {
                    container.innerHTML = snap.empty ? "<p style='padding:20px; color:#555'>Nenhuma notificação.</p>" : "";
                    snap.forEach(doc => {
                        const n = doc.data();
                        container.innerHTML += `<div class="notif-item ${!n.seen ? 'notif-unseen' : ''}">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${n.from}" style="width:30px; border-radius:50%">
                            <div style="flex:1"><b>@${n.from}</b> ${n.text}</div>
                            <span class="post-time">${timeAgo(n.time)}</span>
                        </div>`;
                    });
                }
            });
        }

        async function markNotificationsAsSeen() {
            const snap = await db.collection("notificacoes").where("to", "==", currentUser.user).where("seen", "==", false).get();
            const batch = db.batch();
            snap.forEach(doc => batch.update(doc.ref, { seen: true }));
            await batch.commit();
        }

        // Chat Privado
        async function openPrivateChat(targetUser) {
            activeChatTarget = targetUser;
            document.getElementById('chat-target-name').innerText = "@" + targetUser;
            showScreen('chat');
            const chatId = [currentUser.user, targetUser].sort().join("_");
            
            if(chatUnsubscribe) chatUnsubscribe();
            chatUnsubscribe = db.collection("chats_privados").doc(chatId).collection("mensagens")
                .orderBy("time", "asc").onSnapshot(snap => {
                    const container = document.getElementById('chat-content');
                    container.innerHTML = "";
                    snap.forEach(doc => {
                        const m = doc.data();
                        const isMe = m.sender === currentUser.user;
                        container.innerHTML += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-other'}">${m.text}</div>`;
                    });
                    container.scrollTop = container.scrollHeight;
                });
            document.getElementById('btn-send-msg').onclick = () => sendPrivateMsg(chatId, targetUser);
        }

        async function sendPrivateMsg(chatId, targetUser) {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            input.value = "";
            await db.collection("chats_privados").doc(chatId).collection("mensagens").add({
                sender: currentUser.user, text, time: Date.now()
            });
            await db.collection("chats_privados").doc(chatId).set({
                lastMsg: text, lastTime: Date.now(), participants: [currentUser.user, targetUser]
            });
            sendNotification(targetUser, "te enviou uma mensagem");
        }

        async function loadChatList() {
            db.collection("chats_privados").where("participants", "array-contains", currentUser.user)
                .orderBy("lastTime", "desc").onSnapshot(snap => {
                    const container = document.getElementById('chat-list-content');
                    container.innerHTML = snap.empty ? "<p style='padding:20px; color:#555'>Nenhuma conversa ativa.</p>" : "";
                    snap.forEach(doc => {
                        const data = doc.data();
                        const other = data.participants.find(p => p !== currentUser.user);
                        container.innerHTML += `
                            <div class="chat-list-item" onclick="openPrivateChat('${other}')">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${other}" class="user-avatar">
                                <div style="flex:1"><b>@${other}</b><br><small style="color:#666">${data.lastMsg.substring(0,30)}...</small></div>
                                <span style="font-size:10px; color:#444">${timeAgo(data.lastTime)}</span>
                            </div>`;
                    });
                });
        }

        // Perfil e Grid
        function openPostModal() { document.getElementById('modal-post').style.display = 'flex'; }
        
        function openEditModal() {
            document.getElementById('edit-status-input').value = currentUser.status;
            document.getElementById('edit-img-preview').src = currentUser.pic;
            document.getElementById('edit-banner-preview').src = currentUser.banner || DEFAULT_BANNER;
            document.getElementById('modal-edit').style.display = 'flex';
        }

        async function saveFullEdit() {
            const newStatus = document.getElementById('edit-status-input').value;
            const update = { 
                status: newStatus, 
                pic: base64Avatar || currentUser.pic, 
                banner: base64Banner || currentUser.banner || DEFAULT_BANNER 
            };
            await db.collection("usuarios").doc(currentUser.user).update(update);
            currentUser = {...currentUser, ...update};
            localStorage.setItem('kchat_user', JSON.stringify(currentUser));
            loadProfile(); 
            document.getElementById('modal-edit').style.display = 'none';
            base64Avatar = ""; base64Banner = "";
        }

        async function loadProfile() {
            const doc = await db.collection("usuarios").doc(currentUser.user).get();
            const data = doc.data();
            document.getElementById('my-pic').src = data.pic;
            document.getElementById('my-banner-img').src = data.banner || DEFAULT_BANNER;
            document.getElementById('my-name').innerText = "@" + data.user;
            document.getElementById('my-status').innerText = data.status;
            document.getElementById('my-gender').innerText = data.gen;
            document.getElementById('my-followers-count').innerText = (data.followers || []).length;
            document.getElementById('my-following-count').innerText = (data.following || []).length;
            
            const snap = await db.collection("posts").where("author", "==", currentUser.user).orderBy("time", "desc").get();
            document.getElementById('my-post-count').innerText = snap.size;
            
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                const isVid = p.media && p.media.includes("data:video");
                grid.innerHTML += `
                    <div class="grid-item">
                        ${p.media ? (isVid ? `<video src="${p.media}"></video><i class="fas fa-play"></i>` : `<img src="${p.media}">`) : `<div style="font-size:8px; padding:10px; color:#444">${p.content.substring(0,20)}</div>`}
                    </div>`;
            });
        }

        async function openUserProfile(username) {
            if(username === currentUser.user) { showScreen('profile'); return; }
            const userDoc = await db.collection("usuarios").doc(username).get();
            if(!userDoc.exists) return;
            const userData = userDoc.data();
            const isFollowing = (userData.followers || []).includes(currentUser.user);

            showScreen('view-profile');
            document.getElementById('view-profile-header').innerHTML = `
                <div class="banner-container">
                    <i class="fas fa-arrow-left" onclick="showScreen('feed')" style="position:absolute; top:20px; left:20px; z-index:10; background:rgba(0,0,0,0.5); padding:10px; border-radius:50%; cursor:pointer"></i>
                    <img src="${userData.banner || DEFAULT_BANNER}" class="view-banner-img">
                </div>
                <div class="auth-container" style="margin-top:-90px; position:relative; z-index:2">
                    <img src="${userData.pic}" style="width:120px; height:120px; border-radius:50%; border:4px solid var(--bg-dark); object-fit:cover; background:var(--bg-dark)">
                    <h2>@${userData.user}</h2>
                    <div class="stat-row">
                        <div><b>${(userData.followers || []).length}</b><span>Seguidores</span></div>
                        <div><b>${(userData.following || []).length}</b><span>Seguindo</span></div>
                    </div>
                    <div style="display:flex; gap:10px; width:100%">
                        <button class="btn-premium" onclick="toggleFollow('${username}')" style="flex:1; background:${isFollowing ? '#222' : ''}">${isFollowing ? 'Seguindo' : 'Seguir'}</button>
                        <button class="btn-premium" onclick="openPrivateChat('${username}')" style="width:60px; background:#1a1a1e; border:1px solid #333"><i class="fas fa-comment"></i></button>
                    </div>
                    <p style="color:var(--accent-pink); font-size:12px; margin-top:5px">${userData.gen}</p>
                    <p style="color:#777; max-width:80%">${userData.status}</p>
                </div>`;

            const postSnap = await db.collection("posts").where("author", "==", username).orderBy("time", "desc").get();
            const grid = document.getElementById('view-posts-grid');
            grid.innerHTML = "";
            postSnap.forEach(p => {
                const data = p.data();
                const isVid = data.media && data.media.includes("data:video");
                grid.innerHTML += `
                    <div class="grid-item">
                        ${data.media ? (isVid ? `<video src="${data.media}"></video><i class="fas fa-play"></i>` : `<img src="${data.media}">`) : `<div style="font-size:8px; padding:10px; color:#444">${data.content.substring(0,20)}</div>`}
                    </div>`;
            });
        }

        async function toggleFollow(targetUser) {
            const myRef = db.collection("usuarios").doc(currentUser.user);
            const targetRef = db.collection("usuarios").doc(targetUser);
            const targetDoc = await targetRef.get();
            const followers = targetDoc.data().followers || [];

            if (followers.includes(currentUser.user)) {
                await myRef.update({ following: firebase.firestore.FieldValue.arrayRemove(targetUser) });
                await targetRef.update({ followers: firebase.firestore.FieldValue.arrayRemove(currentUser.user) });
            } else {
                await myRef.update({ following: firebase.firestore.FieldValue.arrayUnion(targetUser) });
                await targetRef.update({ followers: firebase.firestore.FieldValue.arrayUnion(currentUser.user) });
                sendNotification(targetUser, "começou a te seguir");
            }
            openUserProfile(targetUser);
        }

        function searchContent(val) { listenPosts(val.toLowerCase()); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
