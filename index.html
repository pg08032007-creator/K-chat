<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KChat | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8a2be2; --secondary: #ff007f; --bg: #050508; --card: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Plus Jakarta Sans', sans-serif; }
        body, html { margin: 0; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* --- AUTH STYLE --- */
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100%; background: radial-gradient(circle, #1a152e, #050508); }
        .auth-card { background: var(--card); backdrop-filter: blur(25px); padding: 35px; border-radius: 35px; width: 90%; max-width: 380px; border: 1px solid var(--border); text-align: center; }
        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 15px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 12px; font-size: 0.9em; opacity: 0.5; }
        .tab.active { background: white; color: black; opacity: 1; font-weight: bold; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; outline: none; }
        
        /* Upload Area */
        .upload-area { margin: 15px 0; border: 2px dashed var(--border); padding: 15px; border-radius: 20px; cursor: pointer; position: relative; }
        .upload-area:hover { border-color: var(--primary); }
        #preview-reg { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; }

        .gen-select { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .gen-icon { font-size: 1.3em; cursor: pointer; opacity: 0.3; padding: 10px; border-radius: 50%; border: 1px solid transparent; }
        .gen-icon.selected { opacity: 1; color: var(--primary); border-color: var(--primary); background: rgba(138,43,226,0.1); }
        .btn-main { width: 100%; padding: 16px; border-radius: 15px; border: none; background: white; color: #000; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* --- APP STYLE --- */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.5); }
        .search-wrap { flex: 1; position: relative; }
        .search-wrap input { padding: 10px 10px 10px 40px; margin: 0; border-radius: 12px; font-size: 0.8em; }
        .search-wrap i { position: absolute; left: 15px; top: 12px; opacity: 0.5; }
        .content { flex: 1; overflow-y: auto; padding: 20px 20px 120px; }
        .post { background: var(--card); padding: 18px; border-radius: 25px; margin-bottom: 15px; border: 1px solid var(--border); }
        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; padding: 8px; border: 1px solid var(--border); z-index: 100; }
        nav i { font-size: 1.4em; color: rgba(255,255,255,0.3); cursor: pointer; padding: 12px; }
        nav i.active { color: white; }
        .plus-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); width: 52px; height: 52px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 20px rgba(138,43,226,0.4); }
        #profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; padding: 40px 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="margin-bottom: 20px; font-weight: 800; color: var(--primary);">KChat</h2>
            <div class="tabs" id="auth-tabs">
                <div class="tab active" onclick="setMode('login')">Login</div>
                <div class="tab" onclick="setMode('reg')">Registro</div>
            </div>
            
            <div id="step-1">
                <input type="text" id="user-in" placeholder="Nome de usuário">
                <input type="password" id="pass-in" placeholder="Senha">
            </div>
            
            <div id="step-2" style="display: none;">
                <p style="font-size: 0.8em; color: var(--primary);">Nome livre! Complete o perfil:</p>
                <input type="number" id="age-in" placeholder="Idade">
                
                <div class="gen-select">
                    <i class="fas fa-mars gen-icon" onclick="pickGen(this, 'M')"></i>
                    <i class="fas fa-venus gen-icon" onclick="pickGen(this, 'F')"></i>
                    <i class="fas fa-genderless gen-icon" onclick="pickGen(this, 'NB')"></i>
                </div>

                <div class="upload-area" onclick="document.getElementById('file-in').click()">
                    <i class="fas fa-camera"></i> <small>Foto de Perfil</small>
                    <input type="file" id="file-in" hidden accept="image/*" onchange="previewFile()">
                    <img id="preview-reg" src="">
                </div>
            </div>
            
            <button class="btn-main" onclick="handleAuth()" id="btn-label">ENTRAR</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div style="font-weight: 900; color: var(--primary);">K.</div>
            <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Buscar usuários reais..." oninput="searchUsers()">
            </div>
        </header>

        <div id="search-results" class="content" style="display:none; position:fixed; background:var(--bg); z-index:100; width:100%;"></div>

        <div id="home" class="content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0;">Global Feed</h3>
                <i class="fas fa-sync-alt" onclick="renderPosts()" style="color:var(--primary); cursor:pointer;"></i>
            </div>
            <div id="feed"></div>
        </div>

        <div id="profile" class="content" style="display:none; text-align:center;">
            <div style="position: relative; display: inline-block; margin-top: 30px;">
                <img id="me-avatar" src="" style="width:110px; height:110px; border-radius:40px; border:3px solid var(--primary); object-fit: cover;">
                <div onclick="editProfile()" style="position: absolute; bottom: 0; right: 0; background: #fff; color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--bg);"><i class="fas fa-pencil-alt" style="font-size: 0.8em;"></i></div>
            </div>
            <h2 id="me-name" style="margin: 15px 0 5px;"></h2>
            <p id="me-bio" style="opacity:0.6; padding: 0 40px;"></p>
        </div>

        <nav>
            <i class="fas fa-home active" onclick="showTab('home', this)"></i>
            <div class="plus-btn" onclick="newPost()"><i class="fas fa-plus"></i></div>
            <i class="fas fa-user" onclick="showTab('profile', this)"></i>
        </nav>
    </div>

    <div id="profile-modal">
        <div style="text-align:left;"><i class="fas fa-arrow-left" onclick="this.parentElement.style.display='none'" style="font-size:1.5em; cursor:pointer;"></i></div>
        <div id="profile-target"></div>
    </div>

    <script>
        let mode = 'login';
        let selectedGen = '';
        let userPhoto = '';
        let currentUser = null;
        let tempUser = null;

        let users = JSON.parse(localStorage.getItem('k_users')) || [];
        let posts = JSON.parse(localStorage.getItem('k_posts')) || [{u: 'Admin', t: 'Bem-vindo ao KChat v4!'}];

        function setMode(m) {
            mode = m;
            tempUser = null;
            document.getElementById('step-1').style.display = 'block';
            document.getElementById('step-2').style.display = 'none';
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (m === 'login' && i === 0) || (m === 'reg' && i === 1)));
            document.getElementById('btn-label').innerText = m === 'reg' ? 'VERIFICAR NOME' : 'ENTRAR';
        }

        function previewFile() {
            const file = document.getElementById('file-in').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                userPhoto = reader.result;
                const img = document.getElementById('preview-reg');
                img.src = reader.result;
                img.style.display = 'block';
            }
            if (file) reader.readAsDataURL(file);
        }

        function pickGen(el, g) {
            selectedGen = g;
            document.querySelectorAll('.gen-icon').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        function handleAuth() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();

            if (mode === 'reg') {
                if (!tempUser) { // ETAPA 1
                    if (!u || !p) return alert("Crie um nome e uma senha!");
                    if (users.some(x => x.user.toLowerCase() === u.toLowerCase())) return alert("Nome já existe!");
                    tempUser = { user: u, pass: p };
                    document.getElementById('step-1').style.display = 'none';
                    document.getElementById('step-2').style.display = 'block';
                    document.getElementById('btn-label').innerText = "CONCLUIR";
                } else { // ETAPA 2
                    const age = document.getElementById('age-in').value;
                    if (!age || !selectedGen) return alert("Falta idade ou gênero!");
                    
                    const newUser = {
                        user: tempUser.user, pass: tempUser.pass, age: age,
                        img: userPhoto || `https://api.dicebear.com/7.x/avataaars/svg?seed=${tempUser.user}`,
                        bio: 'Explorando o KChat!', followers: 0
                    };
                    users.push(newUser);
                    localStorage.setItem('k_users', JSON.stringify(users));
                    alert("Conta criada!"); setMode('login');
                }
            } else { // LOGIN
                const found = users.find(x => x.user.toLowerCase() === u.toLowerCase());
                if (!found) return alert("Usuário não existe!");
                if (found.pass !== p) return alert("Senha incorreta!");
                currentUser = found;
                startApp();
            }
        }

        function startApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('me-name').innerText = currentUser.user;
            document.getElementById('me-bio').innerText = currentUser.bio;
            document.getElementById('me-avatar').src = currentUser.img;
            renderPosts();
        }

        function showTab(id, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('nav i').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('search-results').style.display = 'none';
        }

        function newPost() {
            const txt = prompt("O que está pensando?");
            if (txt) {
                posts.push({ u: currentUser.user, t: txt });
                localStorage.setItem('k_posts', JSON.stringify(posts));
                renderPosts();
            }
        }

        function renderPosts() {
            const feed = document.getElementById('feed');
            feed.innerHTML = posts.slice().reverse().map(p => `
                <div class="post">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer;" onclick="openUser('${p.u}')">
                        <img src="${users.find(x=>x.user===p.u)?.img || 'https://via.placeholder.com/30'}" style="width:30px; height:30px; border-radius:10px; object-fit:cover;">
                        <b>@${p.u}</b>
                    </div>
                    <p>${p.t}</p>
                </div>
            `).join('');
        }

        function searchUsers() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const res = document.getElementById('search-results');
            if (q.length > 0) {
                res.style.display = 'block';
                const filtered = users.filter(u => u.user.toLowerCase().includes(q));
                res.innerHTML = filtered.map(u => `
                    <div onclick="openUser('${u.user}')" style="display:flex; align-items:center; gap:15px; padding:15px; border-bottom:1px solid var(--border);">
                        <img src="${u.img}" style="width:40px; height:40px; border-radius:12px; object-fit:cover;">
                        <div><b>${u.user}</b><br><small style="opacity:0.5">${u.followers} seguidores</small></div>
                    </div>
                `).join('');
            } else res.style.display = 'none';
        }

        function openUser(name) {
            const u = users.find(x => x.user === name);
            if (!u) return;
            const modal = document.getElementById('profile-modal');
            document.getElementById('profile-target').innerHTML = `
                <img src="${u.img}" style="width:110px; height:110px; border-radius:40px; border:3px solid var(--primary); object-fit:cover;">
                <h1>${u.user}</h1>
                <p style="opacity:0.6;">${u.bio}</p>
                <div style="display:flex; justify-content:center; gap:40px; margin:25px 0;">
                    <div><b>${u.followers}</b><br><small>Seguidores</small></div>
                    <div><b>${Math.floor(u.followers/2)}</b><br><small>Seguindo</small></div>
                </div>
                <button onclick="this.innerText='Seguindo'" style="width:80%; padding:15px; border-radius:15px; border:none; background:white; color:black; font-weight:800;">SEGUIR</button>
            `;
            modal.style.display = 'block';
        }

        function editProfile() {
            const b = prompt("Nova bio:", currentUser.bio);
            if (b !== null) {
                currentUser.bio = b;
                document.getElementById('me-bio').innerText = b;
                const idx = users.findIndex(x => x.user === currentUser.user);
                users[idx] = currentUser;
                localStorage.setItem('k_users', JSON.stringify(users));
            }
        }
    </script>
</body>
</html>
