<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Mantendo o seu estilo premium que criamos */
        :root { --bg-dark: #0a0a0c; --bg-card: #141417; --accent-purple: #a855f7; --accent-pink: #ec4899; --text-main: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }
        .screen { display: none; min-height: 100vh; padding-bottom: 90px; }
        .screen.active { display: block; }
        .auth-container { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .logo-k { font-size: 42px; font-weight: 900; background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-input-group { width: 100%; background: var(--bg-card); border-radius: 18px; padding: 18px; border: 1px solid #1f1f23; display: flex; align-items: center; justify-content: space-between; }
        .custom-input-group input { background: transparent; border: none; width: 100%; color: white; outline: none; }
        .btn-premium { width: 100%; padding: 20px; border-radius: 20px; border: none; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; font-weight: 800; cursor: pointer; }
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(15, 15, 18, 0.9); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 12px; backdrop-filter: blur(15px); border: 1px solid #222; }
        .plus-fab { background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); width: 60px; height: 60px; border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; margin-top: -40px; box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4); }
        .post-card { background: var(--bg-card); border-radius: 20px; padding: 15px; margin: 15px; border: 1px solid #1f1f23; }
        .avatar-upload { width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--accent-purple); object-fit: cover; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="auth-container">
            <div class="logo-k">K.</div>
            <div class="custom-input-group"><input type="text" id="login-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><input type="password" id="login-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="handleLogin()">Entrar</button>
            <p onclick="showScreen('register')">Cadastre-se</p>
        </div>
    </div>

    <div id="screen-register" class="screen">
        <div class="auth-container">
            <div class="logo-k">Cadastro</div>
            <div class="custom-input-group"><input type="text" id="reg-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><input type="password" id="reg-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="handleRegister()">Continuar</button>
        </div>
    </div>

    <div id="screen-feed" class="screen">
        <header style="padding:20px; display:flex; justify-content:space-between;">
            <div class="logo-k" style="font-size:24px">K.</div>
            <i class="fas fa-sync-alt" onclick="listenPosts()"></i>
        </header>
        <div id="feed-content"></div>
    </div>

    <nav id="main-nav" style="display:none">
        <div onclick="showScreen('feed')"><i class="fas fa-compass"></i></div>
        <div class="plus-fab" onclick="newPost()"><i class="fas fa-plus"></i></div>
        <div onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
    </nav>

    <script>
        // --- COLE SUAS CONFIGURAÇÕES DO PASSO 2 AQUI ---
        const firebaseConfig = {
  apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
  authDomain: "kchat-web-8415c.firebaseapp.com",
  projectId: "kchat-web-8415c",
  storageBucket: "kchat-web-8415c.firebasestorage.app",
  messagingSenderId: "878265144053",
  appId: "1:878265144053:web:407389cd133d955f76abbc",
  measurementId: "G-5SZQE6TP9L"
};
        };

        // Inicializa Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = null;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        // LOGIN SINCRONIZADO
        async function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            const userDoc = await db.collection("usuarios").doc(user).get();
            if (userDoc.exists && userDoc.data().pass === pass) {
                currentUser = userDoc.data();
                enterApp();
            } else { alert("Usuário ou senha incorretos!"); }
        }

        // REGISTRO SINCRONIZADO
        async function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            
            const check = await db.collection("usuarios").doc(user).get();
            if(check.exists) return alert("Usuário já existe!");

            await db.collection("usuarios").doc(user).set({ user, pass });
            currentUser = { user, pass };
            enterApp();
        }

        function enterApp() {
            document.getElementById('main-nav').style.display = 'flex';
            showScreen('feed');
            listenPosts(); // Começa a ouvir posts em tempo real
        }

        // POSTS EM TEMPO REAL (Aparece no app e na web ao mesmo tempo)
        function listenPosts() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('feed-content');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const post = doc.data();
                    container.innerHTML += `
                        <div class="post-card">
                            <strong>@${post.author}</strong>
                            <p>${post.content}</p>
                        </div>
                    `;
                });
            });
        }

        async function newPost() {
            const text = prompt("O que quer postar?");
            if(!text) return;
            await db.collection("posts").add({
                author: currentUser.user,
                content: text,
                time: Date.now()
            });
        }
        
        function logout() { location.reload(); }
    </script>
</body>
</html>
