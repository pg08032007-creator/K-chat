<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KCHΛT | Ultra Persistence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        body { background-color: #050507; color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .post-card { background: #111118; border: 1px solid rgba(255,255,255,0.05); border-radius: 2.5rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .gender-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: 0.3s; cursor: pointer; }
        .gender-btn.active { border-color: #a855f7; background: rgba(168, 85, 247, 0.2); box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Gerenciador de Banco de Dados Local (Persistent)
        const DB = {
            get: (key, def) => JSON.parse(localStorage.getItem(key)) || def,
            save: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
            remove: (key) => localStorage.removeItem(key)
        };

        function App() {
            // Tenta carregar o usuário já logado do localStorage
            const [user, setUser] = useState(() => DB.get('kchat_active_session', null));
            const [dbUsers, setDbUsers] = useState(() => DB.get('kchat_users', []));
            const [posts, setPosts] = useState(() => DB.get('kchat_posts', []));
            const [messages, setMessages] = useState(() => DB.get('kchat_messages', []));
            
            const [view, setView] = useState('feed');
            const [targetUser, setTargetUser] = useState(null);
            const [search, setSearch] = useState('');

            // Sincronização constante com o LocalStorage
            useEffect(() => {
                DB.save('kchat_users', dbUsers);
                DB.save('kchat_posts', posts);
                DB.save('kchat_messages', messages);
                
                // Se o usuário estiver logado, mantém os dados dele atualizados (bio, etc)
                if (user) {
                    const freshData = dbUsers.find(u => u.id === user.id);
                    if (freshData) {
                        DB.save('kchat_active_session', freshData);
                    }
                }
            }, [dbUsers, posts, messages, user]);

            const handleLogin = (name, pass) => {
                const found = dbUsers.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
                if (found) {
                    setUser(found);
                    DB.save('kchat_active_session', found);
                } else alert("Usuário ou senha incorretos!");
            };

            const handleRegister = (data) => {
                if(dbUsers.find(u => u.name.toLowerCase() === data.name.toLowerCase())) {
                    return alert("Este nome de usuário já existe!");
                }
                const newUser = { 
                    ...data, 
                    id: crypto.randomUUID(), 
                    bio: 'Novo explorador no KChat', 
                    followers: [],
                    joinedAt: new Date().toISOString()
                };
                const updatedUsers = [...dbUsers, newUser];
                setDbUsers(updatedUsers);
                setUser(newUser);
                DB.save('kchat_active_session', newUser);
            };

            const handleLogout = () => {
                DB.remove('kchat_active_session');
                setUser(null);
                setView('feed');
            };

            const updateMyProfile = (newData) => {
                const updated = dbUsers.map(u => u.id === user.id ? { ...u, ...newData } : u);
                setDbUsers(updated);
                setUser({ ...user, ...newData });
            };

            const openProfile = (u) => {
                setTargetUser(u);
                setView(u.id === user.id ? 'profile' : 'other_profile');
            };

            // Se não houver sessão ativa, mostra tela de Login/Cadastro
            if (!user) return <AuthScreen onLogin={handleLogin} onRegister={handleRegister} />;

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto bg-[#050507] relative shadow-2xl">
                    <header className="h-16 flex items-center justify-between px-6 sticky top-0 glass z-50">
                        <h1 className="text-2xl font-black italic text-purple-500 tracking-tighter cursor-pointer" onClick={() => setView('feed')}>KCHΛT</h1>
                        <div className="flex gap-4">
                            <i className="bi bi-chat-dots text-xl text-slate-400" onClick={() => setView('chats')}></i>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-24 hide-scrollbar">
                        {view === 'feed' && <Feed posts={posts} onUserClick={openProfile} />}
                        
                        {view === 'search' && (
                            <div className="p-6 fade-in">
                                <input className="w-full bg-[#111118] p-4 rounded-2xl outline-none border border-white/5 mb-6 focus:border-purple-500 transition" 
                                    placeholder="Buscar usuários..." value={search} onChange={e => setSearch(e.target.value)} />
                                {dbUsers.filter(u => u.name.toLowerCase().includes(search.toLowerCase()) && u.id !== user.id).map(u => (
                                    <div key={u.id} onClick={() => openProfile(u)} className="flex items-center gap-4 p-4 mb-2 bg-[#111118] rounded-2xl active:scale-95 transition">
                                        <img src={u.avatar} className="w-12 h-12 rounded-full border border-purple-500/30 object-cover" />
                                        <div className="flex-1 font-bold">@{u.name}</div>
                                        <i className="bi bi-chevron-right text-slate-700"></i>
                                    </div>
                                ))}
                            </div>
                        )}

                        {(view === 'profile' || view === 'other_profile') && (
                            <ProfileView 
                                profile={view === 'profile' ? dbUsers.find(u => u.id === user.id) : targetUser} 
                                isMe={view === 'profile'} 
                                posts={posts}
                                onUpdate={updateMyProfile}
                                onLogout={handleLogout}
                                onMessage={(u) => { setTargetUser(u); setView('chat_room'); }}
                            />
                        )}

                        {view === 'chats' && <ChatList users={dbUsers} me={user} messages={messages} onSelect={(u) => { setTargetUser(u); setView('chat_room'); }} />}
                        
                        {view === 'chat_room' && <ChatRoom partner={targetUser} me={user} messages={messages} setMessages={setMessages} onBack={() => setView('chats')} />}

                        {view === 'create' && <CreatePost user={user} onDone={(p) => { setPosts([p, ...posts]); setView('feed'); }} />}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 h-20 glass flex items-center justify-around z-50 max-w-md mx-auto rounded-t-[2.5rem]">
                        <i className={`bi bi-house-door${view==='feed'?'-fill text-purple-500':' text-slate-600'} text-2xl`} onClick={()=>setView('feed')}></i>
                        <i className={`bi bi-search${view==='search'?'-fill text-purple-500':' text-slate-600'} text-2xl`} onClick={()=>setView('search')}></i>
                        <div className="w-12 h-12 bg-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-500/40 active:scale-90 transition" onClick={()=>setView('create')}>
                            <i className="bi bi-plus-lg text-white text-xl"></i>
                        </div>
                        <i className={`bi bi-person${view==='profile'?'-fill text-purple-500':' text-slate-600'} text-2xl`} onClick={()=>setView('profile')}></i>
                    </nav>
                </div>
            );
        }

        // --- SUBCOMPONENTES ---

        function AuthScreen({ onLogin, onRegister }) {
            const [isReg, setIsReg] = useState(false);
            const [form, setForm] = useState({ name: '', pass: '', gender: 'gender-ambiguous', avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Math.random()}` });
            
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#050507]">
                    <div className="w-full max-w-sm bg-[#111118] p-10 rounded-[3rem] text-center border border-white/5 fade-in">
                        <h2 className="text-4xl font-black italic text-purple-600 mb-8 tracking-tighter uppercase">KCHΛT</h2>
                        <div className="space-y-4">
                            <input className="w-full bg-white/5 p-4 rounded-2xl outline-none focus:ring-1 ring-purple-500 transition" placeholder="Usuário" onChange={e => setForm({...form, name: e.target.value})} />
                            <input className="w-full bg-white/5 p-4 rounded-2xl outline-none focus:ring-1 ring-purple-500 transition" type="password" placeholder="Senha" onChange={e => setForm({...form, pass: e.target.value})} />
                            
                            {isReg && (
                                <div className="flex justify-center gap-4 py-4">
                                    {['gender-male', 'gender-female', 'gender-ambiguous'].map((icon) => (
                                        <div key={icon} className={`gender-btn ${form.gender === icon ? 'active' : 'bg-white/5 text-slate-500'}`} onClick={() => setForm({...form, gender: icon})}>
                                            <i className={`bi bi-${icon} text-xl`}></i>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <button className="w-full py-4 bg-purple-600 rounded-2xl font-black uppercase tracking-widest mt-4 shadow-lg active:scale-95 transition" 
                                onClick={() => isReg ? onRegister(form) : onLogin(form.name, form.pass)}>
                                {isReg ? 'Criar Conta' : 'Entrar'}
                            </button>
                            <p className="text-slate-500 text-xs mt-6 cursor-pointer hover:text-white transition" onClick={() => setIsReg(!isReg)}>
                                {isReg ? 'Já possui conta? Faça login' : 'Novo por aqui? Cadastre-se'}
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        function Feed({ posts, onUserClick }) {
            return (
                <div className="p-4 space-y-6 fade-in">
                    {posts.length === 0 ? (
                        <div className="flex flex-col items-center justify-center py-20 text-slate-600">
                            <i className="bi bi-wind text-4xl mb-2"></i>
                            <p className="text-sm">O feed está vazio hoje...</p>
                        </div>
                    ) : (
                        posts.map(p => (
                            <article key={p.id} className="post-card overflow-hidden fade-in">
                                <div className="p-4 flex items-center gap-3 cursor-pointer" onClick={() => onUserClick({name: p.user, avatar: p.avatar, id: p.userId})}>
                                    <img src={p.avatar} className="w-9 h-9 rounded-full border border-purple-500/20 object-cover" />
                                    <span className="font-bold text-xs uppercase tracking-widest">@{p.user}</span>
                                </div>
                                <img src={p.img} className="w-full aspect-square object-cover" loading="lazy" />
                                <div className="p-5">
                                    <div className="flex gap-4 mb-3">
                                        <i className="bi bi-heart-fill text-xl text-purple-600"></i>
                                        <i className="bi bi-chat text-xl text-slate-300"></i>
                                    </div>
                                    <p className="text-sm text-slate-300 leading-relaxed"><span className="font-bold mr-2 text-white">@{p.user}</span>{p.text}</p>
                                </div>
                            </article>
                        ))
                    )}
                </div>
            );
        }

        function ProfileView({ profile, isMe, posts, onUpdate, onLogout, onMessage }) {
            const [isEditing, setIsEditing] = useState(false);
            const [bioText, setBioText] = useState(profile?.bio || '');
            const myPosts = posts.filter(p => p.userId === profile?.id || p.user === profile?.name);

            return (
                <div className="fade-in">
                    <div className="p-8 flex flex-col items-center relative border-b border-white/5">
                        {isMe && (
                            <div className="absolute top-6 right-6 flex gap-2">
                                <button onClick={() => { if(isEditing) onUpdate({bio: bioText}); setIsEditing(!isEditing); }} 
                                    className="w-10 h-10 bg-purple-600/10 rounded-full flex items-center justify-center text-purple-500">
                                    <i className={`bi bi-${isEditing ? 'check-lg text-xl' : 'pencil'}`}></i>
                                </button>
                            </div>
                        )}
                        <img src={profile?.avatar} className="w-28 h-28 rounded-full border-4 border-purple-600 p-1 mb-4 shadow-2xl shadow-purple-500/20 object-cover" />
                        <h3 className="text-xl font-black uppercase italic tracking-tighter">@{profile?.name}</h3>
                        
                        {isEditing ? (
                            <textarea className="w-full bg-white/5 rounded-2xl p-4 mt-4 text-sm text-center outline-none border border-purple-500 focus:ring-2 ring-purple-500/20" 
                                value={bioText} onChange={e => setBioText(e.target.value)} placeholder="Sua biografia..." rows="3" />
                        ) : (
                            <p className="text-slate-400 text-sm mt-3 text-center px-6 leading-relaxed italic">
                                "{profile?.bio || 'Sem biografia...'}"
                            </p>
                        )}

                        <div className="flex gap-3 mt-8 w-full px-2">
                            {!isMe ? (
                                <button className="flex-1 py-4 bg-purple-600 rounded-2xl font-bold text-xs uppercase shadow-lg active:scale-95 transition" onClick={() => onMessage(profile)}>Mandar Mensagem</button>
                            ) : (
                                <button onClick={onLogout} className="w-full py-4 border border-red-500/30 text-red-500 rounded-2xl font-bold text-xs uppercase active:bg-red-500/10 transition">Sair da Conta</button>
                            )}
                        </div>
                    </div>
                    <div className="grid grid-cols-3 gap-1 p-1">
                        {myPosts.map(p => <img key={p.id} src={p.img} className="aspect-square object-cover rounded-md" />)}
                    </div>
                </div>
            );
        }

        function ChatList({ users, me, messages, onSelect }) {
            const others = users.filter(u => u.id !== me.id);
            return (
                <div className="p-6 fade-in space-y-4">
                    <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Suas Conversas</h2>
                    {others.length === 0 ? <p className="text-slate-600 text-center py-10">Ninguém para conversar ainda.</p> : 
                    others.map(u => {
                        const last = [...messages].reverse().find(m => (m.from === me.id && m.to === u.id) || (m.from === u.id && m.to === me.id));
                        return (
                            <div key={u.id} onClick={() => onSelect(u)} className="flex items-center gap-4 p-4 bg-[#111118] rounded-[2rem] border border-white/5 active:scale-95 transition">
                                <img src={u.avatar} className="w-12 h-12 rounded-full border border-purple-500/20 object-cover" />
                                <div className="flex-1">
                                    <p className="font-bold text-sm">@{u.name}</p>
                                    <p className="text-xs text-slate-500 truncate">{last ? last.text : 'Toque para conversar'}</p>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function ChatRoom({ partner, me, messages, setMessages, onBack }) {
            const [text, setText] = useState('');
            const chatLog = messages.filter(m => (m.from === me.id && m.to === partner.id) || (m.from === partner.id && m.to === me.id));

            const send = () => {
                if(!text.trim()) return;
                const m = { id: Date.now(), from: me.id, to: partner.id, text, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                setMessages([...messages, m]);
                setText('');
            };

            return (
                <div className="flex flex-col h-[calc(100vh-64px)] fixed inset-0 z-[60] bg-[#050507] max-w-md mx-auto">
                    <div className="p-4 flex items-center gap-4 glass">
                        <i className="bi bi-arrow-left text-xl cursor-pointer" onClick={onBack}></i>
                        <img src={partner.avatar} className="w-10 h-10 rounded-full object-cover" />
                        <span className="font-bold">@{partner.name}</span>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-4 hide-scrollbar">
                        {chatLog.map(m => (
                            <div key={m.id} className={`flex ${m.from === me.id ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[75%] p-4 rounded-[1.8rem] text-sm ${m.from === me.id ? 'bg-purple-600 text-white rounded-tr-none' : 'bg-[#111118] text-slate-200 rounded-tl-none'}`}>
                                    {m.text}
                                    <p className="text-[9px] opacity-40 mt-1 text-right">{m.time}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-6 flex gap-3 bg-[#050507] border-t border-white/5">
                        <input className="flex-1 bg-[#111118] p-4 rounded-2xl outline-none focus:ring-1 ring-purple-500" placeholder="Escreva aqui..." value={text} onChange={e => setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} />
                        <button onClick={send} className="bg-purple-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition"><i className="bi bi-send-fill text-xl"></i></button>
                    </div>
                </div>
            );
        }

        function CreatePost({ user, onDone }) {
            const [img, setImg] = useState(null);
            const [text, setText] = useState('');
            const handleFile = (e) => {
                const reader = new FileReader();
                reader.onload = () => setImg(reader.result);
                reader.readAsDataURL(e.target.files[0]);
            };
            return (
                <div className="p-8 space-y-6 fade-in">
                    <h2 className="text-xl font-bold uppercase italic tracking-widest text-purple-500">Criar Momento</h2>
                    <label className="block aspect-square bg-[#111118] border-2 border-dashed border-white/10 rounded-[3rem] overflow-hidden flex items-center justify-center cursor-pointer relative group">
                        {img ? <img src={img} className="w-full h-full object-cover" /> : <div className="text-center group-hover:scale-110 transition duration-300"><i className="bi bi-camera text-4xl text-purple-600 block mb-2"></i><span className="text-[10px] text-slate-500 uppercase font-black">Adicionar Foto</span></div>}
                        <input type="file" className="hidden" accept="image/*" onChange={handleFile} />
                    </label>
                    <textarea className="w-full bg-transparent border-b border-white/10 p-4 outline-none text-white h-24 text-sm" placeholder="O que você está pensando?" onChange={e => setText(e.target.value)} />
                    <button onClick={() => img && onDone({id: Date.now(), userId: user.id, user: user.name, avatar: user.avatar, img, text})} 
                        className="w-full py-5 bg-purple-600 rounded-[2rem] font-black uppercase tracking-widest shadow-lg shadow-purple-500/30 active:scale-95 transition">Publicar no Feed</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
