<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KChat Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #0f172a; color: white; padding-bottom: 70px; }
        .hidden { display: none !important; }
        .page { margin-top: 60px; padding: 15px; }
        
        /* HEADER */
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: #1e293b; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100; border-bottom: 1px solid #334155; }
        
        /* LOGIN */
        #auth-screen { padding: 40px; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #334155; color: white; }
        .btn-blue { background: #38bdf8; color: #0f172a; border: none; padding: 14px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; }

        /* ROOM CARD */
        .room-card { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
        .btn-join { background: #4ade80; color: #064e3b; border: none; padding: 8px 18px; border-radius: 8px; font-weight: bold; }

        /* CHAT AREA */
        #chat-box { height: 60vh; overflow-y: auto; background: #1e293b; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 8px; background: #334155; font-size: 14px; }

        /* NAV */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 60px; background: #1e293b; border-top: 1px solid #334155; display: flex; justify-content: space-around; align-items: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color:#38bdf8">KChat</h1>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Senha (mín. 6 dígitos)">
        <button class="btn-blue" onclick="entrar()">ENTRAR / CADASTRAR</button>
        <p id="auth-msg" style="font-size: 12px; color: #94a3b8; margin-top: 10px;"></p>
    </div>

    <div id="app-screen" class="hidden">
        <div class="header">
            <span style="color:#38bdf8; font-weight:bold;">KChat</span>
            <i data-lucide="log-out" onclick="firebase.auth().signOut(); location.reload();"></i>
        </div>

        <div id="rooms-page" class="page">
            <h3>Salas de Jogo</h3>
            <div class="room-card">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Gabri" style="width:45px; border-radius:50%">
                    <div>
                        <div style="font-weight:bold; font-size:14px;">GabrihhDEV_</div>
                        <div style="font-size:11px; color:#4ade80">📶 8ms | Survival</div>
                    </div>
                </div>
                <button class="btn-join">JOIN</button>
            </div>
        </div>

        <div id="chat-page" class="page hidden">
            <h3>Chat Global</h3>
            <div id="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chat-input" placeholder="Mensagem...">
                <button onclick="enviarMsg()" style="background:#38bdf8; border:none; border-radius:8px; padding:0 15px;">OK</button>
            </div>
        </div>

        <nav class="nav-bottom">
            <i data-lucide="layout-grid" onclick="showPage('rooms-page')"></i>
            <i data-lucide="message-circle" onclick="showPage('chat-page')"></i>
            <i data-lucide="user"></i>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDPlWGrAgR6wvMilamQ1Z83nAhXJAaRHD0",
            authDomain: "kchat-1debf.firebaseapp.com",
            databaseURL: "https://kchat-1debf-default-rtdb.firebaseio.com",
            projectId: "kchat-1debf",
            storageBucket: "kchat-1debf.firebasestorage.app",
            messagingSenderId: "622333653477",
            appId: "1:622333653477:web:2ac2e18023e8a07a983f0c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        lucide.createIcons();

        // LOGIN / CADASTRO
        function entrar() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(() => {
                auth.createUserWithEmailAndPassword(email, pass).catch(e => {
                    document.getElementById('auth-msg').innerText = "Erro: " + e.message;
                });
            });
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                ouvirMensagens();
            }
        });

        // SISTEMA DE CHAT
        function enviarMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            db.ref('mensagens').push({
                user: auth.currentUser.email.split('@')[0],
                texto: input.value,
                data: Date.now()
            });
            input.value = "";
        }

        function ouvirMensagens() {
            db.ref('mensagens').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    box.innerHTML += `<div class="msg"><strong>${m.user}:</strong> ${m.texto}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
