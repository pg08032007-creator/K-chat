<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KChat - Social & RP</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; outline: none; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; color: #262626; }
        
        /* TELA DE LOGIN (SOBREPOSIÇÃO) */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: flex;
            flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .login-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 5px; background: #fafafa; }
        .login-btn { width: 100%; padding: 12px; background: #0095f6; color: white; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }

        /* HEADER */
        .header { 
            position: fixed; top: 0; width: 100%; height: 55px; 
            background: #fff; border-bottom: 1px solid #dbdbdb;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: bold; background: linear-gradient(45deg, #f09433, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* CONTEÚDO */
        .content-area { padding-top: 55px; padding-bottom: 70px; }
        .page { display: none; }
        .active { display: block; }

        /* CÍRCULOS */
        .circles-wrapper { background: #fff; border-bottom: 1px solid #dbdbdb; padding: 10px 0; overflow-x: auto; display: flex; }
        .circle-container { display: flex; flex-direction: column; align-items: center; min-width: 85px; }
        .circle-avatar { width: 66px; height: 66px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, #f09433, #dc2743); display: flex; align-items: center; justify-content: center; }
        .circle-avatar img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .circle-label { font-size: 12px; margin-top: 5px; color: #262626; }

        /* FICHA RP */
        .rp-card { background: #fff; margin: 15px; padding: 20px; border-radius: 12px; border: 1px solid #dbdbdb; }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 11px; font-weight: bold; color: #8e8e8e; margin-bottom: 4px; text-transform: uppercase; }
        .field input, .field textarea { width: 100%; padding: 10px; border: 1px solid #dbdbdb; border-radius: 5px; }

        /* NAV BOTTOM (SEM EMOJIS) */
        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; height: 55px;
            background: #fff; border-top: 1px solid #dbdbdb;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-btn { color: #262626; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 50px; height: 100%; }
        .nav-btn.active-icon { color: #bc1888; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo" style="font-size: 40px; margin-bottom: 30px;">KChat</div>
        <input type="text" id="username" class="login-input" placeholder="Nome de usuário">
        <input type="password" class="login-input" placeholder="Senha">
        <button class="login-btn" onclick="fazerLogin()">Entrar / Criar Conta</button>
        <p style="font-size: 12px; color: #8e8e8e; margin-top: 20px;">Ao entrar, você concorda com os termos do KChat.</p>
    </div>

    <div class="header">
        <div class="logo">KChat</div>
        <i data-lucide="send" style="width: 24px;"></i>
    </div>

    <div class="content-area">
        <div id="home-page" class="page active">
            <div class="circles-wrapper">
                <div class="circle-container">
                    <div class="circle-avatar"><img src="https://api.dicebear.com/7.x/shapes/svg?seed=1"></div>
                    <span class="circle-label">Comunidade</span>
                </div>
                <div class="circle-container">
                    <div class="circle-avatar" style="background: #000;"><img src="https://api.dicebear.com/7.x/shapes/svg?seed=2"></div>
                    <span class="circle-label">RP Brasil</span>
                </div>
            </div>
            <div style="padding: 20px; text-align: center; color: #8e8e8e;">
                <i data-lucide="image" style="width: 48px; height: 48px; margin-bottom: 10px;"></i>
                <p>Nenhum post novo por enquanto.</p>
            </div>
        </div>

        <div id="profile-page" class="page">
            <div class="rp-card">
                <h2 id="user-display-name">Meu Perfil</h2>
                <div class="field">
                    <label>Nome do Personagem</label>
                    <input type="text" placeholder="Nome no RP">
                </div>
                <div class="field">
                    <label>Bio / História</label>
                    <textarea placeholder="Conte sua história..."></textarea>
                </div>
                <button class="login-btn" style="background: #262626;">Salvar Ficha</button>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-btn" onclick="showPage('home-page')"><i data-lucide="home"></i></div>
        <div class="nav-btn"><i data-lucide="search"></i></div>
        <div class="nav-btn"><i data-lucide="plus-square"></i></div>
        <div class="nav-btn"><i data-lucide="message-circle"></i></div>
        <div class="nav-btn" onclick="showPage('profile-page')"><i data-lucide="user"></i></div>
    </nav>

    <script>
        // Inicializa os ícones da biblioteca Lucide
        lucide.createIcons();

        function fazerLogin() {
            const user = document.getElementById('username').value;
            if(user.length > 2) {
                document.getElementById('user-display-name').innerText = "Perfil de " + user;
                document.getElementById('login-screen').style.display = 'none';
            } else {
                alert("Digite um nome de usuário válido!");
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
