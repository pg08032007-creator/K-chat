<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KChat - Social</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; outline: none; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #000; color: white; }
        .hidden { display: none !important; }
        
        /* TELAS DE AUTH */
        .auth-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        .logo { font-size: 45px; font-weight: bold; background: linear-gradient(45deg, #f09433, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin: 6px 0; border-radius: 8px; border: 1px solid #262626; background: #121212; color: #fff; font-size: 14px; }
        .btn-primary { width: 100%; background: #0095f6; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-link { background: none; border: none; color: #0095f6; font-size: 14px; margin-top: 20px; cursor: pointer; }

        /* HEADER & FEED */
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; border-bottom: 0.1px solid #262626; }
        .stories-bar { display: flex; gap: 12px; overflow-x: auto; padding: 15px; margin-top: 55px; border-bottom: 0.1px solid #262626; scrollbar-width: none; }
        .ring { width: 68px; height: 68px; border-radius: 50%; background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7); display: flex; align-items: center; justify-content: center; padding: 3px; }
        .ring img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000; object-fit: cover; }
        
        /* NAV INFERIOR */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 55px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.1px solid #262626; }
    </style>
</head>
<body>

    <div id="login-screen" class="auth-container">
        <div class="logo">KChat</div>
        <input type="email" id="login-email" placeholder="E-mail">
        <input type="password" id="login-pass" placeholder="Senha">
        <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
        <button class="btn-link" onclick="toggleAuth('signup-screen')">Não tem uma conta? Cadastre-se</button>
        <p id="login-error" style="color: #ed4956; font-size: 12px; margin-top: 10px;"></p>
    </div>

    <div id="signup-screen" class="auth-container hidden">
        <div class="logo">KChat</div>
        <p style="color: #94a3b8; margin-bottom: 20px; text-align: center;">Cadastre-se para ver fotos e vídeos dos seus amigos.</p>
        <input type="email" id="sign-email" placeholder="E-mail">
        <input type="password" id="sign-pass" placeholder="Senha (mínimo 6 caracteres)">
        <button class="btn-primary" onclick="criarConta()">Cadastre-se</button>
        <button class="btn-link" onclick="toggleAuth('login-screen')">Já tem uma conta? Entre</button>
        <p id="sign-error" style="color: #ed4956; font-size: 12px; margin-top: 10px;"></p>
    </div>

    <div id="app-screen" class="hidden">
        <div class="header">
            <span class="logo" style="font-size: 24px; margin-bottom: 0;">KChat</span>
            <i data-lucide="message-circle" style="cursor: pointer;"></i>
        </div>

        <div class="stories-bar">
            <div class="story" style="display:flex; flex-direction:column; align-items:center;">
                <div class="ring" style="background: #262626;"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Izis"></div>
                <span style="font-size: 11px; margin-top: 5px;">Seu story</span>
            </div>
        </div>

        <nav class="nav-bottom">
            <i data-lucide="home"></i>
            <i data-lucide="search"></i>
            <i data-lucide="plus-square"></i>
            <i data-lucide="play"></i>
            <i data-lucide="user"></i>
        </nav>
    </div>

    <script>
        // Suas chaves do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDPlWGrAgR6wvMilamQ1Z83nAhXJAaRHD0",
            authDomain: "kchat-1debf.firebaseapp.com",
            databaseURL: "https://kchat-1debf-default-rtdb.firebaseio.com",
            projectId: "kchat-1debf",
            storageBucket: "kchat-1debf.firebasestorage.app",
            messagingSenderId: "622333653477",
            appId: "1:622333653477:web:2ac2e18023e8a07a983f0c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        lucide.createIcons();

        function toggleAuth(screenId) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('signup-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function fazerLogin() {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => {
                document.getElementById('login-error').innerText = "Erro: " + err.message;
            });
        }

        function criarConta() {
            const e = document.getElementById('sign-email').value;
            const p = document.getElementById('sign-pass').value;
            auth.createUserWithEmailAndPassword(e, p).catch(err => {
                document.getElementById('sign-error').innerText = "Erro: " + err.message;
            });
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('signup-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
