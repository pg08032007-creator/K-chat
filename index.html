<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Cloud Premium</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg-dark: #0a0a0c; --bg-card: #141417; --accent-purple: #a855f7; --accent-pink: #ec4899; --text-main: #ffffff; --input-inner: inset 2px 2px 5px rgba(0,0,0,0.3); --text-dim: #a1a1aa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }
        .screen { display: none; min-height: 100vh; padding-bottom: 90px; }
        .screen.active { display: block; }
        
        .auth-container { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .logo-k { font-size: 42px; font-weight: 900; background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .custom-input-group { width: 100%; background: var(--bg-card); border-radius: 18px; padding: 18px; border: 1px solid #1f1f23; display: flex; align-items: center; box-shadow: var(--input-inner); }
        .custom-input-group input { background: transparent; border: none; width: 100%; color: white; outline: none; margin-left: 10px; }
        
        .gender-selector { display: flex; justify-content: space-between; width: 100%; gap: 10px; margin: 10px 0; }
        .gender-option { flex: 1; position: relative; text-align: center; background: var(--bg-card); border-radius: 15px; padding: 15px; border: 1px solid #1f1f23; cursor: pointer; }
        .gender-option input { position: absolute; opacity: 0; }
        .gender-option i { font-size: 24px; color: #444; }
        .gender-option input:checked ~ i { color: var(--accent-pink); transform: scale(1.1); }
        .gender-option span { display: block; font-size: 10px; text-transform: uppercase; margin-top: 5px; color: #555; }

        .btn-premium { width: 100%; padding: 20px; border-radius: 20px; border: none; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; font-weight: 800; cursor: pointer; }
        
        /* Feed Header */
        .app-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: var(--bg-dark); z-index: 100; border-bottom: 1px solid #1a1a1e; }
        .search-bar { flex: 1; background: #1a1a1e; border-radius: 12px; display: flex; align-items: center; padding: 8px 15px; border: 1px solid #27272a; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        .post-card { background: var(--bg-card); border-radius: 20px; padding: 15px; margin: 15px; border: 1px solid #1f1f23; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg-card); position: absolute; bottom: 0; right: 0; }
        
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(15, 15, 18, 0.9); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 12px; backdrop-filter: blur(15px); border: 1px solid #222; z-index: 1000; }
        .plus-fab { background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); width: 60px; height: 60px; border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; margin-top: -40px; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="auth-container">
            <div class="logo-k">K.</div>
            <div class="custom-input-group"><i class="fas fa-user"></i><input type="text" id="login-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><i class="fas fa-lock"></i><input type="password" id="login-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="handleLogin()">Entrar</button>
            <p onclick="showScreen('register')" style="color:#666">Não tem conta? <span style="color:var(--accent-pink)">Cadastre-se</span></p>
        </div>
    </div>

    <div id="screen-register" class="screen">
        <div class="auth-container">
            <div class="logo-k">Cadastro</div>
            <div class="custom-input-group"><input type="text" id="reg-user" placeholder="Nome de usuário"></div>
            <div class="custom-input-group"><input type="password" id="reg-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="showScreen('onboarding')">Continuar</button>
            <p onclick="showScreen('login')" style="color:#666">Já tenho conta</p>
        </div>
    </div>

    <div id="screen-onboarding" class="screen">
        <div class="auth-container">
            <h2 style="margin-bottom:10px">Seu Perfil</h2>
            <div style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent-purple); position:relative; overflow:hidden; margin:0 auto;" onclick="document.getElementById('file-input').click()">
                <img id="img-preview" src="https://via.placeholder.com/110?text=+" style="width:100%; height:100%; object-fit:cover;">
                <input type="file" id="file-input" accept="image/*" onchange="previewImage(this)" style="display:none">
            </div>
            <div class="custom-input-group"><i class="fas fa-calendar-alt" style="color:#555"></i><input type="date" id="onb-date"></div>
            <div class="custom-input-group"><input type="text" id="onb-status" placeholder="Sua Bio/Status"></div>
            <div class="gender-selector">
                <label class="gender-option"><input type="radio" name="gen" value="male" checked><i class="fas fa-mars"></i><span>Ele</span></label>
                <label class="gender-option"><input type="radio" name="gen" value="female"><i class="fas fa-venus"></i><span>Ela</span></label>
                <label class="gender-option"><input type="radio" name="gen" value="nb"><i class="fas fa-genderless"></i><span>Neutro</span></label>
            </div>
            <button class="btn-premium" onclick="handleRegister()">Finalizar Registro</button>
        </div>
    </div>

    <div id="screen-feed" class="screen">
        <header class="app-header">
            <div class="logo-k" style="font-size:24px">K.</div>
            <div class="search-bar"><i class="fas fa-search" style="color:#444"></i><input type="text" placeholder="Buscar usuários..."></div>
            <i class="fas fa-sync-alt" onclick="listenPosts()" style="color:var(--accent-purple)"></i>
        </header>
        <div id="feed-content"></div>
    </div>

    <div id="screen-chat" class="screen">
        <div style="display:flex; justify-content:space-around; padding:15px; border-bottom:1px solid #222;">
            <div style="color:var(--accent-pink); border-bottom:2px solid var(--accent-pink)">Geral</div>
            <div style="color:#555">Grupos</div>
            <div style="color:#555">Convites</div>
        </div>
        <div style="padding:50px; text-align:center; color:#555">Mensagens aparecem aqui.</div>
    </div>

    <div id="screen-profile" class="screen">
        <div class="auth-container">
            <div style="position:relative">
                <img id="my-pic" src="" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent-pink); object-fit:cover;">
                <div onclick="editProfile()" style="position:absolute; bottom:0; right:0; background:#222; padding:8px; border-radius:50%; border:1px solid #444"><i class="fas fa-pencil-alt" style="font-size:12px"></i></div>
            </div>
            <h2 id="my-name">@user</h2>
            <p id="my-status" style="color:#777"></p>
            <button class="btn-premium" onclick="logout()" style="background:#222; margin-top:20px">Sair</button>
        </div>
    </div>

    <nav id="main-nav" style="display:none">
        <div onclick="showScreen('feed')"><i class="fas fa-compass"></i></div>
        <div class="plus-fab" onclick="newPost()"><i class="fas fa-plus"></i></div>
        <div onclick="showScreen('chat')"><i class="fas fa-comment-dots"></i></div>
        <div onclick="showScreen('profile')"><i class="fas fa-user-astronaut"></i></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
            authDomain: "kchat-web-8415c.firebaseapp.com",
            projectId: "kchat-web-8415c",
            storageBucket: "kchat-web-8415c.firebasestorage.app",
            messagingSenderId: "878265144053",
            appId: "1:878265144053:web:407389cd133d955f76abbc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = null;
        let base64Avatar = "";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(id === 'profile') loadProfile();
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Avatar = e.target.result;
                    document.getElementById('img-preview').src = base64Avatar;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function handleLogin() {
            const user = document.getElementById('login-user').value.toLowerCase().trim();
            const pass = document.getElementById('login-pass').value;
            try {
                const doc = await db.collection("usuarios").doc(user).get();
                if (doc.exists && doc.data().pass === pass) {
                    currentUser = doc.data();
                    updateStatus(true);
                    enterApp();
                } else { alert("Dados incorretos!"); }
            } catch(e) { alert("Erro de conexão."); }
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            const pass = document.getElementById('reg-pass').value;
            const date = document.getElementById('onb-date').value;
            const status = document.getElementById('onb-status').value || "Disponível";
            const gen = document.querySelector('input[name="gen"]:checked').value;

            if(!user || !pass || !date) return alert("Preencha todos os campos, incluindo a data!");

            try {
                const check = await db.collection("usuarios").doc(user).get();
                if(check.exists) return alert("Usuário já existe!");

                const userData = { user, pass, date, status, gen, pic: base64Avatar || "", online: true };
                await db.collection("usuarios").doc(user).set(userData);
                currentUser = userData;
                enterApp();
            } catch(e) { alert("Erro no registro."); }
        }

        function updateStatus(isOnline) {
            if(currentUser) db.collection("usuarios").doc(currentUser.user).update({ online: isOnline });
        }

        function enterApp() {
            document.getElementById('main-nav').style.display = 'flex';
            showScreen('feed');
            listenPosts();
        }

        function listenPosts() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('feed-content');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const liked = post.likes_list && post.likes_list.includes(currentUser.user);
                    container.innerHTML += `
                        <div class="post-card">
                            <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px">
                                <div style="position:relative">
                                    <img src="${post.authorPic || 'https://via.placeholder.com/40'}" class="user-avatar">
                                    <div class="status-dot" style="background:${post.isOnline ? '#22c55e' : '#444'}"></div>
                                </div>
                                <strong>@${post.author}</strong>
                            </div>
                            <p>${post.content}</p>
                            <div style="display:flex; gap:20px; color:#666; margin-top:10px; font-size:14px;">
                                <span onclick="toggleLike('${doc.id}')" style="color:${liked ? 'var(--accent-pink)' : ''}"><i class="fas fa-heart"></i> ${post.likes || 0}</span>
                                <span><i class="fas fa-comment"></i> ${post.comments || 0}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        async function toggleLike(id) {
            const ref = db.collection("posts").doc(id);
            const doc = await ref.get();
            let list = doc.data().likes_list || [];
            let count = doc.data().likes || 0;
            if(list.includes(currentUser.user)) {
                list = list.filter(u => u !== currentUser.user);
                count--;
            } else {
                list.push(currentUser.user);
                count++;
            }
            await ref.update({ likes: count, likes_list: list });
        }

        async function newPost() {
            const text = prompt("O que quer postar?");
            if(!text) return;
            await db.collection("posts").add({
                author: currentUser.user, authorPic: currentUser.pic || "",
                content: text, time: Date.now(), likes: 0, likes_list: [], comments: 0, isOnline: true
            });
        }

        function loadProfile() {
            document.getElementById('my-pic').src = currentUser.pic || 'https://via.placeholder.com/110';
            document.getElementById('my-name').innerText = "@" + currentUser.user;
            document.getElementById('my-status').innerText = currentUser.status;
        }

        function editProfile() {
            const n = prompt("Editar Bio/Status:", currentUser.status);
            if(n) {
                db.collection("usuarios").doc(currentUser.user).update({ status: n });
                currentUser.status = n;
                loadProfile();
            }
        }
        
        function logout() { updateStatus(false); location.reload(); }
        window.onbeforeunload = () => updateStatus(false);
    </script>
</body>
</html>
