<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KChat | Secure Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #ff007f;
            --bg-dark: #050508;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Plus Jakarta Sans', sans-serif; }
        body, html { margin: 0; background: var(--bg-dark); color: white; height: 100vh; overflow: hidden; }

        /* --- AUTH SYSTEM --- */
        #auth-screen {
            display: flex; align-items: center; justify-content: center; height: 100%;
            background: radial-gradient(circle at 50% 50%, #151025 0%, #050508 100%);
        }
        .auth-card {
            background: var(--card); backdrop-filter: blur(30px); padding: 40px;
            border-radius: 40px; width: 90%; max-width: 380px; border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .tabs { display: flex; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 20px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 16px; font-weight: 600; font-size: 0.85em; opacity: 0.4; }
        .tab.active { background: white; color: black; opacity: 1; }

        input {
            width: 100%; padding: 16px; margin: 8px 0; border-radius: 18px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 0.95em;
        }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }

        .btn-auth {
            width: 100%; padding: 18px; border-radius: 18px; border: none; 
            background: linear-gradient(to right, #fff, #ddd); color: #000; 
            font-weight: 800; cursor: pointer; margin-top: 15px; letter-spacing: 1px;
        }

        /* --- APP INTERFACE --- */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        
        header {
            padding: 20px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border); background: rgba(5,5,8,0.8); backdrop-filter: blur(10px);
        }
        .search-container { flex: 1; position: relative; }
        .search-container i { position: absolute; left: 15px; top: 12px; color: var(--text-dim); }
        .search-container input { padding: 10px 15px 10px 45px; margin: 0; border-radius: 14px; font-size: 0.85em; }

        .content { flex: 1; overflow-y: auto; padding: 20px 20px 120px; }
        .post-card {
            background: var(--card); border-radius: 28px; padding: 22px; margin-bottom: 18px;
            border: 1px solid var(--border); animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(25px); border-radius: 30px; display: flex;
            justify-content: space-between; align-items: center; padding: 10px 25px;
            border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        nav i { font-size: 1.4em; color: var(--text-dim); cursor: pointer; padding: 10px; }
        nav i.active { color: white; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        .nav-center {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 58px; height: 58px; border-radius: 22px; display: flex;
            align-items: center; justify-content: center; color: white;
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.4); transform: translateY(-8px);
        }

        /* --- USER PROFILE MODAL --- */
        #profile-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 1000; display: none; padding: 40px 20px;
        }
        .avatar-lg { width: 110px; height: 110px; border-radius: 38px; border: 2px solid var(--primary); object-fit: cover; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="text-align: center; font-weight: 800; letter-spacing: -2px; margin-bottom: 30px;">KChat</h1>
            <div class="tabs">
                <div class="tab active" id="tab-login" onclick="switchMode('login')">Login</div>
                <div class="tab" id="tab-reg" onclick="switchMode('reg')">Registrar</div>
            </div>
            
            <input type="text" id="auth-user" placeholder="Usuário único">
            <input type="password" id="auth-pass" placeholder="Senha secreta">
            
            <div id="reg-only" style="display: none;">
                <input type="number" id="auth-age" placeholder="Sua idade">
                <div style="display: flex; justify-content: space-around; margin: 15px 0;">
                    <i class="fas fa-mars fa-lg gen-icon" onclick="selectGen(this)" data-gen="M"></i>
                    <i class="fas fa-venus fa-lg gen-icon" onclick="selectGen(this)" data-gen="F"></i>
                    <i class="fas fa-genderless fa-lg gen-icon" onclick="selectGen(this)" data-gen="NB"></i>
                </div>
            </div>
            
            <button class="btn-auth" onclick="processAuth()" id="btn-text">ENTRAR</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div style="font-weight: 900; font-size: 1.4em; color: var(--primary);">K.</div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="search-in" placeholder="Procurar usuários..." oninput="searchUsers()">
            </div>
        </header>

        <div id="search-box" class="content" style="display:none; position:fixed; background:var(--bg-dark); z-index:100; width:100%;">
            <div id="search-list"></div>
        </div>

        <div id="home-view" class="content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h2 style="font-weight: 800; margin:0;">Global Feed</h2>
                <i class="fas fa-sync-alt" onclick="loadPosts()" style="cursor:pointer; color:var(--primary);"></i>
            </div>
            <div id="post-feed"></div>
        </div>

        <div id="profile-view-me" class="content" style="display:none; text-align:center;">
            <img id="my-avatar" src="" class="avatar-lg" style="margin-top:40px;">
            <h2 id="my-name" style="margin:15px 0 5px;">-</h2>
            <p id="my-bio" style="color:var(--text-dim);">Carregando...</p>
            <button onclick="editProfile()" style="background:var(--card); color:white; border:1px solid var(--border); padding:10px 20px; border-radius:12px; margin-top:10px; cursor:pointer;">Editar Perfil</button>
        </div>

        <nav>
            <i class="fas fa-compass active" onclick="tab('home-view', this)"></i>
            <div class="nav-center" onclick="addPost()"><i class="fas fa-plus"></i></div>
            <i class="fas fa-user-astronaut" onclick="tab('profile-view-me', this)"></i>
        </nav>
    </div>

    <div id="profile-view">
        <i class="fas fa-chevron-left" onclick="this.parentElement.style.display='none'" style="font-size:1.5em; cursor:pointer;"></i>
        <div id="view-content" style="text-align:center; margin-top:50px;"></div>
    </div>

    <script>
        let mode = 'login';
        let currentUser = null;
        let users = JSON.parse(localStorage.getItem('k_users')) || [
            {user: 'KChat', pass: '123', bio: 'Bot oficial', followers: 5000, img: 'https://api.dicebear.com/7.x/bottts/svg?seed=KChat'}
        ];
        let posts = JSON.parse(localStorage.getItem('k_posts')) || [];

        function switchMode(m) {
            mode = m;
            document.getElementById('reg-only').style.display = m === 'reg' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', m === 'login');
            document.getElementById('tab-reg').classList.toggle('active', m === 'reg');
            document.getElementById('btn-text').innerText = m === 'reg' ? 'CRIAR CONTA' : 'ENTRAR';
        }

        function processAuth() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();

            if(!u || !p) return alert("Preencha todos os campos!");

            if(mode === 'reg') {
                // REGRA 1: Não permite nome duplicado
                if(users.some(x => x.user.toLowerCase() === u.toLowerCase())) {
                    return alert("Este nome de usuário já está em uso!");
                }
                const newUser = { 
                    user: u, pass: p, bio: 'Explorando o KChat', followers: 0, 
                    img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${u}` 
                };
                users.push(newUser);
                localStorage.setItem('k_users', JSON.stringify(users));
                alert("Conta criada com sucesso!");
                switchMode('login');
            } else {
                // REGRA 2: Login rigoroso
                const found = users.find(x => x.user === u && x.pass === p);
                if(found) {
                    currentUser = found;
                    initApp();
                } else {
                    alert("Usuário ou senha incorretos! Você já se registrou?");
                }
            }
        }

        function initApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('my-name').innerText = currentUser.user;
            document.getElementById('my-bio').innerText = currentUser.bio;
            document.getElementById('my-avatar').src = currentUser.img;
            loadPosts();
        }

        function tab(t, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display='none');
            document.getElementById(t).style.display='block';
            document.querySelectorAll('nav i').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            document.getElementById('search-box').style.display='none';
        }

        function addPost() {
            const t = prompt("O que está acontecendo?");
            if(t && t.trim().length > 0) {
                posts.push({ u: currentUser.user, t: t, time: new Date().getTime() });
                localStorage.setItem('k_posts', JSON.stringify(posts));
                loadPosts();
            }
        }

        function loadPosts() {
            const feed = document.getElementById('post-feed');
            feed.innerHTML = posts.slice().reverse().map(p => `
                <div class="post-card">
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${p.u}" style="width:35px; border-radius:12px; background:var(--border);">
                        <b style="font-size:0.9em; letter-spacing:0.5px;">@${p.u}</b>
                    </div>
                    <p style="margin:0; line-height:1.5; opacity:0.9;">${p.t}</p>
                </div>
            `).join('');
        }

        function searchUsers() {
            const q = document.getElementById('search-in').value.toLowerCase();
            const box = document.getElementById('search-box');
            if(q.length > 0) {
                box.style.display = 'block';
                const filtered = users.filter(u => u.user.toLowerCase().includes(q));
                document.getElementById('search-list').innerHTML = filtered.map(u => `
                    <div onclick="openUser('${u.user}')" style="display:flex; align-items:center; gap:15px; padding:15px; border-bottom:1px solid var(--border);">
                        <img src="${u.img}" style="width:40px; border-radius:14px;">
                        <div><b>${u.user}</b><br><small style="color:var(--text-dim)">${u.followers} seguidores</small></div>
                    </div>
                `).join('');
            } else { box.style.display = 'none'; }
        }

        function openUser(name) {
            const u = users.find(x => x.user === name);
            const view = document.getElementById('profile-view');
            document.getElementById('view-content').innerHTML = `
                <img src="${u.img}" class="avatar-lg">
                <h1 style="margin:20px 0 5px;">${u.user}</h1>
                <p style="color:var(--text-dim); padding:0 30px;">${u.bio}</p>
                <div style="display:flex; justify-content:center; gap:40px; margin:30px 0;">
                    <div><b>${u.followers}</b><br><small>Seguidores</small></div>
                    <div><b>${Math.floor(u.followers/1.5)}</b><br><small>Seguindo</small></div>
                </div>
                <button onclick="this.innerText='Seguindo'" style="width:80%; padding:18px; border-radius:20px; border:none; background:white; color:black; font-weight:800;">SEGUIR</button>
            `;
            view.style.display = 'block';
        }

        function selectGen(el) {
            document.querySelectorAll('.gen-icon').forEach(i => i.style.color = 'white');
            el.style.color = 'var(--primary)';
        }

        function editProfile() {
            const b = prompt("Sua nova bio:", currentUser.bio);
            if(b) {
                currentUser.bio = b;
                document.getElementById('my-bio').innerText = b;
                const idx = users.findIndex(x => x.user === currentUser.user);
                users[idx] = currentUser;
                localStorage.setItem('k_users', JSON.stringify(users));
            }
        }
    </script>
</body>
</html>
