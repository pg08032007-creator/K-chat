<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Gram App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0a0a0c]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Planet, Home, Search, PlusSquare, User, Camera, Send, Heart, MessageCircle, X, Check } = lucide;

        // O código do App vai aqui (Vou resumir a lógica principal para caber)
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('feed');
            const [regName, setRegName] = useState('');
            const [meetStatus, setMeetStatus] = useState('idle');

            // --- TELA DE LOGIN ---
            if (!user) {
                return (
                    <div className="min-h-screen text-white flex items-center justify-center p-6 bg-slate-900">
                        <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-sm border border-purple-500">
                            <h1 className="text-2xl font-bold text-center mb-6 text-purple-400 italic">Z-GRAM</h1>
                            <input placeholder="Usuário" className="w-full p-3 mb-4 bg-slate-700 rounded-xl outline-none" onChange={(e) => setRegName(e.target.value)} />
                            <button onClick={() => setUser({username: regName, avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed='+regName})} className="w-full bg-purple-600 p-3 rounded-xl font-bold">Entrar</button>
                        </div>
                    </div>
                );
            }

            // --- TELA PRINCIPAL ---
            return (
                <div className="min-h-screen text-white flex flex-col max-w-md mx-auto bg-[#0a0a0c]">
                    <main className="flex-1 p-4 pb-24">
                        {view === 'feed' && (
                            <div className="animate-pulse flex flex-col items-center justify-center h-64 text-slate-600">
                                <p>Carregando Feed do Z-Gram...</p>
                            </div>
                        )}

                        {view === 'meet' && (
                            <div className="flex flex-col items-center justify-center h-[70vh] text-center">
                                <div className="p-8 bg-slate-800 rounded-3xl border-2 border-purple-500">
                                     <h2 className="text-xl font-bold mb-4">Sala Planetária</h2>
                                     <p className="text-slate-400 mb-6">Procurando alguém para conversar...</p>
                                     <button className="bg-purple-600 px-8 py-3 rounded-full animate-bounce">Aguardando...</button>
                                </div>
                            </div>
                        )}
                        
                        {view === 'profile' && (
                            <div className="text-center mt-10">
                                <img src={user.avatar} className="w-24 h-24 rounded-full mx-auto border-4 border-purple-500" />
                                <h2 className="text-2xl font-bold mt-4">{user.username}</h2>
                                <button onClick={() => window.location.reload()} className="mt-8 text-red-500 text-xs">SAIR</button>
                            </div>
                        )}
                    </main>

                    {/* NAVBAR */}
                    <nav className="fixed bottom-0 left-0 right-0 h-16 bg-slate-900 border-t border-white/10 flex items-center justify-around max-w-md mx-auto">
                        <button onClick={() => setView('feed')} className="text-slate-400"><i data-lucide="home"></i></button>
                        <button onClick={() => setView('meet')} className="bg-purple-600 p-4 rounded-full -mt-10 border-4 border-[#0a0a0c]"><i data-lucide="orbit"></i></button>
                        <button onClick={() => setView('profile')} className="text-slate-400"><i data-lucide="user"></i></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Inicializa os ícones após renderizar
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
