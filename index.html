<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K. App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ESTILOS (O QUE DÁ A COR E O LAYOUT) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: #000; color: #fff; height: 100vh; overflow: hidden; }

        /* Sistema de Telas */
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; }
        .screen.active { display: flex; }

        /* Login e Registro */
        .auth-container { padding: 40px 25px; display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; height: 100%; }
        .logo-k { color: #8a2be2; font-size: 3.5rem; font-weight: bold; margin-bottom: 20px; }
        .logo-k span { color: #fff; }
        
        .tabs { display: flex; gap: 20px; margin-bottom: 20px; }
        .tabs button { background: none; border: none; color: #555; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tabs button.active { color: #fff; border-bottom: 2px solid #8a2be2; }

        form { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        input[type="text"], input[type="password"], input[type="number"] { 
            background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; color: #fff; width: 100%; outline: none;
        }
        .btn-main { 
            background: #8a2be2; color: #fff; border: none; padding: 15px; border-radius: 25px; 
            font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%;
        }

        /* Configuração de Perfil */
        .gender-selection { display: flex; gap: 20px; align-items: center; margin: 15px 0; }
        .gender-option { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .gender-option input { cursor: pointer; accent-color: #8a2be2; width: 18px; height: 18px; }
        .gender-option i { font-size: 1.2rem; }
        .m { color: #0084ff; } .f { color: #ff007b; } .o { color: #ffcc00; }

        /* TELA DO FEED (IDÊNTICA À SUA FOTO) */
        .top-bar { display: flex; align-items: center; padding: 15px; gap: 15px; background: #000; }
        .logo-small { color: #8a2be2; font-weight: bold; font-size: 26px; }
        .search-container { 
            background: #121212; flex: 1; display: flex; align-items: center; 
            padding: 10px 15px; border-radius: 12px; border: 1px solid #1a1a1a; 
        }
        .search-container i { color: #555; margin-right: 10px; }
        .search-container input { background: transparent; border: none; padding: 0; width: 100%; color: #fff; }

        .content { flex: 1; padding: 20px; }
        .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .feed-header h1 { font-size: 28px; font-weight: bold; letter-spacing: -1px; }
        .refresh-icon { color: #8a2be2; font-size: 20px; cursor: pointer; }

        /* Barra de Navegação Inferior */
        .bottom-nav { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: center; }
        .nav-container { 
            background: rgba(10, 10, 10, 0.95); width: 90%; height: 75px; border-radius: 40px; 
            border: 1px solid #1a1a1a; display: flex; justify-content: space-around; align-items: center; 
            backdrop-filter: blur(10px);
        }
        .nav-item { font-size: 24px; color: #555; cursor: pointer; }
        .nav-item.active-nav { color: #fff; text-shadow: 0 0 10px #fff; }
        
        .plus-btn { 
            background: linear-gradient(45deg, #c026d3, #db2777); 
            width: 65px; height: 65px; border-radius: 22px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; color: #fff; margin-top: -15px;
            box-shadow: 0 10px 20px rgba(192, 38, 211, 0.3);
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h1 class="logo-k">K<span>.</span></h1>
            <div class="tabs">
                <button id="tab-login" class="active" onclick="switchAuth('login')">Login</button>
                <button id="tab-register" onclick="switchAuth('register')">Registrar</button>
            </div>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Nome de usuário" required>
                <input type="password" id="password" placeholder="Senha" required>
                <button type="submit" id="auth-submit" class="btn-main">Entrar</button>
            </form>
        </div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="auth-container">
            <h2 style="margin-bottom: 20px;">Complete seu Perfil</h2>
            <p style="color: #888;">Escolher Foto de Perfil</p>
            <input type="file" id="pfp-input" style="border: none; background: none;">
            
            <input type="number" id="age-input" placeholder="Sua idade">
            
            <div style="width: 100%; margin-top: 10px;">
                <p style="margin-bottom: 10px; color: #888;">Gênero:</p>
                <div class="gender-selection">
                    <label class="gender-option">
                        <input type="radio" name="gender" value="masc"> <i class="fa-solid fa-mars m"></i>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="gender" value="fem"> <i class="fa-solid fa-venus f"></i>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="gender" value="outro"> <i class="fa-solid fa-transgender o"></i>
                    </label>
                </div>
            </div>
            <button onclick="finishProfile()" class="btn-main">Continuar</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <header class="top-bar">
            <span class="logo-small">K.</span>
            <div class="search-container">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="Teste">
            </div>
        </header>

        <main class="content">
            <div class="feed-header">
                <h1>Global Feed</h1>
                <i class="fa-solid fa-arrows-rotate refresh-icon"></i>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-container">
                <div class="nav-item active-nav"><i class="fa-solid fa-compass"></i></div>
                <div class="plus-btn"><i class="fa-solid fa-plus"></i></div>
                <div class="nav-item"><i class="fa-solid fa-robot"></i></div>
            </div>
        </nav>
    </div>

    <script>
        // LÓGICA DO APP
        let currentMode = 'login';

        function switchAuth(mode) {
            currentMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('auth-submit').innerText = mode === 'login' ? 'Entrar' : 'Registrar';
        }

        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            
            // Simulação de Banco de Dados no Navegador
            let users = JSON.parse(localStorage.getItem('users_list') || '[]');

            if (currentMode === 'register') {
                if (users.find(u => u.name.toLowerCase() === user.toLowerCase())) {
                    alert("Este nome já está em uso! Escolha outro.");
                    return;
                }
                users.push({ name: user, pass: pass });
                localStorage.setItem('users_list', JSON.stringify(users));
                showScreen('profile-screen');
            } else {
                const found = users.find(u => u.name === user && u.pass === pass);
                if (found) showScreen('main-screen');
                else alert("Usuário ou senha incorretos.");
            }
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function finishProfile() {
            showScreen('main-screen');
        }
    </script>
</body>
</html>
