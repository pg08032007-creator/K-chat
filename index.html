<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KChat - Global Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0c29;
            --purple-main: #9d50bb;
            --accent-green: #2ecc71;
            --text-white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            color: var/(--text-white);
            height: 100%;
            overflow: hidden;
        }

        /* Telas de Login/Registro */
        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
        }

        .tabs { display: flex; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { border-color: var(--purple-main); font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .gender-selection { display: flex; justify-content: space-around; margin: 10px 0; }
        .gender-option { text-align: center; }
        .gender-option input { width: auto; }

        button {
            width: 100%;
            padding: 12px;
            background: var(--purple-main);
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Layout Principal do App */
        #main-app { display: none; height: 100vh; flex-direction: column; }

        header {
            padding: 15px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }

        /* Barra de Navegação */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(15, 12, 41, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid var(--glass);
        }

        nav i { font-size: 24px; cursor: pointer; color: #888; }
        nav i.active { color: var(--purple-main); }

        /* Estilo de Posts e Usuários */
        .post, .user-card {
            background: var(--glass);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
        }

        .update-btn {
            background: var(--accent-green);
            margin-bottom: 20px;
        }

        .profile-header { text-align: center; position: relative; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--purple-main); }
        .edit-pencil { position: absolute; right: 35%; top: 70px; background: white; color: black; border-radius: 50%; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color: var(--purple-main)">KChat</h1>
        <div class="auth-container">
            <div class="tabs">
                <div class="tab active" onclick="switchAuth('login')">Login</div>
                <div class="tab" onclick="switchAuth('register')">Registro</div>
            </div>

            <div id="login-form">
                <input type="text" placeholder="Nome de usuário" id="l-user">
                <input type="password" placeholder="Senha" id="l-pass">
                <button onclick="login()">Entrar</button>
            </div>

            <div id="register-form" style="display: none;">
                <input type="text" placeholder="Nome" id="r-user">
                <input type="password" placeholder="Senha" id="r-pass">
                <input type="number" placeholder="Idade">
                
                <div class="gender-selection">
                    <div class="gender-option"><i class="fas fa-mars"></i><br><input type="radio" name="gen" checked></div>
                    <div class="gender-option"><i class="fas fa-venus"></i><br><input type="radio" name="gen"></div>
                    <div class="gender-option"><i class="fas fa-genderless"></i><br><input type="radio" name="gen"></div>
                </div>
                <button onclick="login()">Criar Conta</button>
            </div>
        </div>
    </div>

    <div id="main-app">
        <header>
            <span style="font-weight: bold; color: var(--purple-main);">KChat</span>
            <span>Chat</span>
            <i class="fas fa-bell"></i>
        </header>

        <div id="home" class="content-area">
            <button class="update-btn" onclick="updatePosts()"><i class="fas fa-sync"></i> Update Feed</button>
            <div id="feed-content">
                </div>
        </div>

        <div id="search" class="content-area" style="display: none;">
            <input type="text" placeholder="Pesquisar usuários..." onkeyup="searchUser()">
            <div id="user-list">
                </div>
        </div>

        <div id="profile" class="content-area" style="display: none;">
            <div class="profile-header">
                <img src="https://via.placeholder.com/100" class="profile-img" id="p-img">
                <i class="fas fa-pencil edit-pencil" onclick="editProfile()"></i>
                <h2 id="p-name">Nome do Usuário</h2>
                <p id="p-bio">Sua bio aparece aqui...</p>
                <div style="display: flex; justify-content: center; gap: 20px;">
                    <span><b>128</b> Seguidores</span>
                    <span><b>256</b> Seguindo</span>
                </div>
            </div>
        </div>

        <nav>
            <i class="fas fa-home active" onclick="showTab('home', this)"></i>
            <i class="fas fa-search" onclick="showTab('search', this)"></i>
            <i class="fas fa-user" onclick="showTab('profile', this)"></i>
        </nav>
    </div>

    <script>
        // Lógica de Navegação
        function switchAuth(type) {
            document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = type === 'register' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active'));
        }

        function login() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            updatePosts();
        }

        function showTab(tabId, el) {
            document.querySelectorAll('.content-area').forEach(c => c.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('nav i').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // Funcionalidade de Home (Posts)
        function updatePosts() {
            const feed = document.getElementById('feed-content');
            feed.innerHTML = `<div class="post"><b>@Admin:</b> Bem-vindo ao KChat Global! 🚀</div>` + feed.innerHTML;
        }

        // Funcionalidade de Busca
        const users = [
            {name: 'Luna_Star', followers: 120},
            {name: 'DevMaster', followers: 540},
            {name: 'K-Lover', followers: 89}
        ];

        function searchUser() {
            const list = document.getElementById('user-list');
            list.innerHTML = users.map(u => `
                <div class="user-card">
                    <b>${u.name}</b> - ${u.followers} seguidores
                    <button style="width: auto; padding: 5px 10px; float: right;" onclick="this.innerText='Seguindo'">Seguir</button>
                </div>
            `).join('');
        }

        // Edição de Perfil
        function editProfile() {
            const newName = prompt("Novo nome:");
            const newBio = prompt("Nova bio:");
            if(newName) document.getElementById('p-name').innerText = newName;
            if(newBio) document.getElementById('p-bio').innerText = newBio;
        }
    </script>
</body>
</html>
