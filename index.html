<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K. Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #8a2be2; --accent: linear-gradient(45deg, #c026d3, #db2777); --bg: #000; --card: #111; --text: #fff; --gray: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: flex; }

        /* Estilos de Auth e Perfil */
        .auth-container { padding: 40px 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; }
        .pfp-wrapper { position: relative; width: 120px; height: 120px; margin-bottom: 20px; }
        #pfp-preview { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); background: #222; }
        .pfp-label { position: absolute; bottom: 0; right: 0; background: var(--primary); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .gender-group { display: flex; gap: 25px; margin: 20px 0; }
        .gender-option { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .gender-option input { width: 20px; height: 20px; accent-color: var(--primary); }
        
        /* Feed e Cards (Igual à Foto) */
        .top-bar { position: sticky; top: 0; background: var(--bg); display: flex; align-items: center; padding: 15px; gap: 15px; z-index: 10; border-bottom: 1px solid #111; }
        .search-box { background: #121212; flex: 1; display: flex; align-items: center; padding: 10px 15px; border-radius: 12px; border: 1px solid #1a1a1a; }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; margin-left: 10px; outline: none; }
        .post-card { background: var(--card); margin: 15px; border-radius: 15px; padding: 15px; border: 1px solid #222; }
        .post-user { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-user img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .post-media { width: 100%; border-radius: 10px; margin-top: 10px; max-height: 400px; object-fit: cover; }

        /* Navegação */
        .bottom-nav { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 50; }
        .nav-container { background: rgba(10,10,10,0.9); width: 90%; height: 75px; border-radius: 35px; border: 1px solid #222; display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(10px); }
        .plus-btn { background: var(--accent); width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-top: -15px; box-shadow: 0 8px 20px rgba(192, 38, 211, 0.4); cursor: pointer; }
        
        /* Modais */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; border: 1px solid #333; }
        
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 25px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        input, textarea { background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; color: #fff; width: 100%; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h1 style="color:var(--primary); font-size: 3.5rem; font-weight: 800; margin-bottom: 10px;">K.</h1>
            <div style="display:flex; gap:30px; margin-bottom:30px;">
                <button onclick="setAuth('login')" id="btn-l" style="color:#fff; background:none; border:none; font-size: 1.1rem; font-weight: bold; border-bottom: 2px solid var(--primary);">Login</button>
                <button onclick="setAuth('reg')" id="btn-r" style="color:#555; background:none; border:none; font-size: 1.1rem; font-weight: bold;">Registrar</button>
            </div>
            <input type="text" id="auth-user" placeholder="Nome de usuário">
            <input type="password" id="auth-pass" placeholder="Senha">
            <button class="btn-main" id="main-auth-btn">Entrar</button>
        </div>
    </div>

    <div id="profile-setup" class="screen">
        <div class="auth-container">
            <h2>Complete seu Perfil</h2>
            <div class="pfp-wrapper">
                <img src="https://via.placeholder.com/120" id="pfp-preview">
                <label class="pfp-label" for="pfp-input"><i class="fa fa-camera"></i></label>
                <input type="file" id="pfp-input" hidden accept="image/*">
            </div>
            <input type="number" id="setup-age" placeholder="Sua Idade">
            <div class="gender-group">
                <label class="gender-option"><i class="fa fa-mars" style="color:#0084ff"></i><input type="radio" name="g" value="m"></label>
                <label class="gender-option"><i class="fa fa-venus" style="color:#ff007b"></i><input type="radio" name="g" value="f"></label>
                <label class="gender-option"><i class="fa fa-transgender" style="color:#ffcc00"></i><input type="radio" name="g" value="o"></label>
            </div>
            <button class="btn-main" id="btn-save-profile">Criar Conta</button>
        </div>
    </div>

    <div id="feed-screen" class="screen">
        <header class="top-bar">
            <span style="color:var(--primary); font-weight:bold; font-size:26px">K.</span>
            <div class="search-box"><i class="fa fa-search"></i><input type="text" placeholder="Teste"></div>
        </header>
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h1 style="font-size: 28px; font-weight: 800;">Global Feed</h1>
            <i class="fa-solid fa-arrows-rotate" style="color:var(--primary); font-size: 20px; cursor:pointer" id="btn-refresh"></i>
        </div>
        <div id="posts-container"></div>
    </div>

    <div id="profile-screen" class="screen">
        <div style="padding: 40px 20px; text-align: center; position: relative;">
            <i class="fa-solid fa-pencil" style="position:absolute; top:20px; right:20px; color:var(--primary); cursor:pointer" onclick="openEdit()"></i>
            <img src="" id="my-pfp" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary); margin-bottom:15px; object-fit: cover;">
            <h2 id="my-name">Usuário</h2>
            <p id="my-bio" style="color:var(--gray); margin-top:8px;">Carregando...</p>
        </div>
        <div id="my-posts"></div>
    </div>

    <div id="modal-post" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px">Novo Post</h3>
            <textarea id="post-text" placeholder="O que você está pensando?" rows="4"></textarea>
            <p style="font-size: 12px; color: var(--gray); margin-bottom: 5px;">Adicionar Foto/Vídeo:</p>
            <input type="file" id="post-media" accept="image/*,video/*">
            <div style="display:flex; gap:10px;">
                <button class="btn-main" id="btn-send-post">Publicar</button>
                <button class="btn-main" style="background:#333" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav" id="main-nav" style="display:none">
        <div class="nav-container">
            <i class="fa-solid fa-compass" style="font-size:24px; cursor:pointer" onclick="showScreen('feed-screen')"></i>
            <div class="plus-btn" onclick="openModal()"><i class="fa-solid fa-plus"></i></div>
            <i class="fa-solid fa-user-astronaut" style="font-size:24px; cursor:pointer" onclick="showScreen('profile-screen')"></i>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // SUA CONFIGURAÇÃO
        const firebaseConfig = {
            apiKey: "AIzaSyDPlWGrAgR6wvMilamQ1Z83nAhXJAaRHD0",
            authDomain: "kchat-1debf.firebaseapp.com",
            projectId: "kchat-1debf",
            storageBucket: "kchat-1debf.firebasestorage.app",
            messagingSenderId: "622333653477",
            appId: "1:622333653477:web:dab185145cfa4b18983f0c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;
        let authMode = 'login';

        // AUTH LOGIC
        window.setAuth = (m) => {
            authMode = m;
            document.getElementById('btn-l').style.color = m === 'login' ? '#fff' : '#555';
            document.getElementById('btn-l').style.borderBottom = m === 'login' ? '2px solid var(--primary)' : 'none';
            document.getElementById('btn-r').style.color = m === 'reg' ? '#fff' : '#555';
            document.getElementById('btn-r').style.borderBottom = m === 'reg' ? '2px solid var(--primary)' : 'none';
        };

        document.getElementById('main-auth-btn').onclick = async () => {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value;
            if(!user || !pass) return alert("Preencha tudo!");

            const userRef = doc(db, "users", user);
            const userSnap = await getDoc(userRef);

            if(authMode === 'reg') {
                if(userSnap.exists()) return alert("Nome já em uso!");
                currentUser = { name: user, pass: pass, pfp: '', bio: 'Novo por aqui!', age: '' };
                showScreen('profile-setup');
            } else {
                if(userSnap.exists() && userSnap.data().pass === pass) {
                    currentUser = userSnap.data();
                    startApp();
                } else alert("Usuário ou senha incorretos.");
            }
        };

        // PROFILE LOGIC
        document.getElementById('pfp-input').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('pfp-preview').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('btn-save-profile').onclick = async () => {
            const file = document.getElementById('pfp-input').files[0];
            if(file) {
                const sRef = ref(storage, `pfps/${currentUser.name}`);
                await uploadBytes(sRef, file);
                currentUser.pfp = await getDownloadURL(sRef);
            }
            currentUser.age = document.getElementById('setup-age').value;
            await setDoc(doc(db, "users", currentUser.name), currentUser);
            startApp();
        };

        function startApp() {
            showScreen('feed-screen');
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('my-pfp').src = currentUser.pfp || 'https://via.placeholder.com/100';
            document.getElementById('my-name').innerText = currentUser.name;
            document.getElementById('my-bio').innerText = currentUser.bio;
            loadPosts();
        }

        // POST LOGIC
        window.openModal = () => document.getElementById('modal-post').style.display = 'flex';
        window.closeModal = () => document.getElementById('modal-post').style.display = 'none';

        document.getElementById('btn-send-post').onclick = async () => {
            const text = document.getElementById('post-text').value;
            const file = document.getElementById('post-media').files[0];
            let mediaUrl = "";

            if(file) {
                const sRef = ref(storage, `posts/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                mediaUrl = await getDownloadURL(sRef);
            }

            await addDoc(collection(db, "posts"), {
                user: currentUser.name,
                pfp: currentUser.pfp,
                text: text,
                media: mediaUrl,
                time: Date.now(),
                likes: 0
            });

            closeModal();
            document.getElementById('post-text').value = "";
        };

        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("time", "desc"));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('posts-container');
                container.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-user">
                                <img src="${p.pfp || 'https://via.placeholder.com/40'}">
                                <b>${p.user}</b>
                            </div>
                            <div style="font-size:15px; line-height:1.4">${p.text}</div>
                            ${p.media ? (p.media.includes('.mp4') || p.media.includes('video') ? `<video src="${p.media}" class="post-media" controls></video>` : `<img src="${p.media}" class="post-media">`) : ''}
                        </div>
                    `;
                });
            });
        }

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        document.getElementById('btn-refresh').onclick = () => loadPosts();

    </script>
</body>
</html>
