<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Cloud Premium</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-dark: #050505; 
            --bg-card: #121214; 
            --accent-purple: #a855f7; 
            --accent-pink: #ec4899; 
            --text-main: #ffffff; 
            --text-dim: #a1a1aa;
            --glass: rgba(20, 20, 23, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* Telas */
        .screen { display: none; min-height: 100vh; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Header Estilo Imagem */
        .app-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: var(--bg-dark); z-index: 100; }
        .search-bar { flex: 1; background: #1a1a1e; border-radius: 12px; display: flex; align-items: center; padding: 8px 15px; border: 1px solid #27272a; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; font-size: 14px; }
        .logo-small { font-weight: 900; font-size: 22px; color: var(--accent-purple); }

        /* Auth */
        .auth-container { padding: 60px 25px; text-align: center; display: flex; flex-direction: column; gap: 20px; }
        .custom-input-group { background: var(--bg-card); border-radius: 15px; padding: 15px; border: 1px solid #27272a; display: flex; align-items: center; }
        .custom-input-group input { background: transparent; border: none; width: 100%; color: white; outline: none; margin-left: 10px; }
        .btn-premium { width: 100%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; font-weight: 700; cursor: pointer; }

        /* Post Card */
        .post-card { background: var(--bg-card); border-radius: 20px; margin: 15px; padding: 15px; border: 1px solid #1f1f23; }
        .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #27272a; position: relative; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; border: 2px solid var(--bg-card); position: absolute; bottom: 0; right: 0; }
        .post-content { font-size: 15px; line-height: 1.5; color: #e4e4e7; margin-bottom: 12px; }
        .post-media { width: 100%; border-radius: 12px; margin-bottom: 12px; display: none; }
        .post-actions { display: flex; gap: 20px; color: var(--text-dim); font-size: 14px; border-top: 1px solid #27272a; padding-top: 10px; }
        .action-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .action-item.liked { color: var(--accent-pink); }

        /* Navegação Estilo Imagem */
        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; background: var(--glass); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; padding: 10px; backdrop-filter: blur(20px); border: 1px solid #27272a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { color: var(--text-dim); font-size: 20px; transition: 0.3s; }
        .nav-item.active { color: white; }
        .plus-fab { background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; margin-top: -35px; box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4); }

        /* Perfil */
        .profile-header { text-align: center; padding: 30px 20px; position: relative; }
        .edit-badge { position: absolute; right: 10px; top: 10px; background: #27272a; padding: 8px; border-radius: 50%; color: white; }
        .profile-pic-large { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent-purple); margin-bottom: 15px; }

        /* Chat Categories */
        .chat-tabs { display: flex; justify-content: space-around; padding: 15px; border-bottom: 1px solid #27272a; }
        .tab { color: var(--text-dim); font-weight: 600; font-size: 14px; }
        .tab.active { color: var(--accent-purple); border-bottom: 2px solid var(--accent-purple); padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="auth-container">
            <div class="logo-k" style="font-size: 50px; font-weight: 900; background: linear-gradient(45deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">K.</div>
            <div class="custom-input-group"><i class="fas fa-at"></i><input type="text" id="login-user" placeholder="Nome de usuário"></div>
            <div class="custom-input-group"><i class="fas fa-lock"></i><input type="password" id="login-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="handleLogin()">Acessar Nuvem</button>
            <p onclick="showScreen('register')" style="color:var(--text-dim)">Novo por aqui? <span style="color:var(--accent-pink)">Criar conta</span></p>
        </div>
    </div>

    <div id="screen-register" class="screen">
        <div class="auth-container">
            <h2 class="logo-k">Cadastre-se</h2>
            <div class="custom-input-group"><input type="text" id="reg-user" placeholder="Escolha um @usuário"></div>
            <div class="custom-input-group"><input type="password" id="reg-pass" placeholder="Senha segura"></div>
            <button class="btn-premium" onclick="showScreen('onboarding')">Próximo</button>
            <p onclick="showScreen('login')" style="color:var(--text-dim)">Já sou membro</p>
        </div>
    </div>

    <div id="screen-onboarding" class="screen">
        <div class="auth-container">
            <h2>Personalizar</h2>
            <div style="position:relative; width:110px; margin:0 auto;" onclick="document.getElementById('file-input').click()">
                <img id="img-preview" src="https://via.placeholder.com/110" class="profile-pic-large">
                <input type="file" id="file-input" accept="image/*" onchange="previewImage(this)" style="display:none">
                <div style="position:absolute; bottom:15px; right:5px; background:var(--accent-purple); padding:5px; border-radius:50%; font-size:12px;"><i class="fas fa-camera"></i></div>
            </div>
            <div class="custom-input-group"><input type="text" id="onb-status" placeholder="O que está pensando? (Status)"></div>
            <button class="btn-premium" onclick="handleRegister()">Entrar no k.chat</button>
        </div>
    </div>

    <div id="screen-feed" class="screen">
        <header class="app-header">
            <div class="logo-small">K.</div>
            <div class="search-bar">
                <i class="fas fa-search" style="color:#555"></i>
                <input type="text" id="search-input" placeholder="Buscar usuários..." onkeyup="searchUsers()">
            </div>
            <i class="fas fa-sync-alt" onclick="listenPosts()" style="color: var(--accent-purple); font-size: 20px;"></i>
        </header>
        <div id="feed-content"></div>
    </div>

    <div id="screen-chat" class="screen">
        <div class="chat-tabs">
            <div class="tab active">Geral</div>
            <div class="tab">Grupos</div>
            <div class="tab">Convites</div>
        </div>
        <div style="padding: 40px; text-align: center; color: var(--text-dim);">
            <i class="fas fa-comments" style="font-size: 40px; margin-bottom: 10px;"></i>
            <p>Suas conversas aparecerão aqui em breve.</p>
        </div>
    </div>

    <div id="screen-profile" class="screen">
        <div class="profile-header">
            <div class="edit-badge" onclick="editProfile()"><i class="fas fa-pencil-alt"></i></div>
            <img id="my-pic" src="" class="profile-pic-large">
            <h2 id="my-name">@user</h2>
            <p id="my-status" style="color:var(--text-dim); margin-top:5px">Status...</p>
        </div>
        <div style="padding: 20px;">
            <button class="btn-premium" style="background:#1a1a1e; border: 1px solid #333;" onclick="logout()">Sair da Conta</button>
        </div>
    </div>

    <nav id="main-nav" style="display:none">
        <div class="nav-item active" onclick="showScreen('feed')"><i class="fas fa-compass"></i></div>
        <div class="plus-fab" onclick="newPost()"><i class="fas fa-plus"></i></div>
        <div class="nav-item" onclick="showScreen('chat')"><i class="fas fa-comment-dots"></i></div>
        <div class="nav-item" onclick="showScreen('profile')"><i class="fas fa-user-astronaut"></i></div>
    </nav>

    <script>
        // CONFIGURAÇÃO DO SEU FIREBASE (Mantenha o seu original)
        const firebaseConfig = {
            apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
            authDomain: "kchat-web-8415c.firebaseapp.com",
            projectId: "kchat-web-8415c",
            storageBucket: "kchat-web-8415c.firebasestorage.app",
            messagingSenderId: "878265144053",
            appId: "1:878265144053:web:407389cd133d955f76abbc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = null;
        let base64Avatar = "";

        // Sistema de Telas
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(id === 'feed') listenPosts();
            if(id === 'profile') loadProfileData();
        }

        // Preview de Imagem
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Avatar = e.target.result;
                    document.getElementById('img-preview').src = base64Avatar;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Login
        async function handleLogin() {
            const user = document.getElementById('login-user').value.toLowerCase().trim();
            const pass = document.getElementById('login-pass').value;
            if(!user || !pass) return alert("Preencha tudo!");

            try {
                const doc = await db.collection("usuarios").doc(user).get();
                if (doc.exists && doc.data().pass === pass) {
                    currentUser = doc.data();
                    updateUserStatus(true);
                    enterApp();
                } else { alert("Dados incorretos!"); }
            } catch(e) { alert("Erro de conexão."); }
        }

        // Registro com Verificação de Nickname Único
        async function handleRegister() {
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            const pass = document.getElementById('reg-pass').value;
            const status = document.getElementById('onb-status').value || "Disponível";

            if(user.length < 3) return alert("Nome de usuário muito curto!");

            try {
                const check = await db.collection("usuarios").doc(user).get();
                if(check.exists) return alert("Esse nome já está em uso!");

                const userData = { 
                    user, pass, status, 
                    pic: base64Avatar || "https://via.placeholder.com/110",
                    online: true,
                    lastSeen: Date.now()
                };
                
                await db.collection("usuarios").doc(user).set(userData);
                currentUser = userData;
                enterApp();
            } catch(e) { alert("Erro ao criar conta."); }
        }

        function enterApp() {
            document.getElementById('main-nav').style.display = 'flex';
            showScreen('feed');
        }

        // Status Online (Ponto Verde)
        function updateUserStatus(status) {
            if(!currentUser) return;
            db.collection("usuarios").doc(currentUser.user).update({
                online: status,
                lastSeen: Date.now()
            });
        }

        // Buscar Usuários
        async function searchUsers() {
            const query = document.getElementById('search-input').value.toLowerCase();
            if(query.length < 2) return;
            
            const results = await db.collection("usuarios")
                .where("user", ">=", query)
                .where("user", "<=", query + "\uf8ff")
                .limit(5).get();
            
            // Aqui você pode injetar os resultados no feed temporariamente
            console.log("Usuários encontrados:", results.docs.map(d => d.id));
        }

        // Listen Posts (Feed em Tempo Real)
        function listenPosts() {
            db.collection("posts").orderBy("time", "desc").limit(20).onSnapshot(snapshot => {
                const container = document.getElementById('feed-content');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const postId = doc.id;
                    const isLiked = post.likes_list && post.likes_list.includes(currentUser.user);
                    
                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <div class="user-info">
                                    <div style="position:relative">
                                        <img src="${post.authorPic}" class="user-avatar">
                                        <div class="status-dot" style="background: ${post.isOnline ? '#22c55e' : '#555'}"></div>
                                    </div>
                                    <strong>@${post.author}</strong>
                                </div>
                                <small style="color:#444">${new Date(post.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>
                            </div>
                            <div class="post-content">${post.content}</div>
                            <div class="post-actions">
                                <div class="action-item ${isLiked ? 'liked' : ''}" onclick="toggleLike('${postId}')">
                                    <i class="fas fa-heart"></i> ${post.likes || 0}
                                </div>
                                <div class="action-item" onclick="alert('Comentários em breve!')">
                                    <i class="fas fa-comment"></i> ${post.comments || 0}
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // Curtidas
        async function toggleLike(postId) {
            const ref = db.collection("posts").doc(postId);
            const doc = await ref.get();
            let list = doc.data().likes_list || [];
            let count = doc.data().likes || 0;

            if(list.includes(currentUser.user)) {
                list = list.filter(u => u !== currentUser.user);
                count--;
            } else {
                list.push(currentUser.user);
                count++;
            }
            await ref.update({ likes: count, likes_list: list });
        }

        // Criar Post
        async function newPost() {
            const text = prompt("O que você está pensando?");
            if(!text) return;
            
            await db.collection("posts").add({
                author: currentUser.user,
                authorPic: currentUser.pic,
                content: text,
                time: Date.now(),
                likes: 0,
                likes_list: [],
                comments: 0,
                isOnline: true
            });
        }

        // Perfil
        function loadProfileData() {
            document.getElementById('my-pic').src = currentUser.pic;
            document.getElementById('my-name').innerText = "@" + currentUser.user;
            document.getElementById('my-status').innerText = currentUser.status;
        }

        function editProfile() {
            const newStatus = prompt("Novo Status:", currentUser.status);
            if(newStatus) {
                db.collection("usuarios").doc(currentUser.user).update({ status: newStatus });
                currentUser.status = newStatus;
                loadProfileData();
            }
        }

        function logout() { updateUserStatus(false); location.reload(); }

        // Manter status online enquanto a aba estiver aberta
        window.addEventListener('beforeunload', () => updateUserStatus(false));
    </script>
</body>
</html>
