<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Cloud Premium</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-dark: #0a0a0c; 
            --bg-card: #141417; 
            --accent-purple: #a855f7; 
            --accent-pink: #ec4899; 
            --text-main: #ffffff; 
            --input-inner: inset 2px 2px 5px rgba(0,0,0,0.3); 
            --text-dim: #a1a1aa; 
            --glass: rgba(20, 20, 23, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 10px; }

        .screen { display: none; min-height: 100vh; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .auth-container { padding: 40px 25px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 22px; max-width: 450px; margin: auto; }
        .logo-k { font-size: 52px; font-weight: 900; background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4)); }
        
        .custom-input-group { width: 100%; background: var(--bg-card); border-radius: 20px; padding: 18px; border: 1px solid #1f1f23; display: flex; align-items: center; box-shadow: var(--input-inner); }
        .custom-input-group i { color: #444; width: 25px; }
        .custom-input-group input { background: transparent; border: none; width: 100%; color: white; outline: none; margin-left: 10px; font-size: 15px; }

        .gender-selector { display: flex; justify-content: space-between; width: 100%; gap: 12px; margin: 5px 0; }
        .gender-option { flex: 1; position: relative; text-align: center; background: var(--bg-card); border-radius: 18px; padding: 15px; border: 1px solid #1f1f23; cursor: pointer; }
        .gender-option input { position: absolute; opacity: 0; }
        .gender-option i { font-size: 24px; color: #333; transition: 0.3s; }
        .gender-option input:checked ~ i { color: var(--accent-pink); transform: scale(1.2); }
        .gender-option span { display: block; font-size: 10px; text-transform: uppercase; margin-top: 5px; color: #555; font-weight: 800; }

        .btn-premium { width: 100%; padding: 22px; border-radius: 22px; border: none; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); text-transform: uppercase; letter-spacing: 1px; }
        .btn-premium:active { transform: scale(0.96); }
        
        .app-header { padding: 18px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: var(--glass); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid #1a1a1e; }
        .search-bar { flex: 1; background: #1a1a1e; border-radius: 15px; display: flex; align-items: center; padding: 10px 15px; border: 1px solid #27272a; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; font-size: 14px; }

        .post-card { background: var(--bg-card); border-radius: 25px; padding: 18px; margin: 15px; border: 1px solid #1f1f23; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); cursor: pointer; }
        .user-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid #222; }
        
        .post-media-wrapper { width: 100%; margin-top: 15px; border-radius: 20px; overflow: hidden; border: 1px solid #27272a; background: #000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .post-media-wrapper img, .post-media-wrapper video { width: 100%; max-height: 500px; object-fit: contain; display: block; }

        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 15, 18, 0.85); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; padding: 15px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); z-index: 1000; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        nav div { cursor: pointer; color: #555; font-size: 22px; position: relative; }
        nav div.active { color: var(--accent-purple); }
        .plus-fab { background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); width: 65px; height: 65px; border-radius: 25px; display: flex; align-items: center; justify-content: center; color: white !important; margin-top: -50px; box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4); }

        .modal-embed { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-body { background: var(--bg-card); padding: 25px; border-radius: 30px; width: 100%; max-width: 420px; border: 1px solid #333; animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 10px; }
        .grid-item { aspect-ratio: 1/1; background: #1a1a1e; border-radius: 8px; overflow: hidden; border: 1px solid #222; position: relative; cursor: pointer; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .grid-item i { position: absolute; top: 8px; right: 8px; color: white; text-shadow: 0 0 8px black; font-size: 12px; }

        .avatar-carousel { display: flex; gap: 12px; overflow-x: auto; padding: 10px; width: 100%; scroll-snap-type: x mandatory; }
        .avatar-opt { width: 70px; height: 70px; border-radius: 50%; border: 3px solid transparent; flex-shrink: 0; cursor: pointer; scroll-snap-align: center; }
        .avatar-opt.selected { border-color: var(--accent-pink); transform: scale(1.1); }

        #chat-content { height: 72vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .bubble { padding: 14px 18px; border-radius: 22px; max-width: 80%; font-size: 14px; line-height: 1.4; position: relative; color: white; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .bubble-me { align-self: flex-end; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); border-bottom-right-radius: 4px; }
        .bubble-other { align-self: flex-start; background: #27272a; border-bottom-left-radius: 4px; }

        .post-time { font-size: 10px; color: #666; display: block; margin-top: 2px; }
        .nav-badge { position: absolute; top: -8px; right: -8px; background: #ff3b3b; color: white; font-size: 10px; font-weight: 900; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg-dark); }
        
        .notif-item { padding: 18px; border-bottom: 1px solid #1a1a1e; font-size: 14px; display: flex; align-items: center; gap: 12px; }
        .notif-unseen { background: rgba(168, 85, 247, 0.08); border-left: 4px solid var(--accent-purple); }
        
        .stat-row { display: flex; gap: 25px; margin: 15px 0; }
        .stat-row div { text-align: center; }
        .stat-row b { display: block; font-size: 18px; color: var(--text-main); font-weight: 800; }
        .stat-row span { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        .banner-container { width: 100%; height: 180px; background: #1a1a1e; position: relative; border-radius: 0 0 30px 30px; overflow: hidden; }
        .banner-container::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(transparent, var(--bg-dark)); }
        #my-banner-img, .view-banner-img { width: 100%; height: 100%; object-fit: cover; }
        
        .comment-item { padding: 12px; border-bottom: 1px solid #1a1a1e; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
        .comment-item b { color: var(--accent-pink); font-size: 12px; }
        
        .chat-list-item { display: flex; align-items: center; gap: 15px; padding: 18px; border-bottom: 1px solid #1a1a1e; cursor: pointer; }
        .chat-list-item:active { background: #1a1a1e; }
        
        .badge-premium { background: gold; color: black; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 900; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

    <!-- MODAL EDIT -->
    <div id="modal-edit" class="modal-embed" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-body">
            <h3 style="text-align:center">Personalizar Perfil</h3><br>
            <div style="text-align:center">
                <div style="position:relative; width:100%; height:100px; border-radius:15px; overflow:hidden; background:#222; margin-bottom:15px">
                    <img id="edit-banner-preview" src="" style="width:100%; height:100%; object-fit:cover;">
                    <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center" onclick="document.getElementById('banner-input').click()">
                        <i class="fas fa-camera" style="font-size:20px; color:white"></i>
                    </div>
                </div>
                <input type="file" id="banner-input" hidden accept="image/*" onchange="processBanner(this)">
                
                <div style="position:relative; width:90px; height:90px; margin:-50px auto 10px; border-radius:50%; border:4px solid var(--bg-card); overflow:hidden">
                    <img id="edit-img-preview" src="" style="width:100%; height:100%; object-fit:cover;">
                    <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center" onclick="document.getElementById('edit-file-input').click()">
                         <i class="fas fa-plus" style="font-size:15px; color:white"></i>
                    </div>
                </div>
                <input type="file" id="edit-file-input" hidden accept="image/*" onchange="processImage(this, 'edit')">
            </div>
            <div class="custom-input-group"><i class="fas fa-quote-left"></i><input type="text" id="edit-status-input" placeholder="Escreva uma bio incrível..."></div><br>
            <button class="btn-premium" onclick="saveFullEdit()">Salvar Alterações</button>
        </div>
    </div>

    <!-- MODAL POST -->
    <div id="modal-post" class="modal-embed" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-body">
            <h3>Nova Publicação</h3><br>
            <div class="custom-input-group"><input type="text" id="post-text-input" placeholder="O que está acontecendo?"></div><br>
            <div id="post-media-preview" style="width:100%; border-radius:15px; overflow:hidden; margin-bottom:15px;"></div>
            <button onclick="document.getElementById('post-file-input').click()" style="width:100%; padding:15px; border-radius:15px; background:#1a1a1e; border:1px solid #333; color:white; font-size:13px;"><i class="fas fa-images" style="color:var(--accent-pink); margin-right:8px"></i> Adicionar Foto ou Vídeo</button>
            <input type="file" id="post-file-input" hidden accept="image/*,video/mp4" onchange="previewMedia(this)"><br><br>
            <button class="btn-premium" id="btn-submit-post" onclick="submitPost()">Publicar Agora</button>
        </div>
    </div>

    <!-- MODAL POST DETAILS + COMMENTS -->
    <div id="modal-view-post" class="modal-embed" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-body" style="height: 85vh; display:flex; flex-direction:column;">
            <div id="view-post-content" style="flex:1; overflow-y:auto;"></div>

            <div style="border-top:1px solid #222; padding-top:12px; margin-top:10px;">
                <div class="custom-input-group">
                    <input type="text" id="new-comment-input" placeholder="Diga algo legal...">
                    <i class="fas fa-paper-plane" onclick="sendComment()" style="color:var(--accent-purple); cursor:pointer; padding: 10px;"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="screen-login" class="screen active">
        <div class="auth-container" style="margin-top: 50px">
            <div class="logo-k">K.</div>
            <p style="color:#666; margin-top:-20px">Social Media Cloud Premium</p>
            <div class="custom-input-group"><i class="fas fa-at"></i><input type="text" id="login-user" placeholder="Nome de usuário"></div>
            <div class="custom-input-group"><i class="fas fa-key"></i><input type="password" id="login-pass" placeholder="Sua senha secreta"></div>
            <button class="btn-premium" onclick="handleLogin()">Entrar na Nuvem</button>
            <p onclick="showScreen('register')" style="color:#555; font-size: 13px">Ainda não é membro? <span style="color:var(--accent-pink); font-weight:800">Criar Conta</span></p>
        </div>
    </div>

    <!-- REGISTER -->
    <div id="screen-register" class="screen">
        <div class="auth-container">
            <div class="logo-k" style="font-size: 32px">Boas-vindas!</div>
            <div class="custom-input-group"><i class="fas fa-user"></i><input type="text" id="reg-user" placeholder="Como quer ser chamado?" onblur="checkUserExists(this.value)"></div>
            <div id="reg-warn" style="color:var(--accent-pink); font-size:11px; display:none; width: 100%; text-align: left; padding-left: 10px;">Indisponível! Tente outro nome.</div>
            <div class="custom-input-group"><i class="fas fa-lock"></i><input type="password" id="reg-pass" placeholder="Crie uma senha forte"></div>
            <button class="btn-premium" onclick="goToOnboarding()">Próximo Passo</button>
            <p onclick="showScreen('login')" style="color:#666">Já tenho uma conta</p>
        </div>
    </div>

    <!-- ONBOARDING -->
    <div id="screen-onboarding" class="screen">
        <div class="auth-container">
            <h3>Identidade</h3>
            <div style="position:relative; width:120px; height:120px; border-radius:50%; background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); padding: 4px;" onclick="document.getElementById('file-input').click()">
                <div style="width:100%; height:100%; border-radius:50%; overflow:hidden; background:#111">
                    <img id="img-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=new" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div style="position:absolute; bottom:5px; right:5px; background:white; color:black; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px"><i class="fas fa-camera"></i></div>
                <input type="file" id="file-input" accept="image/*" onchange="processImage(this, 'reg')" hidden>
            </div>
            
            <div class="avatar-carousel" id="avatar-list">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-opt" onclick="selectAvatar(this.src, this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar-opt" onclick="selectAvatar(this.src, this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Jack" class="avatar-opt" onclick="selectAvatar(this.src, this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mimi" class="avatar-opt" onclick="selectAvatar(this.src, this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luna" class="avatar-opt" onclick="selectAvatar(this.src, this)">
            </div>

            <div class="custom-input-group"><i class="fas fa-calendar-day"></i><input type="date" id="onb-date"></div>
            <div class="custom-input-group"><i class="fas fa-pen-nib"></i><input type="text" id="onb-status" placeholder="Bio: No que você é bom?"></div>
            
            <div class="gender-selector">
                <label class="gender-option"><input type="radio" name="gen" value="Ele"><i class="fas fa-mars"></i><span>Ele</span></label>
                <label class="gender-option"><input type="radio" name="gen" value="Ela"><i class="fas fa-venus"></i><span>Ela</span></label>
                <label class="gender-option"><input type="radio" name="gen" value="Neutro"><i class="fas fa-genderless"></i><span>Neutro</span></label>
            </div>

            <button class="btn-premium" onclick="handleRegister()">Entrar na Comunidade</button>
        </div>
    </div>

    <!-- FEED -->
    <div id="screen-feed" class="screen">
        <header class="app-header">
            <div class="logo-k" style="font-size:28px">K.</div>
            <div class="search-bar"><i class="fas fa-search" style="color:#555"></i><input type="text" placeholder="Explorar o k.chat..." oninput="searchContent(this.value)"></div>
            <div style="position:relative; cursor:pointer" onclick="showScreen('notifications')">
                <i class="far fa-bell" style="font-size:22px; color:var(--text-main)"></i>
                <div id="notif-badge" class="nav-badge" style="display:none">0</div>
            </div>
            <i class="far fa-comment-alt" onclick="showScreen('chat-list')" style="font-size:22px; color:var(--text-main); cursor:pointer"></i>
        </header>
        <div id="feed-content"></div>
    </div>

    <!-- NOTIFICATIONS -->
    <div id="screen-notifications" class="screen">
        <header class="app-header">
            <i class="fas fa-chevron-left" onclick="showScreen('feed')"></i>
            <h3 style="flex:1; text-align:center; font-weight: 800;">Atividade</h3>
        </header>
        <div id="notif-content"></div>
    </div>

    <!-- CHAT LIST -->
    <div id="screen-chat-list" class="screen">
        <header class="app-header">
            <i class="fas fa-chevron-left" onclick="showScreen('feed')"></i>
            <h3 style="flex:1; text-align:center; font-weight: 800;">Conversas</h3>
        </header>
        <div id="chat-list-content"></div>
    </div>

    <!-- CHAT -->
    <div id="screen-chat" class="screen">
        <header class="app-header">
            <i class="fas fa-chevron-left" onclick="showScreen('chat-list')"></i>
            <h3 id="chat-target-name" style="flex:1; text-align:center; font-size: 16px;">Chat</h3>
            <i class="fas fa-ellipsis-v"></i>
        </header>
        <div id="chat-content"></div>
        <div style="position: fixed; bottom: 20px; width: 100%; padding: 15px; display: flex; gap: 10px; background: var(--bg-dark); border-top: 1px solid #1a1a1e">
            <input type="text" id="chat-input" placeholder="Escreva sua mensagem..." style="flex:1; background: #1a1a1e; border: 1px solid #333; border-radius: 25px; padding: 15px; color: white; outline: none; font-size: 14px;">
            <button id="btn-send-msg" style="background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); border: none; width: 50px; height: 50px; border-radius: 50%; color: white; box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3);"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- PROFILE -->
    <div id="screen-profile" class="screen">
        <div class="banner-container">
            <img id="my-banner-img" src="">
        </div>
        <div class="auth-container" style="margin-top:-95px; position:relative; z-index:2">
            <div style="width:100%; display:flex; justify-content:flex-end; padding-right:10px">
                <i class="fas fa-cog" onclick="openEditModal()" style="color:#fff; background:rgba(0,0,0,0.5); padding:12px; border-radius:50%; font-size:18px; cursor:pointer; backdrop-filter:blur(5px)"></i>
            </div>
            <div style="padding: 4px; background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); border-radius: 50%;">
                <img id="my-pic" src="" style="width:120px; height:120px; border-radius:50%; border:4px solid var(--bg-dark); object-fit:cover; background:var(--bg-dark)">
            </div>
            <h2 id="my-name">@carregando...<span class="badge-premium">PRO</span></h2>
            <p id="my-gender" style="font-size:12px; color:var(--accent-pink); margin-top:-12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;"></p>
            <div class="stat-row">
                <div><b id="my-followers-count">0</b><span>Seguidores</span></div>
                <div><b id="my-following-count">0</b><span>Seguindo</span></div>
                <div><b id="my-post-count">0</b><span>Posts</span></div>
            </div>
            <p id="my-status" style="color:#a1a1aa; max-width: 85%; font-size: 14px; line-height: 1.5;"></p>
            <button class="btn-premium" onclick="logout()" style="background:#1a1a1e; border: 1px solid #333; margin-top:10px; height:45px; padding:0 30px; width:auto; font-size: 12px;">Desconectar</button>
        </div>
        <div style="border-top: 1px solid #1a1a1e; margin-top: 20px;">
            <div style="padding: 15px; font-size: 11px; color: #555; text-transform: uppercase; font-weight: 900; letter-spacing: 2px;"><i class="fas fa-grip-vertical" style="margin-right:8px"></i> Galeria de Posts</div>
            <div id="my-posts-grid" class="profile-grid"></div>
        </div>
    </div>

    <!-- VIEW PROFILE -->
    <div id="screen-view-profile" class="screen">
        <div id="view-profile-header"></div>
        <div style="border-top: 1px solid #1a1a1e; margin-top: 20px;">
             <div style="padding: 15px; font-size: 11px; color: #555; text-transform: uppercase; font-weight: 900; letter-spacing: 2px;"><i class="fas fa-grip-vertical" style="margin-right:8px"></i> Publicações</div>
             <div id="view-posts-grid" class="profile-grid"></div>
        </div>
    </div>

    <!-- NAV -->
    <nav id="main-nav" style="display:none">
        <div onclick="showScreen('feed')" id="nav-feed"><i class="fas fa-home"></i></div>
        <div class="plus-fab" onclick="openPostModal()"><i class="fas fa-plus"></i></div>
        <div onclick="showScreen('profile')" id="nav-profile"><i class="fas fa-user-circle"></i></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
            authDomain: "kchat-web-8415c.firebaseapp.com",
            projectId: "kchat-web-8415c",
            storageBucket: "kchat-web-8415c.firebasestorage.app",
            messagingSenderId: "878265144053",
            appId: "1:878265144053:web:407389cd133d955f76abbc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        let base64Avatar = "";
        let base64Banner = ""; 
        let base64PostMedia = "";
        let currentPostId = null; 
        let activeChatTarget = null;
        let chatUnsubscribe = null;
        let postDetailsUnsub = null;

        const DEFAULT_BANNER = "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000";

        function timeAgo(timestamp) {
            if(!timestamp) return "...";
            const diff = Date.now() - timestamp;
            const seconds = Math.floor(diff / 1000);
            if (seconds < 60) return "agora";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `há ${minutes}min`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `há ${hours}h`;
            return new Date(timestamp).toLocaleDateString();
        }

        window.onload = () => {
            const saved = localStorage.getItem('kchat_user');
            if(saved) {
                currentUser = JSON.parse(saved);
                enterApp();
            }
        }

        function selectAvatar(url, el) {
            base64Avatar = url;
            document.getElementById('img-preview').src = url;
            document.querySelectorAll('.avatar-opt').forEach(img => img.classList.remove('selected'));
            el.classList.add('selected');
        }

        function processImage(input, mode) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if(mode === 'reg') { 
                        base64Avatar = e.target.result; 
                        document.getElementById('img-preview').src = base64Avatar; 
                    } else { 
                        base64Avatar = e.target.result; 
                        document.getElementById('edit-img-preview').src = base64Avatar; 
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function processBanner(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Banner = e.target.result;
                    document.getElementById('edit-banner-preview').src = base64Banner;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function previewMedia(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64PostMedia = e.target.result;
                    const container = document.getElementById('post-media-preview');
                    if(file.type.includes('video')) {
                        container.innerHTML = `<video src="${base64PostMedia}" style="width:100%" autoplay muted loop></video>`;
                    } else {
                        container.innerHTML = `<img src="${base64PostMedia}" style="width:100%">`;
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        async function checkUserExists(user) {
            if(!user) return;
            const doc = await db.collection("usuarios").doc(user.toLowerCase().trim()).get();
            document.getElementById('reg-warn').style.display = doc.exists ? 'block' : 'none';
        }

        function goToOnboarding() {
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            const pass = document.getElementById('reg-pass').value;

            if(!user || user.length < 4) return alert("Usuário precisa ter no mínimo 4 caracteres.");
            if(!pass || pass.length < 6) return alert("Senha precisa ter no mínimo 6 caracteres.");

            showScreen('onboarding');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            
            document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));

            if(id === 'feed') document.getElementById('nav-feed').classList.add('active');
            if(id === 'profile') {
                document.getElementById('nav-profile').classList.add('active');
                loadProfile();
            }

            if(id === 'chat-list') loadChatList();
            if(id === 'notifications') markNotificationsAsSeen();

            if(id === 'chat' || id === 'chat-list' || id === 'notifications') {
                document.getElementById("main-nav").style.display = "none";
            } else {
                if(currentUser) document.getElementById("main-nav").style.display = "flex";
            }

            window.scrollTo(0,0);
        }

        async function handleLogin() {
            const user = document.getElementById('login-user').value.toLowerCase().trim();
            const pass = document.getElementById('login-pass').value;
            if(!user || !pass) return alert("Preencha tudo!");

            const doc = await db.collection("usuarios").doc(user).get();
            if (!doc.exists) return alert("Usuário não encontrado.");

            const data = doc.data();
            if(data.pass !== pass) return alert("Senha incorreta.");

            currentUser = { ...data, user: data.user || user };
            enterApp();
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            const pass = document.getElementById('reg-pass').value;
            const date = document.getElementById('onb-date').value;
            const status = document.getElementById('onb-status').value || "Oi! Estou no k.chat";

            const genInput = document.querySelector('input[name="gen"]:checked');
            const gen = genInput ? genInput.value : null;

            if(!user || user.length < 4) return alert("Usuário precisa ter no mínimo 4 caracteres.");
            if(!pass || pass.length < 6) return alert("Senha precisa ter no mínimo 6 caracteres.");
            if(!date) return alert("Selecione sua data antes de continuar.");
            if(!gen) return alert("Escolha seu gênero antes de continuar.");

            const check = await db.collection("usuarios").doc(user).get();
            if(check.exists) return alert("Esse usuário já existe.");

            const userData = { 
                user, pass, status, gen,
                birth: date,
                pic: base64Avatar || "https://api.dicebear.com/7.x/avataaars/svg?seed="+user, 
                banner: DEFAULT_BANNER, 
                followers: [], following: [], joined: Date.now() 
            };

            await db.collection("usuarios").doc(user).set(userData);

            currentUser = userData; 
            enterApp();
        }

        function enterApp() { 
            if(!currentUser || !currentUser.user) {
                alert("Erro de sessão. Faça login novamente.");
                localStorage.clear();
                location.reload();
                return;
            }

            localStorage.setItem('kchat_user', JSON.stringify(currentUser));
            document.getElementById('main-nav').style.display = 'flex'; 
            showScreen('feed'); 
            listenPosts(); 
            listenNotifications();
        }

        function listenPosts(filter = "") {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('feed-content');
                container.innerHTML = "";

                snapshot.forEach(doc => {
                    const post = doc.data();
                    const postId = doc.id;

                    if(filter && !post.content.toLowerCase().includes(filter) && !post.author.toLowerCase().includes(filter)) return;
                    
                    const isLiked = post.likes_list && post.likes_list.includes(currentUser.user);
                    const isVideo = post.media && post.media.includes("data:video");

                    container.innerHTML += `
                        <div class="post-card" onclick="openPostDetails('${postId}')">
                            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px">
                                <div style="display:flex; align-items:center; gap:12px; cursor:pointer" onclick="event.stopPropagation(); openUserProfile('${post.author}')">
                                    <img src="${post.authorPic || 'https://via.placeholder.com/42'}" class="user-avatar">
                                    <div>
                                        <strong style="font-size:14px">@${post.author}</strong>
                                        <span class="post-time">${timeAgo(post.time)}</span>
                                    </div>
                                </div>
                                ${post.author === currentUser.user ? `<i class="fas fa-trash-alt" style="color:#ff4444; font-size:14px; cursor:pointer; opacity:0.5" onclick="event.stopPropagation(); deletePost('${postId}')"></i>` : ''}
                            </div>

                            <p style="font-size:14px; line-height:1.5; margin-bottom:5px; color:#efeff1">${post.content}</p>

                            ${post.media ? `
                                <div class="post-media-wrapper" onclick="event.stopPropagation(); openPostDetails('${postId}')">
                                    ${isVideo ? `<video src="${post.media}" autoplay muted loop playsinline></video>` : `<img src="${post.media}">`}
                                </div>` : ''}

                            <div style="margin-top:15px; display:flex; gap:25px; align-items:center">
                                <div onclick="event.stopPropagation(); toggleLike('${postId}', '${post.author}')" style="cursor:pointer; display:flex; align-items:center; gap:6px">
                                    <i class="${isLiked ? 'fas' : 'far'} fa-heart" style="color:${isLiked ? '#ec4899' : '#666'}; font-size:18px"></i>
                                    <span style="font-size:13px; color:#999; font-weight:600">${post.likes || 0}</span>
                                </div>

                                <div onclick="event.stopPropagation(); openPostDetails('${postId}')" style="cursor:pointer; display:flex; align-items:center; gap:6px">
                                    <i class="far fa-comment" style="color:#666; font-size:18px"></i>
                                    <span style="font-size:13px; color:#999; font-weight:600">Ver mais</span>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        async function submitPost() {
            const text = document.getElementById('post-text-input').value;
            if(!text && !base64PostMedia) return;

            const btn = document.getElementById('btn-submit-post');
            btn.innerText = "Sincronizando...";
            btn.disabled = true;

            await db.collection("posts").add({
                author: currentUser.user, 
                authorPic: currentUser.pic || "",
                content: text, 
                media: base64PostMedia, 
                time: Date.now(), 
                likes: 0, 
                likes_list: []
            });

            document.getElementById('modal-post').style.display = 'none';
            base64PostMedia = ""; 
            document.getElementById('post-media-preview').innerHTML = "";
            document.getElementById('post-text-input').value = "";
            btn.innerText = "Publicar Agora";
            btn.disabled = false;
        }

        async function deletePost(postId) {
            if(confirm("Apagar permanentemente da nuvem?")) {
                await db.collection("posts").doc(postId).delete();
            }
        }

        async function toggleLike(postId, author) {
            const ref = db.collection("posts").doc(postId);
            const doc = await ref.get();
            if(!doc.exists) return;

            const data = doc.data();
            const likesList = data.likes_list || [];

            if(likesList.includes(currentUser.user)) {
                await ref.update({ 
                    likes: firebase.firestore.FieldValue.increment(-1), 
                    likes_list: firebase.firestore.FieldValue.arrayRemove(currentUser.user) 
                });
            } else {
                await ref.update({ 
                    likes: firebase.firestore.FieldValue.increment(1), 
                    likes_list: firebase.firestore.FieldValue.arrayUnion(currentUser.user) 
                });
                sendNotification(author, "curtiu sua publicação");
            }
        }

        async function sendNotification(toUser, text) {
            if(toUser === currentUser.user) return;
            await db.collection("notificacoes").add({ 
                to: toUser, 
                from: currentUser.user, 
                text, 
                time: Date.now(), 
                seen: false 
            });
        }

        function listenNotifications() {
            db.collection("notificacoes")
            .where("to", "==", currentUser.user)
            .orderBy("time", "desc")
            .onSnapshot(snap => {

                const badge = document.getElementById('notif-badge');
                const unseen = snap.docs.filter(d => !d.data().seen).length;
                badge.innerText = unseen > 99 ? "99+" : unseen;
                badge.style.display = unseen > 0 ? 'flex' : 'none';

                const container = document.getElementById('notif-content');
                if(container) {
                    container.innerHTML = snap.empty ? "<p style='padding:40px; color:#555; text-align:center'>Tudo calmo por aqui.</p>" : "";
                    snap.forEach(doc => {
                        const n = doc.data();
                        container.innerHTML += `
                            <div class="notif-item ${!n.seen ? 'notif-unseen' : ''}">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${n.from}" style="width:35px; border-radius:50%">
                                <div style="flex:1">
                                    <b style="color:var(--accent-pink)">@${n.from}</b> 
                                    <span style="color:#999">${n.text}</span>
                                </div>
                                <span class="post-time">${timeAgo(n.time)}</span>
                            </div>`;
                    });
                }
            });
        }

        async function markNotificationsAsSeen() {
            const snap = await db.collection("notificacoes")
            .where("to", "==", currentUser.user)
            .where("seen", "==", false)
            .get();

            const batch = db.batch();
            snap.forEach(doc => batch.update(doc.ref, { seen: true }));
            await batch.commit();
        }

        async function openPostDetails(postId) {
            currentPostId = postId;

            document.getElementById("modal-view-post").style.display = "flex";

            if(postDetailsUnsub) postDetailsUnsub();

            const postDoc = await db.collection("posts").doc(postId).get();
            if(!postDoc.exists) return;

            const post = postDoc.data();
            const isVideo = post.media && post.media.includes("data:video");

            const liked = (post.likes_list || []).includes(currentUser.user);

            document.getElementById("view-post-content").innerHTML = `
                <div style="display:flex; gap:12px; align-items:center; margin-bottom:15px">
                    <img src="${post.authorPic || 'https://via.placeholder.com/42'}" class="user-avatar">
                    <div>
                        <b style="font-size:14px">@${post.author}</b><br>
                        <span class="post-time">${timeAgo(post.time)}</span>
                    </div>

                <p style="font-size:15px; color:#eee; line-height:1.5">${post.content}</p>

                ${post.media ? `
                    <div class="post-media-wrapper" style="margin-top:15px">
                        ${isVideo ? `<video src="${post.media}" controls playsinline></video>` : `<img src="${post.media}">`}
                    </div>
                ` : ""}

                <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center">
                    <div onclick="toggleLike('${postId}', '${post.author}')" style="cursor:pointer; display:flex; align-items:center; gap:6px">
                        <i class="${liked ? 'fas' : 'far'} fa-heart" style="color:${liked ? '#ec4899' : '#666'}; font-size:18px"></i>
                        <span style="font-size:13px; color:#999; font-weight:600" id="post-like-count">${post.likes || 0}</span>
                    </div>
                </div>

                <h4 style="margin-top:18px; margin-bottom:10px; font-size:14px; color:#aaa">Comentários</h4>
                <div id="comments-list"></div>
            `;

            postDetailsUnsub = db.collection("posts")
                .doc(postId)
                .collection("comentarios")
                .orderBy("time", "asc")
                .onSnapshot(snap => {

                const list = document.getElementById("comments-list");

                list.innerHTML = snap.empty 
                    ? "<p style='color:#555; font-size:13px; text-align:center; margin-top:20px'>Nenhum comentário por aqui ainda.</p>"
                    : "";

                snap.forEach(c => {
                    const data = c.data();
                    list.innerHTML += `
                        <div class="comment-item">
                            <img src="${data.userPic || `https://api.dicebear.com/7.x/avataaars/svg?seed=${data.user}`}" style="width:25px; border-radius:50%">
                            <div>
                                <b>@${data.user}</b>
                                <p style="color:#ccc; margin-top:2px">${data.text}</p>
                                <small style="color:#444; font-size:9px">${timeAgo(data.time)}</small>
                            </div>
                        </div>
                    `;
                });
            });

        async function sendComment() {
            const input = document.getElementById('new-comment-input');
            if(!input.value.trim()) return;

            const text = input.value.trim();
            input.value = "";

            await db.collection("posts")
                .doc(currentPostId)
                .collection("comentarios")
                .add({
                    user: currentUser.user,
                    userPic: currentUser.pic,
                    text: text,
                    time: Date.now()
                });

            const post = await db.collection("posts").doc(currentPostId).get();
            if(post.exists) {
                sendNotification(post.data().author, `comentou: "${text.substring(0,15)}..."`);
            }
        }

        async function openPrivateChat(targetUser) {
            activeChatTarget = targetUser;
            document.getElementById('chat-target-name').innerText = "@" + targetUser;
            showScreen('chat');

            const chatId = [currentUser.user, targetUser].sort().join("_");

            if(chatUnsubscribe) chatUnsubscribe();

            chatUnsubscribe = db.collection("chats_privados")
                .doc(chatId)
                .collection("mensagens")
                .orderBy("time", "asc")
                .onSnapshot(snap => {

                const container = document.getElementById('chat-content');
                container.innerHTML = "";

                snap.forEach(doc => {
                    const m = doc.data();
                    const isMe = m.sender === currentUser.user;

                    container.innerHTML += `
                        <div class="bubble ${isMe ? 'bubble-me' : 'bubble-other'}">
                            ${m.text}
                            <span style="display:block; font-size:8px; opacity:0.5; margin-top:4px">
                                ${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                            </span>
                        </div>`;
                });

                container.scrollTop = container.scrollHeight;
            });

            document.getElementById('btn-send-msg').onclick = () => sendPrivateMsg(chatId, targetUser);
        }

        async function sendPrivateMsg(chatId, targetUser) {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            input.value = "";

            await db.collection("chats_privados")
                .doc(chatId)
                .collection("mensagens")
                .add({ 
                    sender: currentUser.user, 
                    text, 
                    time: Date.now() 
                });

            await db.collection("chats_privados").doc(chatId).set({
                lastMsg: text,
                lastTime: Date.now(),
                participants: [currentUser.user, targetUser]
            }, { merge: true });

            sendNotification(targetUser, "te enviou uma mensagem no chat");
        }

        function loadChatList() {
            db.collection("chats_privados")
            .where("participants", "array-contains", currentUser.user)
            .onSnapshot(snap => {

                const container = document.getElementById('chat-list-content');

                if(snap.empty) {
                    container.innerHTML = "<p style='padding:40px; color:#555; text-align:center'>Ninguém te chamou ainda.</p>";
                    return;
                }

                let chats = [];

                snap.forEach(doc => {
                    const data = doc.data();
                    chats.push({ id: doc.id, ...data });
                });

                chats.sort((a,b) => (b.lastTime || 0) - (a.lastTime || 0));

                container.innerHTML = "";

                chats.forEach(data => {
                    const other = (data.participants || []).find(p => p !== currentUser.user);

                    container.innerHTML += `
                        <div class="chat-list-item" onclick="openPrivateChat('${other}')">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${other}" style="width:50px; height:50px; border-radius:50%">
                            <div style="flex:1">
                                <strong>@${other}</strong><br>
                                <small style="color:#666">${(data.lastMsg || "Conversa iniciada...").substring(0,30)}...</small>
                            </div>
                            <span style="font-size:10px; color:#444">${timeAgo(data.lastTime)}</span>
                        </div>`;
                });
            });
        }

        async function toggleFollow(targetUser) {
            const myRef = db.collection("usuarios").doc(currentUser.user);
            const targetRef = db.collection("usuarios").doc(targetUser);

            const targetDoc = await targetRef.get();
            const followers = targetDoc.data().followers || [];

            if (followers.includes(currentUser.user)) {
                await myRef.update({ following: firebase.firestore.FieldValue.arrayRemove(targetUser) });
                await targetRef.update({ followers: firebase.firestore.FieldValue.arrayRemove(currentUser.user) });
            } else {
                await myRef.update({ following: firebase.firestore.FieldValue.arrayUnion(targetUser) });
                await targetRef.update({ followers: firebase.firestore.FieldValue.arrayUnion(currentUser.user) });
                sendNotification(targetUser, "começou a te seguir!");
            }

            openUserProfile(targetUser);
        }

        function openPostModal() { 
            document.getElementById('modal-post').style.display = 'flex'; 
        }

        function openEditModal() { 
            document.getElementById('edit-status-input').value = currentUser.status; 
            document.getElementById('edit-img-preview').src = currentUser.pic; 
            document.getElementById('edit-banner-preview').src = currentUser.banner || DEFAULT_BANNER; 
            document.getElementById('modal-edit').style.display = 'flex'; 
        }

        async function saveFullEdit() {
            const update = { 
                status: document.getElementById('edit-status-input').value, 
                pic: base64Avatar || currentUser.pic, 
                banner: base64Banner || currentUser.banner || DEFAULT_BANNER 
            };

            await db.collection("usuarios").doc(currentUser.user).update(update);

            currentUser = {...currentUser, ...update};

            localStorage.setItem('kchat_user', JSON.stringify(currentUser));

            loadProfile(); 

            document.getElementById('modal-edit').style.display = 'none';

            alert("Perfil sincronizado com sucesso!");
        }

        function searchContent(val) { 
            listenPosts(val.toLowerCase()); 
        }

        function logout() { 
            if(confirm("Deseja sair da sua conta?")) { 
                localStorage.clear(); 
                location.reload(); 
            } 
        }
    </script>
</body>
