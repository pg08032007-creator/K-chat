<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KChat | Final Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8a2be2; --secondary: #ff007f; --bg: #050508; --card: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Plus Jakarta Sans', sans-serif; }
        body, html { margin: 0; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* AUTH */
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100%; background: radial-gradient(circle, #1a152e, #050508); }
        .auth-card { background: var(--card); backdrop-filter: blur(25px); padding: 35px; border-radius: 35px; width: 90%; max-width: 380px; border: 1px solid var(--border); text-align: center; }
        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 15px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 12px; font-size: 0.85em; opacity: 0.4; }
        .tab.active { background: white; color: black; opacity: 1; font-weight: 800; }
        
        input { width: 100%; padding: 16px; margin: 8px 0; border-radius: 15px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 1em; }
        
        /* Step 2 specific */
        .upload-area { margin: 15px 0; border: 2px dashed var(--border); padding: 15px; border-radius: 20px; cursor: pointer; }
        #preview-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 2px solid var(--primary); }
        .gen-select { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .gen-btn { font-size: 1.2em; cursor: pointer; opacity: 0.3; padding: 12px; border-radius: 50%; border: 1px solid var(--border); }
        .gen-btn.selected { opacity: 1; color: var(--primary); border-color: var(--primary); background: rgba(138,43,226,0.1); }

        .btn-action { width: 100%; padding: 18px; border-radius: 18px; border: none; background: white; color: black; font-weight: 800; cursor: pointer; margin-top: 15px; font-size: 0.9em; }

        /* APP */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .search-container { flex: 1; position: relative; }
        .search-container input { padding: 10px 10px 10px 40px; border-radius: 12px; font-size: 0.8em; margin: 0; }
        .search-container i { position: absolute; left: 15px; top: 12px; opacity: 0.5; }
        .content { flex: 1; overflow-y: auto; padding: 20px 20px 120px; }
        .post { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); border-radius: 28px; display: flex; justify-content: space-around; align-items: center; padding: 10px; border: 1px solid var(--border); z-index: 999; }
        nav i { font-size: 1.4em; color: rgba(255,255,255,0.3); cursor: pointer; padding: 10px; }
        nav i.active { color: white; }
        .add-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); width: 55px; height: 55px; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 10px 20px rgba(138,43,226,0.3); }

        #profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; padding: 40px 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="letter-spacing: -2px; margin-bottom: 25px;">KChat</h1>
            <div class="tabs">
                <div class="tab active" id="tab-l" onclick="changeMode('login')">Entrar</div>
                <div class="tab" id="tab-r" onclick="changeMode('reg')">Registar</div>
            </div>

            <div id="form-step-1">
                <input type="text" id="in-user" placeholder="Nome de utilizador">
                <input type="password" id="in-pass" placeholder="Palavra-passe">
            </div>

            <div id="form-step-2" style="display: none;">
                <p style="font-size: 0.8em; color: var(--primary); margin-bottom: 10px;">Nome livre! Agora o seu perfil:</p>
                <input type="number" id="in-age" placeholder="A sua idade">
                <div class="gen-select">
                    <i class="fas fa-mars gen-btn" onclick="setGen(this, 'M')"></i>
                    <i class="fas fa-venus gen-btn" onclick="setGen(this, 'F')"></i>
                    <i class="fas fa-genderless gen-btn" onclick="setGen(this, 'NB')"></i>
                </div>
                <div class="upload-area" onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-cloud-upload-alt"></i> <small>Foto de perfil</small>
                    <input type="file" id="file-input" hidden accept="image/*" onchange="handleFile()">
                    <img id="preview-img">
                </div>
            </div>

            <button class="btn-action" id="main-btn" onclick="execAction()">ENTRAR</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div style="font-weight: 900; color: var(--primary); font-size: 1.3em;">K.</div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="search-q" placeholder="Procurar utilizadores..." oninput="doSearch()">
            </div>
        </header>

        <div id="search-overlay" class="content" style="display:none; position:fixed; background:var(--bg); z-index:100; width:100%;"></div>

        <div id="view-home" class="content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0;">Feed Global</h3>
                <i class="fas fa-redo-alt" onclick="drawPosts()" style="cursor:pointer; color:var(--primary);"></i>
            </div>
            <div id="feed-container"></div>
        </div>

        <div id="view-profile" class="content" style="display:none; text-align:center;">
            <div style="position: relative; display: inline-block; margin-top: 30px;">
                <img id="my-pic" src="" style="width:110px; height:110px; border-radius:40px; border:3px solid var(--primary); object-fit: cover;">
                <div onclick="editBio()" style="position: absolute; bottom: 0; right: 0; background: #fff; color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;"><i class="fas fa-pen" style="font-size: 0.7em;"></i></div>
            </div>
            <h2 id="my-nick" style="margin: 15px 0 5px;"></h2>
            <p id="my-info" style="opacity:0.6; padding: 0 30px;"></p>
            <button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid var(--border); color:red; padding:10px 20px; border-radius:12px; cursor:pointer;">Sair da Conta</button>
        </div>

        <nav>
            <i class="fas fa-home active" onclick="navTo('view-home', this)"></i>
            <div class="add-btn" onclick="createPost()"><i class="fas fa-plus"></i></div>
            <i class="fas fa-user-circle" onclick="navTo('view-profile', this)"></i>
        </nav>
    </div>

    <div id="profile-modal">
        <div style="text-align:left;"><i class="fas fa-chevron-left" onclick="this.parentElement.parentElement.style.display='none'" style="font-size:1.5em; cursor:pointer;"></i></div>
        <div id="modal-body"></div>
    </div>

    <script>
        let appMode = 'login';
        let selGen = '';
        let selPhoto = '';
        let userLogado = null;
        let registroPendente = null;

        // Dados
        let dbUsers = JSON.parse(localStorage.getItem('k_users')) || [];
        let dbPosts = JSON.parse(localStorage.getItem('k_posts')) || [{u: 'Admin', t: 'Bem-vindo ao novo KChat!'}];

        function changeMode(m) {
            appMode = m;
            registroPendente = null;
            document.getElementById('form-step-1').style.display = 'block';
            document.getElementById('form-step-2').style.display = 'none';
            document.getElementById('tab-l').classList.toggle('active', m === 'login');
            document.getElementById('tab-r').classList.toggle('active', m === 'reg');
            document.getElementById('main-btn').innerText = m === 'reg' ? 'VERIFICAR NOME' : 'ENTRAR';
        }

        function handleFile() {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                selPhoto = e.target.result;
                const img = document.getElementById('preview-img');
                img.src = selPhoto;
                img.style.display = 'block';
            };
            if(file) reader.readAsDataURL(file);
        }

        function setGen(el, g) {
            selGen = g;
            document.querySelectorAll('.gen-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function execAction() {
            const u = document.getElementById('in-user').value.trim();
            const p = document.getElementById('in-pass').value.trim();

            if(!u || !p) return alert("Preencha os campos de utilizador e senha!");

            if(appMode === 'reg') {
                if(!registroPendente) {
                    // Etapa 1 Registro
                    if(dbUsers.some(x => x.user.toLowerCase() === u.toLowerCase())) {
                        return alert("Este nome já está em uso!");
                    }
                    registroPendente = { user: u, pass: p };
                    document.getElementById('form-step-1').style.display = 'none';
                    document.getElementById('form-step-2').style.display = 'block';
                    document.getElementById('main-btn').innerText = "FINALIZAR REGISTO";
                } else {
                    // Etapa 2 Registro
                    const age = document.getElementById('in-age').value;
                    if(!age || !selGen) return alert("Preencha a idade e escolha o género!");

                    const novo = {
                        user: registroPendente.user,
                        pass: registroPendente.pass,
                        age: age,
                        img: selPhoto || `https://api.dicebear.com/7.x/avataaars/svg?seed=${registroPendente.user}`,
                        bio: 'Olá, estou no KChat!',
                        followers: 0
                    };
                    dbUsers.push(novo);
                    localStorage.setItem('k_users', JSON.stringify(dbUsers));
                    alert("Conta criada! Pode entrar agora.");
                    changeMode('login');
                }
            } else {
                // LOGIN
                const userEncontrado = dbUsers.find(x => x.user.toLowerCase() === u.toLowerCase());
                
                if(!userEncontrado) {
                    return alert("Utilizador não existe. Por favor, registe-se primeiro!");
                }
                
                if(userEncontrado.pass !== p) {
                    return alert("Palavra-passe incorreta!");
                }

                userLogado = userEncontrado;
                showApp();
            }
        }

        function showApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('my-nick').innerText = userLogado.user;
            document.getElementById('my-info').innerText = userLogado.bio;
            document.getElementById('my-pic').src = userLogado.img;
            drawPosts();
        }

        function navTo(id, el) {
            document.querySelectorAll('.content').forEach(v => v.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('nav i').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('search-overlay').style.display = 'none';
        }

        function createPost() {
            const t = prompt("O que queres partilhar?");
            if(t && t.trim() !== "") {
                dbPosts.push({ u: userLogado.user, t: t });
                localStorage.setItem('k_posts', JSON.stringify(dbPosts));
                drawPosts();
            }
        }

        function drawPosts() {
            const container = document.getElementById('feed-container');
            container.innerHTML = dbPosts.slice().reverse().map(p => {
                const autor = dbUsers.find(u => u.user === p.u);
                return `
                    <div class="post">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px; cursor:pointer;" onclick="viewUser('${p.u}')">
                            <img src="${autor ? autor.img : 'https://api.dicebear.com/7.x/avataaars/svg?seed='+p.u}" style="width:35px; height:35px; border-radius:12px; object-fit:cover;">
                            <b style="font-size:0.9em;">@${p.u}</b>
                        </div>
                        <p style="margin:0; line-height:1.5; opacity:0.9;">${p.t}</p>
                    </div>
                `;
            }).join('');
        }

        function doSearch() {
            const q = document.getElementById('search-q').value.toLowerCase();
            const overlay = document.getElementById('search-overlay');
            if(q.length > 0) {
                overlay.style.display = 'block';
                const filtrados = dbUsers.filter(u => u.user.toLowerCase().includes(q));
                overlay.innerHTML = filtrados.map(u => `
                    <div onclick="viewUser('${u.user}')" style="display:flex; align-items:center; gap:15px; padding:15px; border-bottom:1px solid var(--border);">
                        <img src="${u.img}" style="width:45px; height:45px; border-radius:15px; object-fit:cover;">
                        <div><b>${u.user}</b><br><small style="opacity:0.5">${u.followers} seguidores</small></div>
                    </div>
                `).join('');
            } else overlay.style.display = 'none';
        }

        function viewUser(name) {
            const u = dbUsers.find(x => x.user === name);
            if(!u) return;
            const modal = document.getElementById('profile-modal');
            document.getElementById('modal-body').innerHTML = `
                <img src="${u.img}" style="width:110px; height:110px; border-radius:40px; border:3px solid var(--primary); margin-top:20px; object-fit:cover;">
                <h1 style="margin:15px 0 5px;">${u.user}</h1>
                <p style="opacity:0.6; padding:0 30px;">${u.bio}</p>
                <div style="display:flex; justify-content:center; gap:40px; margin:30px 0;">
                    <div><b>${u.followers}</b><br><small>Seguidores</small></div>
                    <div><b>${Math.floor(u.followers/1.5)}</b><br><small>A seguir</small></div>
                </div>
                <button onclick="this.innerText='Seguindo'; this.style.opacity='0.5';" style="width:80%; padding:18px; border-radius:20px; border:none; background:white; color:black; font-weight:800;">SEGUIR</button>
            `;
            modal.style.display = 'block';
        }

        function editBio() {
            const n = prompt("Nova bio:", userLogado.bio);
            if(n !== null) {
                userLogado.bio = n;
                document.getElementById('my-info').innerText = n;
                const idx = dbUsers.findIndex(x => x.user === userLogado.user);
                dbUsers[idx] = userLogado;
                localStorage.setItem('k_users', JSON.stringify(dbUsers));
            }
        }
    </script>
</body>
</html>
