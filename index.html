<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Cloud Premium</title>
    <!-- Firebase SDK 10.8.0 Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-dark: #0a0a0c; 
            --bg-card: #141417; 
            --accent-purple: #a855f7; 
            --accent-pink: #ec4899; 
            --text-main: #ffffff; 
            --text-dim: #a1a1aa;
            --input-inner: inset 2px 2px 5px rgba(0,0,0,0.3);
            --grad: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
        }

        /* Temas Personalizados */
        body.theme-midnight { --bg-dark: #020617; --bg-card: #0f172a; --accent-purple: #3b82f6; --accent-pink: #2dd4bf; }
        body.theme-oled { --bg-dark: #000000; --bg-card: #090909; --accent-purple: #ffffff; --accent-pink: #555555; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); transition: 0.3s; overflow-x: hidden; }
        
        .screen { display: none; min-height: 100vh; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Status Online */
        .avatar-wrapper { position: relative; display: inline-block; }
        .online-dot { 
            position: absolute; bottom: 5px; right: 5px; width: 12px; height: 12px; 
            background: #22c55e; border: 2px solid var(--bg-card); border-radius: 50%; 
            display: none; box-shadow: 0 0 10px #22c55e;
        }
        .is-online .online-dot { display: block; }

        /* UI de Auth e Inputs */
        .auth-container { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .logo-k { font-size: 48px; font-weight: 900; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
        
        .custom-input-group { width: 100%; background: var(--bg-card); border-radius: 18px; padding: 18px; border: 1px solid #1f1f23; display: flex; align-items: center; box-shadow: var(--input-inner); }
        .custom-input-group input { background: transparent; border: none; width: 100%; color: white; outline: none; margin-left: 10px; font-size: 16px; }
        
        .btn-premium { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; 
            background: var(--grad); color: white; font-weight: 800; 
            cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-premium:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Feed e Posts */
        .app-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: var(--bg-dark); z-index: 100; border-bottom: 1px solid #1a1a1e; }
        .search-bar { flex: 1; background: #1a1a1e; border-radius: 12px; display: flex; align-items: center; padding: 8px 15px; border: 1px solid #27272a; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        .post-card { background: var(--bg-card); border-radius: 24px; padding: 18px; margin: 15px; border: 1px solid #1f1f23; position: relative; }
        .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .post-time { font-size: 11px; color: var(--text-dim); }
        
        /* Reações */
        .reaction-bar { 
            display: none; position: absolute; background: #1f1f23; padding: 8px 12px; 
            border-radius: 30px; bottom: 45px; left: 15px; gap: 10px; border: 1px solid #333; z-index: 10;
        }
        .reaction-bar span { cursor: pointer; font-size: 20px; transition: 0.2s; }
        .reaction-bar span:hover { transform: scale(1.3); }

        /* Navigation */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; background: rgba(15, 15, 18, 0.95); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 15px; backdrop-filter: blur(20px); border: 1px solid #222; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        nav i { color: #555; font-size: 22px; transition: 0.3s; }
        nav i.active { color: var(--accent-pink); }
        .plus-fab { background: var(--grad); width: 60px; height: 60px; border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white !important; margin-top: -45px; box-shadow: 0 8px 15px rgba(236, 72, 153, 0.3); }

        /* Modais */
        .modal-embed { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-body { background: var(--bg-card); padding: 25px; border-radius: 28px; width: 100%; max-width: 400px; border: 1px solid #333; }

        /* Chat DM */
        .chat-list-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #1a1a1e; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 75%; margin-bottom: 5px; font-size: 14px; line-height: 1.4; }
        .bubble-me { align-self: flex-end; background: var(--grad); border-bottom-right-radius: 4px; }
        .bubble-other { align-self: flex-start; background: #27272a; border-bottom-left-radius: 4px; }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #1a1a1e; border-radius: 12px; overflow: hidden; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        .loading-spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="theme-default">

    <!-- MODAL EDITAR PERFIL -->
    <div id="modal-edit" class="modal-embed" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-body">
            <h3>Personalizar</h3><br>
            <div style="text-align:center">
                <img id="edit-img-preview" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--accent-pink)">
                <br>
                <button onclick="document.getElementById('edit-file-input').click()" style="background:none; border:none; color:var(--accent-pink); font-size:12px; margin:15px 0;">Alterar Foto de Perfil</button>
                <input type="file" id="edit-file-input" hidden onchange="processImage(this, 'edit')">
            </div>
            <div class="custom-input-group"><input type="text" id="edit-status-input" placeholder="Sua bio..."></div>
            <br>
            <p style="font-size: 12px; margin-bottom: 10px; color: var(--text-dim);">Tema do App</p>
            <select id="theme-select" class="custom-input-group" style="width:100%; color: white; background: var(--bg-card); border: 1px solid #333;" onchange="changeTheme(this.value)">
                <option value="default">Padrão (Premium)</option>
                <option value="midnight">Midnight Blue</option>
                <option value="oled">OLED Black</option>
            </select>
            <br><br>
            <button class="btn-premium" id="btn-save-profile" onclick="saveFullEdit()">Salvar Tudo</button>
        </div>
    </div>

    <!-- MODAL NOVO POST -->
    <div id="modal-post" class="modal-embed" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-body">
            <h3>Nova Publicação</h3><br>
            <div class="custom-input-group">
                <textarea id="post-text-input" placeholder="O que você quer compartilhar?" style="background:transparent; border:none; color:white; width:100%; outline:none; min-height:80px; resize:none"></textarea>
            </div><br>
            <div id="post-media-preview" style="border-radius:15px; overflow:hidden; margin-bottom:10px;"></div>
            <button onclick="document.getElementById('post-file-input').click()" class="btn-premium" style="background:#222; margin-bottom:10px;"><i class="fas fa-camera"></i> Mídia</button>
            <input type="file" id="post-file-input" hidden accept="image/*,video/*" onchange="previewMedia(this)">
            <button class="btn-premium" id="btn-publish" onclick="submitPost()">Publicar Agora</button>
        </div>
    </div>

    <!-- TELAS DE AUTH -->
    <div id="screen-login" class="screen active">
        <div class="auth-container">
            <div class="logo-k">K.</div>
            <h2 style="margin-top:-20px">Cloud Premium</h2>
            <div class="custom-input-group"><i class="fas fa-user"></i><input type="text" id="login-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><i class="fas fa-lock"></i><input type="password" id="login-pass" placeholder="Senha"></div>
            <button class="btn-premium" id="btn-login" onclick="handleLogin()">Entrar</button>
            <p onclick="showScreen('register')" style="color:var(--text-dim)">Não é membro? <span style="color:var(--accent-pink)">Participe agora</span></p>
        </div>
    </div>

    <div id="screen-register" class="screen">
        <div class="auth-container">
            <div class="logo-k">K.</div>
            <h3>Crie sua conta</h3>
            <div class="custom-input-group"><input type="text" id="reg-user" placeholder="Nome de usuário" onblur="checkUserExists(this.value)"></div>
            <div id="reg-warn" style="color:var(--accent-pink); font-size:12px; display:none">Username já em uso!</div>
            <div class="custom-input-group"><input type="password" id="reg-pass" placeholder="Sua senha"></div>
            <button class="btn-premium" onclick="showScreen('onboarding')">Próximo</button>
        </div>
    </div>

    <div id="screen-onboarding" class="screen">
        <div class="auth-container">
            <h2>Quase lá...</h2>
            <div class="avatar-wrapper">
                <img id="img-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" style="width:120px; height:120px; border-radius:50%; border:4px solid var(--accent-purple); object-fit:cover;">
            </div>
            <div style="display:flex; gap:10px; overflow-x:auto; width:100%; padding:10px" id="avatar-opts"></div>
            <div class="custom-input-group"><input type="text" id="onb-status" placeholder="Sua bio (ex: Designer & Gamer)"></div>
            <div style="display:flex; gap:10px; width:100%">
                <button class="btn-premium" onclick="handleRegister()" style="flex:2">Começar</button>
            </div>
        </div>
    </div>

    <!-- TELA FEED -->
    <div id="screen-feed" class="screen">
        <header class="app-header">
            <div class="logo-k" style="font-size:28px">K.</div>
            <div class="search-bar">
                <i class="fas fa-search" style="color:#444"></i>
                <input type="text" placeholder="Buscar posts ou pessoas..." oninput="searchContent(this.value)">
            </div>
            <i class="fas fa-paper-plane" onclick="showScreen('messages')" style="color:var(--accent-purple); font-size:22px"></i>
        </header>
        <div id="feed-content"></div>
    </div>

    <!-- TELA LISTA DE MENSAGENS (DMs) -->
    <div id="screen-messages" class="screen">
        <header class="app-header">
            <i class="fas fa-chevron-left" onclick="showScreen('feed')"></i>
            <h3 style="flex:1; text-align:center">Conversas</h3>
        </header>
        <div id="dm-list-content"></div>
    </div>

    <!-- TELA CHAT PRIVADO -->
    <div id="screen-chat-private" class="screen">
        <header class="app-header">
            <i class="fas fa-chevron-left" onclick="showScreen('messages')"></i>
            <div id="chat-header-user" style="display:flex; align-items:center; gap:10px; flex:1; margin-left:15px"></div>
        </header>
        <div id="private-chat-content" style="height: 72vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column;"></div>
        <div style="position: fixed; bottom: 90px; width: 100%; padding: 15px; display: flex; gap: 10px; background: var(--bg-dark); border-top: 1px solid #1a1a1e;">
            <input type="text" id="dm-input" placeholder="Mensagem privada..." style="flex:1; background: #1a1a1e; border: 1px solid #333; border-radius: 20px; padding: 12px; color: white; outline: none;">
            <button onclick="sendPrivateMessage()" style="background: var(--grad); border: none; width: 45px; height: 45px; border-radius: 50%; color: white;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- TELA PERFIL -->
    <div id="screen-profile" class="screen">
        <div class="auth-container" style="padding-top: 60px">
            <div style="position:absolute; top:20px; right:20px">
                <i class="fas fa-cog" onclick="openEditModal()" style="font-size:22px; color:#555"></i>
            </div>
            <div class="avatar-wrapper is-online">
                <img id="my-pic" src="" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent-pink); object-fit:cover;">
                <div class="online-dot"></div>
            </div>
            <h2 id="my-name">@user</h2>
            <p id="my-status" style="color:var(--text-dim); max-width:80%"></p>
            <div style="display:flex; gap:20px; margin:15px 0">
                <div style="text-align:center"><b id="my-post-count">0</b><br><small style="color:#555">Posts</small></div>
                <div style="text-align:center"><b>Premium</b><br><small style="color:#555">Plano</small></div>
            </div>
            <button class="btn-premium" onclick="logout()" style="background:#1a1a1e; width:auto; padding:10px 30px">Desconectar</button>
        </div>
        <div id="my-posts-grid" class="profile-grid"></div>
    </div>

    <!-- TELA VER PERFIL ALHEIO -->
    <div id="screen-view-profile" class="screen">
        <header class="app-header">
            <i class="fas fa-chevron-left" onclick="showScreen('feed')"></i>
        </header>
        <div class="auth-container" id="view-profile-header"></div>
        <div id="view-posts-grid" class="profile-grid"></div>
    </div>

    <nav id="main-nav" style="display:none">
        <i class="fas fa-home" onclick="showScreen('feed')" id="nav-feed"></i>
        <div class="plus-fab" onclick="openPostModal()"><i class="fas fa-plus"></i></div>
        <i class="fas fa-user" onclick="showScreen('profile')" id="nav-profile"></i>
    </nav>

    <script>
        // --- CONFIGURAÇÃO E INICIALIZAÇÃO ---
        const firebaseConfig = {
            apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
            authDomain: "kchat-web-8415c.firebaseapp.com",
            projectId: "kchat-web-8415c",
            storageBucket: "kchat-web-8415c.firebasestorage.app",
            messagingSenderId: "878265144053",
            appId: "1:878265144053:web:407389cd133d955f76abbc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        let base64Avatar = "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix";
        let base64PostMedia = "";
        let currentChatId = null;

        window.onload = () => {
            const saved = localStorage.getItem('kchat_user');
            const theme = localStorage.getItem('kchat_theme') || 'default';
            changeTheme(theme);
            if(saved) {
                currentUser = JSON.parse(saved);
                enterApp();
            }
            setupAvatarOptions();
        };

        // --- SISTEMA DE PRESENÇA (ONLINE STATUS) ---
        function updateOnlineStatus() {
            if(!currentUser) return;
            db.collection("usuarios").doc(currentUser.user).update({
                lastOnline: Date.now()
            });
        }

        function getOnlineHTML(lastOnline) {
            const isOnline = lastOnline && (Date.now() - lastOnline < 60000);
            return `<div class="avatar-wrapper ${isOnline ? 'is-online' : ''}">
                <div class="online-dot"></div>
            </div>`;
        }

        // --- NAVEGAÇÃO E TEMAS ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.querySelectorAll('nav i').forEach(i => i.classList.remove('active'));
            const navIcon = document.getElementById('nav-' + id);
            if(navIcon) navIcon.classList.add('active');

            if(id === 'profile') loadProfile();
            if(id === 'messages') loadDMList();
        }

        function changeTheme(theme) {
            document.body.className = 'theme-' + theme;
            localStorage.setItem('kchat_theme', theme);
            const sel = document.getElementById('theme-select');
            if(sel) sel.value = theme;
        }

        // --- AUTENTICAÇÃO ---
        async function handleLogin() {
            const btn = document.getElementById('btn-login');
            toggleLoading(btn, true);
            const user = document.getElementById('login-user').value.toLowerCase().trim();
            const pass = document.getElementById('login-pass').value;
            
            try {
                const doc = await db.collection("usuarios").doc(user).get();
                if (doc.exists && doc.data().pass === pass) {
                    currentUser = doc.data();
                    enterApp();
                } else { alert("Credenciais inválidas."); }
            } catch(e) { console.error(e); }
            toggleLoading(btn, false);
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            const pass = document.getElementById('reg-pass').value;
            const status = document.getElementById('onb-status').value || "Membro Premium do k.chat";
            
            const userData = { 
                user, pass, status, pic: base64Avatar, 
                joined: Date.now(), lastOnline: Date.now(), theme: 'default' 
            };
            
            await db.collection("usuarios").doc(user).set(userData);
            currentUser = userData;
            enterApp();
        }

        function enterApp() {
            localStorage.setItem('kchat_user', JSON.stringify(currentUser));
            document.getElementById('main-nav').style.display = 'flex';
            showScreen('feed');
            listenPosts();
            setInterval(updateOnlineStatus, 20000);
            updateOnlineStatus();
        }

        // --- FUNCIONALIDADES DE POSTS ---
        async function submitPost() {
            const text = document.getElementById('post-text-input').value;
            if(!text && !base64PostMedia) return;
            
            const btn = document.getElementById('btn-publish');
            toggleLoading(btn, true);

            await db.collection("posts").add({
                author: currentUser.user,
                authorPic: currentUser.pic,
                content: text,
                media: base64PostMedia,
                time: Date.now(),
                reactions: { love: 0, fire: 0, funny: 0 },
                likes_list: []
            });

            document.getElementById('modal-post').style.display = 'none';
            document.getElementById('post-text-input').value = "";
            document.getElementById('post-media-preview').innerHTML = "";
            base64PostMedia = "";
            toggleLoading(btn, false);
        }

        function listenPosts(filter = "") {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('feed-content');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const pId = doc.id;
                    
                    // Busca inteligente (texto ou autor)
                    if(filter && !post.content.toLowerCase().includes(filter) && !post.author.toLowerCase().includes(filter)) return;

                    const timeAgo = formatTime(post.time);
                    const isOwner = post.author === currentUser.user;

                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <div style="display:flex; align-items:center; gap:10px" onclick="openUserProfile('${post.author}')">
                                    <img src="${post.authorPic}" class="user-avatar" style="width:40px; height:40px; border-radius:50%">
                                    <div>
                                        <div style="font-weight:600; font-size:14px">@${post.author}</div>
                                        <div class="post-time">${timeAgo}</div>
                                    </div>
                                </div>
                                ${isOwner ? `<i class="fas fa-trash" style="color:#333; font-size:14px" onclick="deletePost('${pId}')"></i>` : ''}
                            </div>
                            <p style="font-size:15px; line-height:1.5">${post.content}</p>
                            ${post.media ? renderMedia(post.media) : ''}
                            
                            <div style="margin-top:15px; display:flex; gap:15px; position:relative">
                                <div onclick="toggleReactionMenu('${pId}')" style="background:#1a1a1e; padding:5px 12px; border-radius:15px; cursor:pointer">
                                    ❤️ <span id="react-count-${pId}">${(post.reactions?.love || 0) + (post.reactions?.fire || 0) + (post.reactions?.funny || 0)}</span>
                                </div>
                                <div class="reaction-bar" id="bar-${pId}">
                                    <span onclick="addReaction('${pId}', 'love')">❤️</span>
                                    <span onclick="addReaction('${pId}', 'fire')">🔥</span>
                                    <span onclick="addReaction('${pId}', 'funny')">😂</span>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        // --- SISTEMA DE DM (MENSAGENS PRIVADAS) ---
        async function openPrivateChat(otherUser) {
            const chatId = [currentUser.user, otherUser].sort().join("_");
            currentChatId = chatId;
            showScreen('chat-private');
            
            // Header do Chat
            const otherDoc = await db.collection("usuarios").doc(otherUser).get();
            const otherData = otherDoc.data();
            document.getElementById('chat-header-user').innerHTML = `
                <img src="${otherData.pic}" style="width:35px; height:35px; border-radius:50%">
                <strong>@${otherData.user}</strong>
            `;

            db.collection("chats").doc(chatId).collection("messages").orderBy("time", "asc")
                .onSnapshot(snap => {
                    const cont = document.getElementById('private-chat-content');
                    cont.innerHTML = "";
                    snap.forEach(doc => {
                        const m = doc.data();
                        const isMe = m.sender === currentUser.user;
                        cont.innerHTML += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-other'}">${m.text}</div>`;
                    });
                    cont.scrollTop = cont.scrollHeight;
                });
        }

        async function sendPrivateMessage() {
            const text = document.getElementById('dm-input').value;
            if(!text.trim() || !currentChatId) return;
            
            const msg = { sender: currentUser.user, text, time: Date.now() };
            await db.collection("chats").doc(currentChatId).collection("messages").add(msg);
            
            // Atualiza "last message" para a lista de DMs
            await db.collection("chats").doc(currentChatId).set({
                users: currentChatId.split("_"),
                lastMsg: text,
                lastTime: Date.now()
            });
            
            document.getElementById('dm-input').value = "";
        }

        function loadDMList() {
            db.collection("chats").where("users", "array-contains", currentUser.user).orderBy("lastTime", "desc")
                .onSnapshot(snap => {
                    const cont = document.getElementById('dm-list-content');
                    cont.innerHTML = "";
                    snap.forEach(doc => {
                        const data = doc.data();
                        const other = data.users.find(u => u !== currentUser.user);
                        cont.innerHTML += `
                            <div class="chat-list-item" onclick="openPrivateChat('${other}')">
                                <div style="font-weight:600">@${other}</div>
                                <div style="font-size:12px; color:#555; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${data.lastMsg}</div>
                            </div>`;
                    });
                });
        }

        // --- UTILITÁRIOS ---
        function toggleLoading(btn, loading) {
            if(loading) {
                btn.disabled = true;
                btn.innerHTML = '<div class="loading-spinner"></div>';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.id === 'btn-publish' ? 'Publicar Agora' : 'Entrar';
            }
        }

        function formatTime(ts) {
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 60) return "agora";
            if (diff < 3600) return `há ${Math.floor(diff/60)}min`;
            if (diff < 86400) return `há ${Math.floor(diff/3600)}h`;
            return new Date(ts).toLocaleDateString();
        }

        function renderMedia(base64) {
            return base64.includes('video') 
                ? `<video src="${base64}" style="width:100%; border-radius:15px; margin-top:10px" autoplay muted loop></video>`
                : `<img src="${base64}" style="width:100%; border-radius:15px; margin-top:10px">`;
        }

        async function deletePost(id) {
            if(confirm("Excluir esta publicação permanentemente?")) {
                await db.collection("posts").doc(id).delete();
            }
        }

        function toggleReactionMenu(id) {
            const bar = document.getElementById('bar-' + id);
            bar.style.display = bar.style.display === 'flex' ? 'none' : 'flex';
        }

        async function addReaction(postId, type) {
            const ref = db.collection("posts").doc(postId);
            const field = `reactions.${type}`;
            await ref.update({ [field]: firebase.firestore.FieldValue.increment(1) });
            document.getElementById('bar-' + postId).style.display = 'none';
        }

        function previewMedia(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    base64PostMedia = e.target.result;
                    document.getElementById('post-media-preview').innerHTML = renderMedia(base64PostMedia);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function openUserProfile(username) {
            if(username === currentUser.user) return showScreen('profile');
            const doc = await db.collection("usuarios").doc(username).get();
            const data = doc.data();
            showScreen('view-profile');
            document.getElementById('view-profile-header').innerHTML = `
                ${getOnlineHTML(data.lastOnline)}
                <img src="${data.pic}" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent-pink); margin-top:10px">
                <h2>@${data.user}</h2>
                <p style="color:#777; margin:10px 0">${data.status}</p>
                <button class="btn-premium" onclick="openPrivateChat('${username}')" style="width:auto; padding:10px 25px">Enviar Mensagem</button>
            `;
            const postSnap = await db.collection("posts").where("author", "==", username).get();
            const grid = document.getElementById('view-posts-grid');
            grid.innerHTML = "";
            postSnap.forEach(p => {
                const d = p.data();
                grid.innerHTML += `<div class="grid-item">${d.media ? (d.media.includes('video') ? `<video src="${d.media}"></video>` : `<img src="${d.media}">`) : '<div style="font-size:10px; padding:10px; color:#444">'+d.content+'</div>'}</div>`;
            });
        }

        async function loadProfile() {
            document.getElementById('my-pic').src = currentUser.pic;
            document.getElementById('my-name').innerText = "@" + currentUser.user;
            document.getElementById('my-status').innerText = currentUser.status;
            const snap = await db.collection("posts").where("author", "==", currentUser.user).get();
            document.getElementById('my-post-count').innerText = snap.size;
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                grid.innerHTML += `<div class="grid-item">${d.media ? (d.media.includes('video') ? `<video src="${d.media}"></video>` : `<img src="${d.media}">`) : '<div style="font-size:10px; padding:10px; color:#444">'+d.content+'</div>'}</div>`;
            });
        }

        function openEditModal() {
            document.getElementById('edit-status-input').value = currentUser.status;
            document.getElementById('edit-img-preview').src = currentUser.pic;
            document.getElementById('modal-edit').style.display = 'flex';
        }

        async function saveFullEdit() {
            const btn = document.getElementById('btn-save-profile');
            toggleLoading(btn, true);
            const newStatus = document.getElementById('edit-status-input').value;
            const update = { status: newStatus, pic: base64Avatar || currentUser.pic };
            await db.collection("usuarios").doc(currentUser.user).update(update);
            currentUser = {...currentUser, ...update};
            localStorage.setItem('kchat_user', JSON.stringify(currentUser));
            loadProfile();
            document.getElementById('modal-edit').style.display = 'none';
            toggleLoading(btn, false);
        }

        function setupAvatarOptions() {
            const seeds = ['Felix', 'Aneka', 'Jack', 'Mimi', 'Loki', 'Coco'];
            const cont = document.getElementById('avatar-opts');
            seeds.forEach(s => {
                const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${s}`;
                cont.innerHTML += `<img src="${url}" style="width:50px; cursor:pointer; border-radius:50%" onclick="selectAvatar('${url}')">`;
            });
        }

        function selectAvatar(url) {
            base64Avatar = url;
            document.getElementById('img-preview').src = url;
        }

        function processImage(input, mode) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    base64Avatar = e.target.result;
                    document.getElementById(mode === 'reg' ? 'img-preview' : 'edit-img-preview').src = base64Avatar;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function searchContent(val) { listenPosts(val.toLowerCase()); }
        async function checkUserExists(u) {
            const doc = await db.collection("usuarios").doc(u.toLowerCase()).get();
            document.getElementById('reg-warn').style.display = doc.exists ? 'block' : 'none';
        }
        function logout() { localStorage.clear(); location.reload(); }
        function openPostModal() { document.getElementById('modal-post').style.display = 'flex'; }
    </script>
</body>
</html>
