<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Cloud Premium</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg-dark: #0a0a0c; --bg-card: #141417; --accent-purple: #a855f7; --accent-pink: #ec4899; --text-main: #ffffff; --input-inner: inset 2px 2px 5px rgba(0,0,0,0.3); --text-dim: #a1a1aa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        
        .screen { display: none; min-height: 100vh; padding-bottom: 100px; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER */
        .app-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: var(--bg-dark); z-index: 100; border-bottom: 1px solid #1a1a1e; }
        .search-bar { flex: 1; background: #1a1a1e; border-radius: 12px; display: flex; align-items: center; padding: 8px 15px; border: 1px solid #27272a; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        /* POSTS */
        .post-card { background: var(--bg-card); border-radius: 20px; padding: 15px; margin: 15px; border: 1px solid #1f1f23; }
        .post-media-container { width: 100%; border-radius: 15px; overflow: hidden; margin: 10px 0; background: #000; cursor: pointer; }
        .post-media-container img, .post-media-container video { width: 100%; display: block; max-height: 400px; object-fit: cover; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg-card); position: absolute; bottom: 0; right: 0; }

        /* MODAL NOVO POST */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; }
        .modal-content { background: var(--bg-card); border-radius: 25px; padding: 20px; max-width: 500px; margin: 50px auto; border: 1px solid #333; }
        .preview-box { width: 100%; height: 200px; border: 2px dashed #333; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; overflow: hidden; }
        
        /* FLOATING ACTION BUTTONS */
        .refresh-fab { position: fixed; bottom: 100px; right: 20px; background: #1a1a1e; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #333; color: var(--accent-purple); z-index: 99; }

        /* NAV */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(15, 15, 18, 0.9); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 12px; backdrop-filter: blur(15px); border: 1px solid #222; z-index: 1000; }
        .plus-fab { background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); width: 60px; height: 60px; border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; margin-top: -40px; }

        /* AUTH (ORIGINAL) */
        .auth-container { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .custom-input-group { width: 100%; background: var(--bg-card); border-radius: 18px; padding: 18px; border: 1px solid #1f1f23; display: flex; align-items: center; box-shadow: var(--input-inner); }
        .custom-input-group input { background: transparent; border: none; width: 100%; color: white; outline: none; margin-left: 10px; }
        .btn-premium { width: 100%; padding: 20px; border-radius: 20px; border: none; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; font-weight: 800; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="auth-container">
            <div class="logo-k">K.</div>
            <div class="custom-input-group"><i class="fas fa-user"></i><input type="text" id="login-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><i class="fas fa-lock"></i><input type="password" id="login-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="handleLogin()">Entrar</button>
            <p onclick="showScreen('register')" style="color:#666">Cadastre-se</p>
        </div>
    </div>

    <div id="screen-register" class="screen">
        <div class="auth-container">
            <div class="logo-k">Cadastro</div>
            <div class="custom-input-group"><input type="text" id="reg-user" placeholder="@usuario"></div>
            <div class="custom-input-group"><input type="password" id="reg-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="showScreen('onboarding')">Continuar</button>
        </div>
    </div>

    <div id="screen-onboarding" class="screen">
        <div class="auth-container">
            <h2>Seu Perfil</h2>
            <div onclick="document.getElementById('file-input').click()" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent-purple); overflow:hidden;">
                <img id="img-preview" src="https://via.placeholder.com/110" style="width:100%; height:100%; object-fit:cover;">
                <input type="file" id="file-input" accept="image/*,video/*" onchange="previewMedia(this, 'img-preview')" style="display:none">
            </div>
            <div class="custom-input-group"><input type="date" id="onb-date"></div>
            <div class="custom-input-group"><input type="text" id="onb-status" placeholder="Sua Bio"></div>
            <button class="btn-premium" onclick="handleRegister()">Finalizar</button>
        </div>
    </div>

    <div id="screen-feed" class="screen">
        <header class="app-header">
            <div class="logo-k" style="font-size:24px">K.</div>
            <div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="Buscar..."></div>
            <i class="fas fa-comment-dots" onclick="showScreen('chat')" style="color:var(--accent-purple); font-size:22px"></i>
        </header>
        <div id="feed-content"></div>
        <div class="refresh-fab" onclick="listenPosts()"><i class="fas fa-sync-alt"></i></div>
    </div>

    <div id="screen-chat" class="screen">
        <div class="app-header"><i class="fas fa-arrow-left" onclick="showScreen('feed')"></i> <span>Bate-papo</span></div>
        <div style="padding:20px; color:#555">Em breve: Mensagens em tempo real.</div>
    </div>

    <div id="screen-profile" class="screen">
        <div style="padding:20px; display:flex; justify-content:flex-end;">
            <i class="fas fa-pencil-alt" onclick="editFullProfile()" style="background:#1a1a1e; padding:12px; border-radius:50%; border:1px solid #333"></i>
        </div>
        <div class="auth-container" style="padding-top:0">
            <img id="my-pic" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent-pink); object-fit:cover;">
            <h2 id="my-name">@user</h2>
            <p id="my-status" style="color:#777"></p>
        </div>
        <hr style="border:0; border-top:1px solid #1a1a1e; margin:10px 0;">
        <h3 style="padding-left:20px; font-size:14px; color:var(--accent-purple)">MEUS POSTS</h3>
        <div id="my-posts-content"></div>
    </div>

    <div id="modal-post" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:15px">Nova Publicação</h2>
            <div class="preview-box" onclick="document.getElementById('post-file').click()">
                <img id="post-preview-img" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="placeholder-text"><i class="fas fa-cloud-upload-alt"></i> Galeria</span>
            </div>
            <input type="file" id="post-file" accept="image/*,video/*" style="display:none" onchange="previewMedia(this, 'post-preview-img')">
            <div class="custom-input-group" style="margin-bottom:15px">
                <input type="text" id="post-desc" placeholder="Escreva uma legenda...">
            </div>
            <div style="display:flex; gap:10px">
                <button class="btn-premium" onclick="uploadPost()" style="flex:2">Publicar</button>
                <button class="btn-premium" onclick="closeModal()" style="flex:1; background:#222">Sair</button>
            </div>
        </div>
    </div>

    <nav id="main-nav" style="display:none">
        <div onclick="showScreen('feed')"><i class="fas fa-compass"></i></div>
        <div class="plus-fab" onclick="openModal()"><i class="fas fa-plus"></i></div>
        <div onclick="showScreen('profile')"><i class="fas fa-user-astronaut"></i></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
            authDomain: "kchat-web-8415c.firebaseapp.com",
            projectId: "kchat-web-8415c",
            storageBucket: "kchat-web-8415c.firebasestorage.app",
            messagingSenderId: "878265144053",
            appId: "1:878265144053:web:407389cd133d955f76abbc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = null;
        let tempMedia = "";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(id === 'profile') { loadProfile(); listenMyPosts(); }
            if(id === 'feed') listenPosts();
        }

        function previewMedia(input, targetId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    tempMedia = e.target.result;
                    const el = document.getElementById(targetId);
                    el.src = tempMedia;
                    el.style.display = "block";
                    if(document.getElementById('placeholder-text')) document.getElementById('placeholder-text').style.display="none";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // AUTH
        async function handleLogin() {
            const user = document.getElementById('login-user').value.toLowerCase().trim();
            const pass = document.getElementById('login-pass').value;
            const doc = await db.collection("usuarios").doc(user).get();
            if (doc.exists && doc.data().pass === pass) {
                currentUser = doc.data();
                enterApp();
            } else alert("Dados incorretos!");
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            const pass = document.getElementById('reg-pass').value;
            const date = document.getElementById('onb-date').value;
            const status = document.getElementById('onb-status').value || "Disponível";
            const check = await db.collection("usuarios").doc(user).get();
            if(check.exists) return alert("Usuário já existe!");
            const userData = { user, pass, date, status, pic: tempMedia || "", online: true };
            await db.collection("usuarios").doc(user).set(userData);
            currentUser = userData;
            enterApp();
        }

        function enterApp() {
            document.getElementById('main-nav').style.display = 'flex';
            showScreen('feed');
        }

        // POSTS
        function openModal() { document.getElementById('modal-post').style.display = 'block'; }
        function closeModal() { document.getElementById('modal-post').style.display = 'none'; tempMedia = ""; }

        async function uploadPost() {
            const desc = document.getElementById('post-desc').value;
            if(!desc && !tempMedia) return alert("Adicione conteúdo!");
            await db.collection("posts").add({
                author: currentUser.user, authorPic: currentUser.pic,
                content: desc, media: tempMedia, time: Date.now(),
                likes: 0, likes_list: [], comments: 0
            });
            closeModal();
            listenPosts();
        }

        function renderPosts(snapshot, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const post = doc.data();
                const liked = post.likes_list && post.likes_list.includes(currentUser.user);
                container.innerHTML += `
                    <div class="post-card">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
                            <img src="${post.authorPic || 'https://via.placeholder.com/40'}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                            <strong>@${post.author}</strong>
                        </div>
                        <p>${post.content}</p>
                        ${post.media ? `<div class="post-media-container"><img src="${post.media}"></div>` : ''}
                        <div style="display:flex; gap:20px; color:#666; font-size:14px; margin-top:10px">
                            <span onclick="toggleLike('${doc.id}')" style="color:${liked ? 'var(--accent-pink)' : ''}"><i class="fas fa-heart"></i> ${post.likes || 0}</span>
                            <span onclick="alert('Comentários em breve')"><i class="fas fa-comment"></i> ${post.comments || 0}</span>
                        </div>
                    </div>
                `;
            });
        }

        function listenPosts() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(s => renderPosts(s, 'feed-content'));
        }

        function listenMyPosts() {
            db.collection("posts").where("author", "==", currentUser.user).onSnapshot(s => renderPosts(s, 'my-posts-content'));
        }

        async function toggleLike(id) {
            const ref = db.collection("posts").doc(id);
            const doc = await ref.get();
            let list = doc.data().likes_list || [];
            let count = doc.data().likes || 0;
            if(list.includes(currentUser.user)) { list = list.filter(u => u !== currentUser.user); count--; }
            else { list.push(currentUser.user); count++; }
            await ref.update({ likes: count, likes_list: list });
        }

        // PERFIL
        function loadProfile() {
            document.getElementById('my-pic').src = currentUser.pic || 'https://via.placeholder.com/110';
            document.getElementById('my-name').innerText = "@" + currentUser.user;
            document.getElementById('my-status').innerText = currentUser.status;
        }

        async function editFullProfile() {
            const newName = prompt("Novo nome de usuário (sem @):", currentUser.user);
            const newBio = prompt("Nova Bio:", currentUser.status);
            const confirmPic = confirm("Deseja trocar a foto? Se sim, clique na sua foto atual após fechar este aviso.");
            
            if(newName && newName !== currentUser.user) {
                // Lógica simplificada: para trocar nome real no Firestore teria que mover o documento. 
                // Aqui apenas atualizamos o dado visual para o teste.
                db.collection("usuarios").doc(currentUser.user).update({ status: newBio });
                currentUser.status = newBio;
            }
            loadProfile();
        }
    </script>
</body>
</html>
