<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Premium Final</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0a0a0c; --bg-card: #141417; --accent-purple: #a855f7; --accent-pink: #ec4899; --text-main: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        
        .screen { display: none; min-height: 100vh; padding-bottom: 100px; }
        .screen.active { display: block; }

        /* Estilos Globais */
        .custom-input-group { width: 100%; background: var(--bg-card); border-radius: 18px; padding: 15px; border: 1px solid #1f1f23; display: flex; align-items: center; margin-bottom: 15px; }
        .custom-input-group input, .custom-input-group textarea { background: transparent; border: none; width: 100%; color: white; outline: none; margin-left: 10px; flex: 1; }
        .btn-premium { width: 100%; padding: 16px; border-radius: 18px; border: none; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; font-weight: 800; cursor: pointer; }

        /* Registro e Avatares */
        .avatar-carousel { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .avatar-opt { width: 65px; height: 65px; border-radius: 50%; border: 3px solid transparent; flex-shrink: 0; cursor: pointer; transition: 0.3s; }
        .avatar-opt.selected { border-color: var(--accent-pink); transform: scale(1.1); }

        /* Chat Estilizado */
        .chat-tabs { display: flex; background: #111; margin: 15px; border-radius: 12px; padding: 5px; }
        .chat-tab { flex: 1; text-align: center; padding: 12px; border-radius: 10px; cursor: pointer; color: #555; font-weight: bold; }
        .chat-tab.active { background: var(--bg-card); color: var(--accent-pink); }
        #chat-render { height: 60vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 14px; position: relative; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #1f1f23; border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; font-weight: bold; margin-bottom: 4px; display: block; color: rgba(255,255,255,0.6); }

        /* Feed e Cards */
        .post-card { background: var(--bg-card); border-radius: 20px; margin: 15px; border: 1px solid #1f1f23; overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .post-actions { padding: 15px; display: flex; gap: 20px; border-top: 1px solid #1a1a1e; align-items: center; }
        .post-actions i { font-size: 22px; cursor: pointer; }
        .post-actions span { font-size: 14px; margin-left: -15px; color: #666; }

        /* Perfil e Grade */
        .p-header { padding: 25px 20px; position: relative; }
        .edit-pen { position: absolute; top: 25px; right: 25px; color: #555; cursor: pointer; font-size: 20px; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #1a1a1e; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Modais */
        .modal-embed { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg-card); width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; border: 1px solid #333; }

        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(15, 15, 18, 0.98); border-radius: 30px; display: flex; justify-content: space-around; padding: 18px; border: 1px solid #222; z-index: 1000; }
        nav i { font-size: 24px; color: #333; cursor: pointer; transition: 0.3s; }
        nav i.active { color: var(--accent-pink); }
    </style>
</head>
<body>

    <!-- MODAL POSTAR -->
    <div id="modal-post" class="modal-embed">
        <div class="modal-content">
            <h3>Novo Post</h3><br>
            <div class="custom-input-group"><textarea id="post-text" placeholder="No que está pensando?"></textarea></div>
            <div id="post-media-prev" style="margin-bottom:10px"></div>
            <button class="btn-premium" style="background:#222; margin-bottom:10px" onclick="document.getElementById('post-file').click()">Adicionar Mídia</button>
            <input type="file" id="post-file" hidden onchange="preverMidia(this)">
            <button class="btn-premium" onclick="enviarPost()">Publicar</button>
            <p onclick="fecharModal('modal-post')" style="text-align:center; margin-top:15px; color:#555">Cancelar</p>
        </div>
    </div>

    <!-- MODAL EDITAR PERFIL -->
    <div id="modal-edit" class="modal-embed">
        <div class="modal-content">
            <h3>Editar Perfil</h3><br>
            <div class="custom-input-group"><input type="text" id="edit-name" placeholder="Nome"></div>
            <div class="custom-input-group"><textarea id="edit-bio" placeholder="Bio..."></textarea></div>
            <button class="btn-premium" onclick="salvarPerfil()">Salvar</button>
            <p onclick="fecharModal('modal-edit')" style="text-align:center; margin-top:15px">Fechar</p>
        </div>
    </div>

    <!-- MODAL COMENTÁRIOS -->
    <div id="modal-comments" class="modal-embed" style="align-items: flex-end; padding: 0;">
        <div class="modal-content" style="max-width: 100%; border-radius: 25px 25px 0 0; height: 80vh; overflow-y: auto;">
            <div style="width: 40px; height: 5px; background: #333; margin: 0 auto 20px; border-radius: 10px;" onclick="fecharModal('modal-comments')"></div>
            <h3>Comentários</h3><br>
            <div id="comments-list" style="height: 50vh; overflow-y: auto; margin-bottom: 15px;"></div>
            <div class="custom-input-group">
                <input type="text" id="com-input" placeholder="Escreva algo...">
                <i class="fas fa-paper-plane" style="color:var(--accent-pink)" onclick="enviarComentario()"></i>
            </div>
        </div>
    </div>

    <!-- TELAS DE ACESSO -->
    <div id="screen-login" class="screen">
        <div style="padding:50px 30px; text-align:center">
            <h1 style="font-size:50px; background:linear-gradient(to right, #a855f7, #ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">k.chat</h1><br><br>
            <div class="custom-input-group"><input type="text" id="l-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><input type="password" id="l-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="fazerLogin()">Entrar</button>
            <p onclick="showScreen('register')" style="margin-top:20px; color:#666">Criar nova conta</p>
        </div>
    </div>

    <div id="screen-register" class="screen">
        <div style="padding:30px; text-align:center">
            <h2>Bem-vindo</h2><br>
            <div class="avatar-carousel" id="avatar-box"></div>
            <div class="custom-input-group"><input type="text" id="r-user" placeholder="Escolha um Usuário"></div>
            <div class="custom-input-group"><input type="password" id="r-pass" placeholder="Crie uma Senha"></div>
            <select id="r-gen" class="btn-premium" style="background:#1a1a1e; margin-bottom:15px">
                <option value="Ele">Ele</option><option value="Ela">Ela</option><option value="Outro">Outro</option>
            </select>
            <button class="btn-premium" onclick="fazerRegistro()">Finalizar</button>
        </div>
    </div>

    <!-- FEED -->
    <div id="screen-feed" class="screen">
        <div style="padding:15px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--bg-dark); z-index:100">
            <b style="font-size:24px">k.chat</b>
            <i class="fas fa-paper-plane" onclick="showScreen('chat')"></i>
        </div>
        <div id="feed-render"></div>
    </div>

    <!-- CHAT -->
    <div id="screen-chat" class="screen">
        <div style="padding:15px; border-bottom:1px solid #1a1a1e"><i class="fas fa-arrow-left" onclick="showScreen('feed')"></i> <b>Mensagens</b></div>
        <div class="chat-tabs">
            <div class="chat-tab active" onclick="trocarChat('geral', this)">Geral</div>
            <div class="chat-tab" onclick="trocarChat('vips', this)">Grupos</div>
        </div>
        <div id="chat-render"></div>
        <div style="padding:15px">
            <div class="custom-input-group">
                <input type="text" id="msg-input" placeholder="Mensagem...">
                <i class="fas fa-paper-plane" style="color:var(--accent-pink)" onclick="mandarMsg()"></i>
            </div>
        </div>
    </div>

    <!-- PERFIL -->
    <div id="screen-profile" class="screen">
        <div class="p-header">
            <i class="fas fa-pencil-alt edit-pen" onclick="abrirEdit()"></i>
            <div style="display:flex; align-items:center; gap:20px">
                <img id="p-img" src="" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid var(--accent-pink)">
                <div style="display:flex; gap:15px; text-align:center">
                    <div><b id="p-count">0</b><p style="font-size:12px; color:#555">Posts</p></div>
                    <div><b>2k</b><p style="font-size:12px; color:#555">Fãs</p></div>
                </div>
            </div>
            <h3 id="p-name" style="margin-top:15px"></h3>
            <p id="p-bio" style="color:#888; margin-top:5px; font-size:14px"></p>
            <button class="btn-premium" onclick="logout()" style="height:35px; background:#222; margin-top:15px; font-size:12px">Sair</button>
        </div>
        <div id="p-grid" class="profile-grid"></div>
    </div>

    <nav id="main-nav" style="display:none">
        <i class="fas fa-home" onclick="navTo('feed', this)"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-plus-square" onclick="abrirPost()"></i>
        <i class="fas fa-heart"></i>
        <i class="fas fa-user" onclick="navTo('profile', this)"></i>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
            authDomain: "kchat-web-8415c.firebaseapp.com",
            projectId: "kchat-web-8415c",
            storageBucket: "kchat-web-8415c.firebasestorage.app",
            messagingSenderId: "878265144053",
            appId: "1:878265144053:web:407389cd133d955f76abbc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let user = null;
        let chatAtivo = 'geral';
        let avatarSel = "";
        let midiaPost = "";
        let postFoco = "";

        window.onload = () => {
            const box = document.getElementById('avatar-box');
            for(let i=1; i<=10; i++) {
                let url = `https://api.dicebear.com/7.x/avataaars/svg?seed=k${i}`;
                box.innerHTML += `<img src="${url}" class="avatar-opt" onclick="selAv('${url}', this)">`;
            }
            const local = localStorage.getItem('kchat_save');
            if(local) { user = JSON.parse(local); entrar(); } else { showScreen('login'); }
        };

        function selAv(url, el) {
            document.querySelectorAll('.avatar-opt').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected'); avatarSel = url;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(id === 'feed') renderizarFeed();
            if(id === 'chat') carregarMsgs();
            if(id === 'profile') carregarPerfil(user.user);
        }

        function navTo(id, el) {
            document.querySelectorAll('nav i').forEach(i => i.classList.remove('active'));
            el.classList.add('active'); showScreen(id);
        }

        async function fazerRegistro() {
            const u = document.getElementById('r-user').value.toLowerCase().trim();
            const p = document.getElementById('r-pass').value;
            if(!u || !p || !avatarSel) return alert("Preencha tudo!");
            const dados = { user: u, pass: p, pic: avatarSel, bio: "No k.chat ⚡", gen: document.getElementById('r-gen').value };
            await db.collection("usuarios").doc(u).set(dados);
            user = dados; localStorage.setItem('kchat_save', JSON.stringify(user)); entrar();
        }

        async function fazerLogin() {
            const u = document.getElementById('l-user').value.toLowerCase().trim();
            const p = document.getElementById('l-pass').value;
            const doc = await db.collection("usuarios").doc(u).get();
            if(doc.exists && doc.data().pass === p) {
                user = doc.data(); localStorage.setItem('kchat_save', JSON.stringify(user)); entrar();
            }
        }

        function entrar() { document.getElementById('main-nav').style.display='flex'; showScreen('feed'); }

        // LOGICA CHAT REALTIME
        function trocarChat(tipo, el) {
            document.querySelectorAll('.chat-tab').forEach(i => i.classList.remove('active'));
            el.classList.add('active'); chatAtivo = tipo; carregarMsgs();
        }

        function carregarMsgs() {
            db.collection("conversas").doc(chatAtivo).collection("mensagens").orderBy("time", "asc").onSnapshot(snap => {
                const render = document.getElementById('chat-render');
                render.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const me = m.sender === user.user;
                    render.innerHTML += `<div class="msg ${me ? 'me' : 'other'}"><span class="msg-info">@${m.sender}</span>${m.text}</div>`;
                });
                render.scrollTop = render.scrollHeight;
            });
        }

        async function mandarMsg() {
            const txt = document.getElementById('msg-input').value;
            if(!txt) return;
            await db.collection("conversas").doc(chatAtivo).collection("mensagens").add({ sender: user.user, text: txt, time: Date.now() });
            document.getElementById('msg-input').value = "";
        }

        // LOGICA FEED E POSTS
        function renderizarFeed() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                const f = document.getElementById('feed-render'); f.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    f.innerHTML += `
                        <div class="post-card">
                            <div class="post-header" onclick="carregarPerfil('${p.author}')">
                                <img src="${p.authorPic}" style="width:35px; height:35px; border-radius:50%"> <b>@${p.author}</b>
                            </div>
                            ${p.media ? `<img src="${p.media}" style="width:100%">` : `<p style="padding:20px">${p.text}</p>`}
                            <div class="post-actions">
                                <i class="fas fa-heart" onclick="curtir('${doc.id}')"></i> <span>${p.likes || 0}</span>
                                <i class="far fa-comment" onclick="abrirComentarios('${doc.id}')"></i>
                            </div>
                            <div style="padding:0 15px 15px; font-size:14px"><b>@${p.author}</b> ${p.text}</div>
                        </div>`;
                });
            });
        }

        async function curtir(id) {
            await db.collection("posts").doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) });
        }

        function abrirComentarios(id) {
            postFoco = id;
            document.getElementById('modal-comments').style.display = 'flex';
            db.collection("posts").doc(id).collection("comentarios").orderBy("time", "asc").onSnapshot(snap => {
                const list = document.getElementById('comments-list'); list.innerHTML = "";
                snap.forEach(c => {
                    list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #111"><b>@${c.data().user}</b>: ${c.data().text}</div>`;
                });
            });
        }

        async function enviarComentario() {
            const t = document.getElementById('com-input').value;
            if(!t) return;
            await db.collection("posts").doc(postFoco).collection("comentarios").add({ user: user.user, text: t, time: Date.now() });
            document.getElementById('com-input').value = "";
        }

        // PERFIL E AUXILIARES
        async function carregarPerfil(username) {
            const doc = await db.collection("usuarios").doc(username).get();
            const d = doc.data();
            showScreen('profile');
            document.getElementById('p-img').src = d.pic;
            document.getElementById('p-name').innerText = "@" + d.user;
            document.getElementById('p-bio').innerText = d.bio;
            const posts = await db.collection("posts").where("author", "==", username).get();
            document.getElementById('p-count').innerText = posts.size;
            const grid = document.getElementById('p-grid'); grid.innerHTML = "";
            posts.forEach(p => {
                grid.innerHTML += `<div class="grid-item" onclick="abrirComentarios('${p.id}')">${p.data().media ? `<img src="${p.data().media}">` : `<p style="font-size:8px; padding:5px">${p.data().text}</p>`}</div>`;
            });
        }

        function abrirEdit() { document.getElementById('modal-edit').style.display='flex'; }
        async function salvarPerfil() {
            const n = document.getElementById('edit-name').value;
            const b = document.getElementById('edit-bio').value;
            const obj = {}; if(n) obj.user = n; if(b) obj.bio = b;
            await db.collection("usuarios").doc(user.user).update(obj);
            user = {...user, ...obj}; localStorage.setItem('kchat_save', JSON.stringify(user));
            location.reload();
        }

        function preverMidia(i) {
            const r = new FileReader(); r.onload = e => { midiaPost = e.target.result; document.getElementById('post-media-prev').innerHTML = `<img src="${midiaPost}" style="width:100px; border-radius:10px">`; };
            r.readAsDataURL(i.files[0]);
        }

        async function enviarPost() {
            await db.collection("posts").add({
                author: user.user, authorPic: user.pic, text: document.getElementById('post-text').value,
                media: midiaPost, likes: 0, time: Date.now()
            });
            fecharModal('modal-post');
        }

        function abrirPost() { document.getElementById('modal-post').style.display='flex'; }
        function fecharModal(id) { document.getElementById(id).style.display='none'; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
