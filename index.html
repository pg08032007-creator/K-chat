<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K. Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #8a2be2; --accent: linear-gradient(45deg, #c026d3, #db2777); --bg: #000; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; }

        /* Sistema de Telas */
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; overflow-y: auto; position: absolute; top: 0; left: 0; }
        .screen.active { display: flex; }

        /* Estilo dos Inputs (Igual às fotos) */
        .container { padding: 40px 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; }
        h1.logo { color: var(--text); font-size: 2.5rem; font-weight: bold; margin-bottom: 30px; align-self: flex-start; }
        h2.title { font-size: 1.8rem; margin-bottom: 20px; font-weight: 600; }
        
        input[type="text"], input[type="password"], input[type="number"] { 
            background: #111; border: 1px solid #222; padding: 18px; border-radius: 15px; 
            color: #fff; width: 100%; margin-bottom: 15px; outline: none; font-size: 16px;
        }

        .btn-purple { 
            background: var(--primary); color: #fff; border: none; padding: 18px; 
            border-radius: 30px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px;
        }

        /* Perfil (image_5) */
        .pfp-area { position: relative; width: 130px; height: 130px; margin-bottom: 25px; }
        #pfp-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        .pfp-edit { 
            position: absolute; bottom: 5px; right: 5px; background: var(--primary); 
            width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #000;
        }

        /* Gênero (image_5) */
        .gender-row { display: flex; gap: 30px; margin: 25px 0; justify-content: center; }
        .gender-row label { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
        .gender-row i { font-size: 24px; }
        .gender-row input { width: 22px; height: 22px; accent-color: var(--primary); }

        /* Feed e Nav (image_2) */
        .top-nav { padding: 15px; display: flex; align-items: center; gap: 12px; }
        .search-bar { background: #111; flex: 1; display: flex; align-items: center; padding: 12px 15px; border-radius: 12px; border: 1px solid #222; }
        .search-bar input { border: none; background: transparent; margin: 0; padding: 0; width: 100%; color: #fff; }
        
        .bottom-menu { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: center; }
        .nav-box { background: rgba(15,15,15,0.95); width: 90%; height: 75px; border-radius: 40px; border: 1px solid #222; display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(10px); }
        .plus-circle { background: var(--accent); width: 60px; height: 60px; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-top: -20px; box-shadow: 0 10px 20px rgba(192, 38, 211, 0.3); }
    </style>
</head>
<body>

    <div id="scr-auth" class="screen active">
        <div class="container">
            <h1 class="logo">K.</h1>
            <div style="display:flex; gap:20px; margin-bottom:20px; width:100%">
                <button onclick="m='login'" style="background:none; border:none; color:#fff; font-weight:bold">Login</button>
                <button onclick="m='reg'" style="background:none; border:none; color:#555; font-weight:bold">Registrar</button>
            </div>
            <input type="text" id="u" placeholder="Nome de usuário">
            <input type="password" id="p" placeholder="Senha">
            <button class="btn-purple" onclick="auth()">Entrar</button>
        </div>
    </div>

    <div id="scr-setup" class="screen">
        <div class="container">
            <h2 class="title">Complete seu Perfil</h2>
            <div class="pfp-area">
                <img src="https://via.placeholder.com/130" id="pfp-view">
                <label class="pfp-edit" for="pfp-file"><i class="fa fa-camera" style="font-size:14px"></i></label>
                <input type="file" id="pfp-file" hidden accept="image/*">
            </div>
            <input type="number" id="age" placeholder="18">
            <div class="gender-row">
                <label><i class="fa fa-mars" style="color:#3498db"></i><input type="radio" name="g" value="m"></label>
                <label><i class="fa fa-venus" style="color:#e91e63"></i><input type="radio" name="g" value="f"></label>
                <label><i class="fa fa-transgender" style="color:#f1c40f"></i><input type="radio" name="g" value="o"></label>
            </div>
            <button class="btn-purple" id="btn-save" onclick="save()">Criar Conta</button>
        </div>
    </div>

    <div id="scr-feed" class="screen">
        <div class="top-nav">
            <span style="color:var(--primary); font-weight:bold; font-size:24px">K.</span>
            <div class="search-bar"><i class="fa fa-search" style="color:#555"></i><input type="text" placeholder="Teste"></div>
        </div>
        <div style="padding: 20px;">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h1 style="font-size:32px">Global Feed</h1>
                <i class="fa-solid fa-arrows-rotate" style="color:var(--primary)"></i>
            </div>
            <div id="feed-list" style="margin-top:20px"></div>
        </div>
        <div class="bottom-menu">
            <div class="nav-box">
                <i class="fa-solid fa-compass" style="font-size:22px"></i>
                <div class="plus-circle"><i class="fa fa-plus"></i></div>
                <i class="fa-solid fa-user-astronaut" style="font-size:22px" onclick="location.reload()"></i>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPlWGrAgR6wvMilamQ1Z83nAhXJAaRHD0",
            authDomain: "kchat-1debf.firebaseapp.com",
            projectId: "kchat-1debf",
            storageBucket: "kchat-1debf.firebasestorage.app",
            appId: "1:622333653477:web:dab185145cfa4b18983f0c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.m = 'login'; 
        let user = null;

        // Auto-login
        if(localStorage.getItem('k_session')) {
            user = JSON.parse(localStorage.getItem('k_session'));
            document.getElementById('scr-auth').classList.remove('active');
            document.getElementById('scr-feed').classList.add('active');
        }

        window.auth = async () => {
            const name = document.getElementById('u').value.trim();
            const pass = document.getElementById('p').value;
            if(!name || !pass) return;

            const snap = await getDoc(doc(db, "users", name));
            if(snap.exists()) {
                if(snap.data().pass === pass) { user = snap.data(); done(); }
                else alert("Senha incorreta");
            } else {
                user = { name, pass };
                go('scr-setup');
            }
        };

        window.save = async () => {
            document.getElementById('btn-save').innerText = "Processando...";
            user.age = document.getElementById('age').value;
            user.gender = document.querySelector('input[name="g"]:checked')?.value || 'o';
            await setDoc(doc(db, "users", user.name), user);
            done();
        };

        function done() {
            localStorage.setItem('k_session', JSON.stringify(user));
            go('scr-feed');
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('pfp-file').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('pfp-view').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
