<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Cloud Premium</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-dark: #0a0a0c; 
            --bg-card: #141417; 
            --accent-purple: #a855f7; 
            --accent-pink: #ec4899; 
            --text-main: #ffffff; 
            --input-inner: inset 2px 2px 5px rgba(0,0,0,0.3); 
            --text-dim: #a1a1aa; 
            --glass: rgba(20, 20, 23, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
        }

        /* SEU LAYOUT ORIGINAL MANTIDO */
        .chat-box {
            height: 400px;
            overflow-y: auto;
        }

        /* MELHORIA ADICIONADA (sem quebrar seu estilo) */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px;
        }

        .message {
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 6px;
            animation: fade 0.2s ease;
        }

        .user {
            background: #2a2a30;
            text-align: right;
        }

        .bot {
            background: #1a1a1f;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #1c1c20;
            color: white;
        }

        button {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border: none;
            padding: 10px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        @keyframes fade {
            from {opacity:0; transform: translateY(5px);}
            to {opacity:1;}
        }
    </style>
</head>

<body>

<div class="card">
    <h2><i class="fa-solid fa-cloud"></i> k.chat</h2>

    <!-- SUA DIV ORIGINAL -->
    <div id="chat" class="chat-box"></div>

    <div style="display:flex; gap:10px;">
        <input type="text" id="messageInput" placeholder="Digite sua mensagem...">
        <button onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>
<script>
    // ===== CONFIG FIREBASE (SEU ORIGINAL) =====
    const firebaseConfig = {
        // coloque aqui sua config original
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ===== FUNÇÃO ORIGINAL (mantida) =====
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();

        if (!text) return;

        // MELHORIA: adicionando timestamp estruturado
        db.collection('messages').add({
            text: text,
            createdAt: Date.now(),
            type: "user" // MELHORIA (não quebra nada)
        });

        input.value = '';
    }

    // ===== MELHORIA: enviar com ENTER =====
    document.getElementById('messageInput')
        .addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

    // ===== MELHORIA: função para renderizar mensagens =====
    function renderMessage(msg) {
        const div = document.createElement('div');

        // mantém compatibilidade com seu código
        div.className = 'message ' + (msg.type || 'user');

        div.textContent = msg.text;

        return div;
    }

    // ===== TEMPO REAL (melhorado, sem quebrar original) =====
    db.collection('messages')
        .orderBy('createdAt')
        .onSnapshot(snapshot => {

            const chat = document.getElementById('chat');

            // limpa (igual comportamento comum)
            chat.innerHTML = '';

            snapshot.forEach(doc => {
                const msg = doc.data();

                const element = renderMessage(msg);
                chat.appendChild(element);
            });

            // ===== MELHORIA: auto scroll =====
            chat.scrollTop = chat.scrollHeight;
        });

    // ===== MELHORIA EXTRA (não existia antes, mas segura) =====
    // evita envio de espaço vazio via colar
    document.getElementById('messageInput')
        .addEventListener('input', function() {
            this.value = this.value.replace(/^\\s+/, '');
        });

</script>

</body>
</html>
