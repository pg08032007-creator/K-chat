<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Full Experience</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0a0a0c; --bg-card: #141417; --accent-purple: #a855f7; --accent-pink: #ec4899; --text-main: #ffffff; --text-dim: #a1a1aa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        
        .screen { display: none; min-height: 100vh; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Elements */
        .custom-input-group { width: 100%; background: var(--bg-card); border-radius: 18px; padding: 16px; border: 1px solid #1f1f23; display: flex; align-items: center; margin-bottom: 15px; }
        .custom-input-group input, .custom-input-group textarea { background: transparent; border: none; width: 100%; color: white; outline: none; margin-left: 10px; font-size: 16px; }
        .btn-premium { width: 100%; padding: 18px; border-radius: 20px; border: none; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); color: white; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-premium:active { transform: scale(0.98); opacity: 0.9; }

        /* Registro e Avatares */
        .avatar-carousel { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; }
        .avatar-opt { width: 70px; height: 70px; border-radius: 50%; border: 3px solid transparent; flex-shrink: 0; cursor: pointer; object-fit: cover; }
        .avatar-opt.selected { border-color: var(--accent-pink); transform: scale(1.1); }

        /* Header e Navegação */
        .app-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: var(--bg-dark); z-index: 1000; border-bottom: 1px solid #1a1a1e; }
        .search-bar { flex: 1; background: #1a1a1e; border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; border: 1px solid #27272a; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }
        
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(15, 15, 18, 0.95); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; padding: 18px; backdrop-filter: blur(15px); border: 1px solid #222; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        nav i { cursor: pointer; color: #444; font-size: 24px; transition: 0.3s; }
        nav i.active { color: var(--accent-pink); text-shadow: 0 0 10px var(--accent-pink); }

        /* Feed Post Cards */
        .post-card { background: var(--bg-card); border-radius: 25px; margin: 15px; border: 1px solid #1f1f23; overflow: hidden; }
        .post-header { padding: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .post-content-text { padding: 0 15px 12px; font-size: 15px; line-height: 1.4; color: #efefef; }
        .post-media-box { width: 100%; background: #000; display: flex; align-items: center; justify-content: center; min-height: 200px; cursor: pointer; }
        .post-media-box img, .post-media-box video { width: 100%; max-height: 500px; object-fit: cover; }
        .post-actions { padding: 15px; display: flex; gap: 20px; border-top: 1px solid #1a1a1e; }
        .post-actions div { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-dim); }
        .post-actions i { font-size: 20px; cursor: pointer; transition: 0.2s; }
        .post-actions i.fa-heart.liked { color: var(--accent-pink); }

        /* Perfil Estilo Instagram */
        .p-header { padding: 25px 20px; position: relative; }
        .p-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .p-stats { display: flex; gap: 20px; text-align: center; }
        .p-stats b { display: block; font-size: 18px; color: white; }
        .p-stats span { font-size: 12px; color: #666; }
        .edit-pen-top { position: absolute; top: 25px; right: 20px; font-size: 20px; color: var(--text-dim); cursor: pointer; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #1a1a1e; overflow: hidden; cursor: pointer; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        /* Detalhe do Post (Zoom e Comentários) */
        .detail-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 5000; overflow-y: auto; }
        .comment-box { padding: 15px; background: var(--bg-card); border-bottom: 1px solid #1a1a1e; display: flex; align-items: flex-start; gap: 10px; }
        .comment-box b { color: var(--accent-purple); font-size: 14px; }

        /* Modais */
        .modal-embed { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg-card); width: 100%; max-width: 400px; padding: 30px; border-radius: 30px; border: 1px solid #333; }

        /* Chat Tabs */
        .chat-tabs { display: flex; border-bottom: 1px solid #222; }
        .chat-tab { flex: 1; text-align: center; padding: 15px; color: #444; cursor: pointer; font-weight: bold; }
        .chat-tab.active { color: var(--accent-pink); border-bottom: 3px solid var(--accent-pink); }
    </style>
</head>
<body>

    <!-- MODAL EDITAR PERFIL (LÁPIS NO TOPO) -->
    <div id="modal-edit" class="modal-embed">
        <div class="modal-content">
            <h3 style="margin-bottom:20px">Editar Perfil</h3>
            <div style="text-align:center; margin-bottom:20px">
                <img id="edit-preview" src="" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid var(--accent-pink)">
                <p style="color:var(--accent-pink); margin-top:10px; font-size:13px" onclick="document.getElementById('edit-file').click()">Trocar Foto</p>
                <input type="file" id="edit-file" hidden onchange="processFile(this, 'edit')">
            </div>
            <div class="custom-input-group"><input type="text" id="edit-name" placeholder="Nome"></div>
            <div class="custom-input-group"><textarea id="edit-bio" placeholder="Bio..."></textarea></div>
            <button class="btn-premium" onclick="saveProfile()">Salvar Tudo</button>
            <p onclick="closeModal('modal-edit')" style="text-align:center; margin-top:15px; color:#555">Fechar</p>
        </div>
    </div>

    <!-- MODAL NOVO POST -->
    <div id="modal-post" class="modal-embed">
        <div class="modal-content">
            <h3>Nova Publicação</h3><br>
            <div class="custom-input-group"><textarea id="post-text" placeholder="Legenda do post..."></textarea></div>
            <div id="post-media-preview" style="border-radius:15px; overflow:hidden; margin-bottom:15px"></div>
            <button class="btn-premium" style="background:#222; margin-bottom:10px" onclick="document.getElementById('post-file').click()">Galeria</button>
            <input type="file" id="post-file" hidden onchange="processFile(this, 'post')">
            <button class="btn-premium" onclick="publishPost()">Publicar</button>
            <p onclick="closeModal('modal-post')" style="text-align:center; margin-top:15px; color:#555">Cancelar</p>
        </div>
    </div>

    <!-- ZOOM DO POST E COMENTÁRIOS -->
    <div id="screen-detail" class="detail-overlay">
        <div class="app-header" style="background:rgba(0,0,0,0.8); border:none">
            <i class="fas fa-arrow-left" onclick="closeDetail()"></i>
            <strong>Publicação</strong>
        </div>
        <div id="detail-render"></div>
        <div style="padding:20px">
            <div class="custom-input-group">
                <input type="text" id="comment-input" placeholder="Comentar...">
                <i class="fas fa-paper-plane" style="color:var(--accent-pink)" onclick="addComment()"></i>
            </div>
            <div id="detail-comments"></div>
        </div>
    </div>

    <!-- LOGIN / REGISTRO -->
    <div id="screen-login" class="screen">
        <div style="padding:50px 30px; text-align:center">
            <div style="font-size:60px; font-weight:900; background:linear-gradient(45deg, var(--accent-purple), var(--accent-pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">K.</div><br><br>
            <div class="custom-input-group"><i class="fas fa-user"></i><input type="text" id="login-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><i class="fas fa-lock"></i><input type="password" id="login-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="handleLogin()">Entrar</button>
            <p onclick="showScreen('register')" style="margin-top:25px; color:#666">Não tem conta? <span style="color:var(--accent-pink)">Crie uma</span></p>
        </div>
    </div>

    <div id="screen-register" class="screen">
        <div style="padding:30px; text-align:center">
            <h2>Criar Conta</h2><br>
            <div class="custom-input-group"><input type="text" id="reg-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><input type="password" id="reg-pass" placeholder="Senha"></div>
            <p style="text-align:left; font-size:12px; color:#666">Escolha seu Avatar:</p>
            <div class="avatar-carousel">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-opt" onclick="selAv(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar-opt" onclick="selAv(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Jack" class="avatar-opt" onclick="selAv(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mimi" class="avatar-opt" onclick="selAv(this)">
            </div>
            <p style="font-size:12px; margin:10px 0">Ou use sua foto:</p>
            <input type="file" id="reg-file" class="btn-premium" style="background:#1a1a1e; font-size:12px" onchange="processFile(this, 'reg')">
            <select id="reg-gen" class="btn-premium" style="background:#1a1a1e; margin-top:15px">
                <option value="Ele">Gênero: Ele</option>
                <option value="Ela">Gênero: Ela</option>
                <option value="Outro">Gênero: Outro</option>
            </select><br><br>
            <button class="btn-premium" onclick="handleRegister()">Finalizar</button>
        </div>
    </div>

    <!-- FEED -->
    <div id="screen-feed" class="screen">
        <header class="app-header">
            <div style="font-size:24px; font-weight:900; color:var(--accent-pink)">K.</div>
            <div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="Pesquisar..." oninput="filterFeed(this.value)"></div>
            <i class="fas fa-comment-dots" onclick="showScreen('chat')" style="font-size:22px; color:var(--accent-purple)"></i>
        </header>
        <div id="feed-render"></div>
    </div>

    <!-- CHAT -->
    <div id="screen-chat" class="screen">
        <div class="app-header"><i class="fas fa-arrow-left" onclick="showScreen('feed')"></i> <strong>Mensagens</strong></div>
        <div class="chat-tabs">
            <div class="chat-tab active" onclick="setChat('geral', this)">Geral</div>
            <div class="chat-tab" onclick="setChat('grupos', this)">Grupos</div>
        </div>
        <div id="chat-render" style="padding:50px; text-align:center; color:#333">Sem conversas no momento.</div>
    </div>

    <!-- PERFIL -->
    <div id="screen-profile" class="screen">
        <div class="p-header">
            <i class="fas fa-pencil-alt edit-pen-top" onclick="openEdit()"></i>
            <div class="p-top">
                <img id="my-pic" src="" style="width:85px; height:85px; border-radius:50%; object-fit:cover; border:2px solid var(--accent-pink)">
                <div class="p-stats">
                    <div><b id="count-posts">0</b><span>Posts</span></div>
                    <div><b>0</b><span>Seguidores</span></div>
                    <div><b>0</b><span>Seguindo</span></div>
                </div>
            </div>
            <h2 id="my-name"></h2>
            <p id="my-gen" style="color:var(--accent-pink); font-size:12px; font-weight:bold"></p>
            <p id="my-bio" style="color:#777; margin-top:5px; font-size:14px"></p>
            <button class="btn-premium" onclick="logout()" style="height:35px; background:#1a1a1e; margin-top:15px; font-size:12px">Sair da Conta</button>
        </div>
        <div id="my-grid" class="profile-grid"></div>
    </div>

    <nav id="main-nav" style="display:none">
        <i class="fas fa-home" onclick="showScreen('feed', this)"></i>
        <i class="fas fa-plus-square" onclick="openModal('modal-post')"></i>
        <i class="fas fa-user" onclick="showScreen('profile', this)"></i>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
            authDomain: "kchat-web-8415c.firebaseapp.com",
            projectId: "kchat-web-8415c",
            storageBucket: "kchat-web-8415c.firebasestorage.app",
            messagingSenderId: "878265144053",
            appId: "1:878265144053:web:407389cd133d955f76abbc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let user = null;
        let tempMedia = "";
        let selectedPostId = "";

        window.onload = () => {
            const saved = localStorage.getItem('k_user_session');
            if(saved) { user = JSON.parse(saved); enter(); } else { showScreen('login'); }
        };

        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(el) { document.querySelectorAll('nav i').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
            if(id === 'feed') renderFeed();
            if(id === 'profile') renderProfile(user.user);
        }

        // PROCESSAMENTO DE ARQUIVOS
        function processFile(input, type) {
            const reader = new FileReader();
            reader.onload = e => {
                if(type === 'reg') tempMedia = e.target.result;
                if(type === 'edit') { tempMedia = e.target.result; document.getElementById('edit-preview').src = tempMedia; }
                if(type === 'post') { 
                    tempMedia = e.target.result;
                    document.getElementById('post-media-preview').innerHTML = input.files[0].type.includes('video') ? `<video src="${tempMedia}" style="width:100%" muted autoplay></video>` : `<img src="${tempMedia}" style="width:100%">`;
                }
            };
            reader.readAsDataURL(input.files[0]);
        }

        function selAv(el) {
            document.querySelectorAll('.avatar-opt').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            tempMedia = el.src;
        }

        // AUTH
        async function handleRegister() {
            const u = document.getElementById('reg-user').value.toLowerCase().trim();
            const p = document.getElementById('reg-pass').value;
            const g = document.getElementById('reg-gen').value;
            if(!u || !p) return alert("Campos vazios");
            const data = { user: u, pass: p, gen: g, pic: tempMedia || 'https://via.placeholder.com/150', bio: "Novo aqui!" };
            await db.collection("usuarios").doc(u).set(data);
            user = data; localStorage.setItem('k_user_session', JSON.stringify(user)); enter();
        }

        async function handleLogin() {
            const u = document.getElementById('login-user').value.toLowerCase().trim();
            const p = document.getElementById('login-pass').value;
            const d = await db.collection("usuarios").doc(u).get();
            if(d.exists && d.data().pass === p) {
                user = d.data(); localStorage.setItem('k_user_session', JSON.stringify(user)); enter();
            } else { alert("Senha ou usuário incorretos"); }
        }

        function enter() { document.getElementById('main-nav').style.display = 'flex'; showScreen('feed'); }

        // FEED, LIKES E COMENTÁRIOS
        async function renderFeed(f = "") {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                const render = document.getElementById('feed-render');
                render.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    if(f && !p.author.includes(f) && !p.text.toLowerCase().includes(f)) return;
                    render.innerHTML += `
                    <div class="post-card">
                        <div class="post-header" onclick="renderProfile('${p.author}')">
                            <img src="${p.authorPic}" style="width:35px; height:35px; border-radius:50%; object-fit:cover">
                            <strong>@${p.author}</strong>
                        </div>
                        <div class="post-media-box" onclick="openDetail('${doc.id}')">
                            ${p.text ? `<p class="post-content-text">${p.text}</p>` : ''}
                            ${p.media ? (p.media.includes('video') ? `<video src="${p.media}" muted autoplay loop></video>` : `<img src="${p.media}">`) : ''}
                        </div>
                        <div class="post-actions">
                            <div onclick="likePost('${doc.id}')"><i class="fas fa-heart"></i> <span>${p.likes || 0}</span></div>
                            <div onclick="openDetail('${doc.id}')"><i class="far fa-comment"></i> Comentar</div>
                        </div>
                    </div>`;
                });
            });
        }

        async function likePost(id) {
            await db.collection("posts").doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) });
        }

        async function openDetail(id) {
            selectedPostId = id;
            const d = await db.collection("posts").doc(id).get();
            const p = d.data();
            document.getElementById('screen-detail').style.display = 'block';
            document.getElementById('detail-render').innerHTML = `
                ${p.media ? (p.media.includes('video') ? `<video src="${p.media}" style="width:100%" controls autoplay></video>` : `<img src="${p.media}" style="width:100%">`) : ''}
                <div style="padding:15px"><b>@${p.author}</b>
