<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>k.chat - Redesign Social</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-card: #141417;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --input-inner: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        .screen { display: none; min-height: 100vh; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo dos Inputs Originais */
        .custom-input-group {
            width: 100%; background: var(--bg-card); border-radius: 18px; padding: 18px;
            border: 1px solid #1f1f23; display: flex; align-items: center; box-shadow: var(--input-inner); margin-bottom: 15px;
        }
        .custom-input-group input { background: transparent; border: none; width: 100%; color: white; outline: none; margin-left: 12px; font-size: 16px; }
        .btn-premium {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white; font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        /* Nav Estilo Instagram */
        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(15, 15, 18, 0.95); border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center;
            padding: 12px; backdrop-filter: blur(15px); border: 1px solid #222; z-index: 1000;
        }
        nav div { cursor: pointer; color: #555; font-size: 20px; transition: 0.3s; }
        nav div.active { color: var(--accent-pink); }
        .plus-fab {
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink));
            width: 55px; height: 55px; border-radius: 20px; display: flex;
            align-items: center; justify-content: center; color: white !important; margin-top: -45px;
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3);
        }

        /* Feed e Cards */
        .post-card { background: var(--bg-card); border-radius: 24px; margin: 15px; border: 1px solid #1f1f23; overflow: hidden; }
        .post-header { padding: 15px; display: flex; align-items: center; gap: 12px; }
        .post-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-purple); }
        .post-media { width: 100%; min-height: 200px; background: #000; display: block; object-fit: cover; }
        .post-actions { padding: 15px; display: flex; gap: 20px; font-size: 22px; }
        .post-info { padding: 0 15px 15px 15px; }

        /* Modal de Detalhes (O que você pediu) */
        .modal-full {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 3000; overflow-y: auto;
        }
        .modal-header { padding: 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; position: sticky; top:0; background: var(--bg-dark); }

        /* Categorias de Chat */
        .chat-category-tabs { display: flex; padding: 10px 20px; gap: 10px; }
        .tab-pill {
            padding: 8px 20px; border-radius: 20px; background: #1a1a1e; color: #666;
            font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .tab-pill.active { background: var(--accent-pink); color: white; }

        /* Perfil Social */
        .profile-hero { text-align: center; padding: 40px 20px 20px; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent-pink); margin-bottom: 15px; }
        .stats-container { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat-box { text-align: center; }
        .stat-num { font-weight: 800; font-size: 20px; display: block; }
        .stat-label { font-size: 12px; color: var(--text-dim); }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #1a1a1e; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Comentários */
        .comment-row { display: flex; gap: 10px; margin-bottom: 15px; padding: 0 20px; }
        .comment-row b { color: var(--accent-purple); font-size: 14px; }
    </style>
</head>
<body>

    <!-- MODAL DE POST DETALHADO -->
    <div id="modal-post-detail" class="modal-full">
        <div class="modal-header">
            <i class="fas fa-arrow-left" onclick="closePostDetail()"></i>
            <span id="detail-username-header">Publicação</span>
        </div>
        <div id="detail-content"></div>
        <div style="padding: 20px;">
            <h4 style="margin-bottom: 15px; color: var(--text-dim)">Comentários</h4>
            <div id="detail-comments-list"></div>
        </div>
        <!-- Input de Comentário Fixo embaixo -->
        <div style="position: sticky; bottom: 0; background: #0a0a0c; padding: 15px; border-top: 1px solid #222;">
            <div class="custom-input-group" style="margin-bottom: 0;">
                <input type="text" id="new-comment-input" placeholder="Adicione um comentário...">
                <i class="fas fa-paper-plane" style="color: var(--accent-pink)" id="btn-send-comment"></i>
            </div>
        </div>
    </div>

    <!-- TELA LOGIN (Mantida) -->
    <div id="screen-login" class="screen active">
        <div style="padding: 60px 30px; text-align: center;">
            <h1 style="font-size: 50px; margin-bottom: 40px;" class="logo-k">K.</h1>
            <div class="custom-input-group"><i class="fas fa-user"></i><input type="text" id="login-user" placeholder="Usuário"></div>
            <div class="custom-input-group"><i class="fas fa-lock"></i><input type="password" id="login-pass" placeholder="Senha"></div>
            <button class="btn-premium" onclick="handleLogin()">ENTRAR</button>
            <p style="margin-top: 25px; color: #555;" onclick="showScreen('register')">Não tem conta? <span style="color: var(--accent-pink)">Criar</span></p>
        </div>
    </div>

    <!-- TELA CADASTRO (Mantida) -->
    <div id="screen-register" class="screen">
        <div style="padding: 40px 30px;">
            <h2>Criar Conta</h2><br>
            <div class="custom-input-group"><input type="text" id="reg-user" placeholder="Escolha um @usuário"></div>
            <div class="custom-input-group"><input type="password" id="reg-pass" placeholder="Crie uma senha"></div>
            <div class="custom-input-group"><input type="text" id="reg-bio" placeholder="Sua Bio"></div>
            <button class="btn-premium" onclick="handleRegister()">CRIAR PERFIL</button>
        </div>
    </div>

    <!-- TELA FEED -->
    <div id="screen-feed" class="screen">
        <header style="padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; background: var(--bg-dark); z-index: 100;">
            <h2 class="logo-k">k.chat</h2>
            <i class="far fa-paper-plane" style="font-size: 22px;" onclick="showScreen('chat')"></i>
        </header>
        <div id="feed-container"></div>
    </div>

    <!-- TELA CHAT (COM CATEGORIAS) -->
    <div id="screen-chat" class="screen">
        <div class="modal-header">
            <i class="fas fa-arrow-left" onclick="showScreen('feed')"></i>
            <span>Mensagens</span>
        </div>
        <div class="chat-category-tabs">
            <div class="tab-pill active" id="tab-geral" onclick="switchChat('geral')">Geral</div>
            <div class="tab-pill" id="tab-grupos" onclick="switchChat('grupos')">Grupos</div>
        </div>
        <div id="chat-messages" style="padding: 20px; height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;"></div>
        <div style="padding: 20px;">
            <div class="custom-input-group">
                <input type="text" id="chat-input" placeholder="Sua mensagem...">
                <i class="fas fa-paper-plane" onclick="sendMessage()"></i>
            </div>
        </div>
    </div>

    <!-- TELA PERFIL (MELHORADA ESTILO INSTAGRAM) -->
    <div id="screen-profile" class="screen">
        <div id="profile-content">
            <!-- Renderizado via JS -->
        </div>
        <div class="profile-grid" id="my-posts-grid"></div>
    </div>

    <!-- TELA VER PERFIL ALHEIO -->
    <div id="screen-view-user" class="screen">
        <div class="modal-header">
            <i class="fas fa-arrow-left" onclick="showScreen('feed')"></i>
            <span id="view-user-at">@usuario</span>
        </div>
        <div id="view-user-content"></div>
        <div class="profile-grid" id="view-user-grid"></div>
    </div>

    <!-- NAV BAR -->
    <nav id="main-nav" style="display: none;">
        <div onclick="showScreen('feed')" id="nav-feed"><i class="fas fa-home"></i></div>
        <div onclick="openCreatePost()"><div class="plus-fab"><i class="fas fa-plus"></i></div></div>
        <div onclick="showScreen('profile')" id="nav-profile"><i class="fas fa-user"></i></div>
    </nav>

    <!-- MODAL NOVO POST (MANTIDO) -->
    <div id="modal-post" class="modal-full" style="background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center;">
        <div style="background: var(--bg-card); width: 90%; border-radius: 30px; padding: 30px;">
            <h3>Nova Publicação</h3><br>
            <div class="custom-input-group"><input type="text" id="post-caption" placeholder="Legenda..."></div>
            <div id="preview-area" style="width: 100%; border-radius: 15px; margin-bottom: 15px;"></div>
            <button class="btn-premium" style="background: #222; margin-bottom: 10px;" onclick="document.getElementById('file-post').click()">Escolher Foto/Vídeo</button>
            <input type="file" id="file-post" hidden accept="image/*,video/*" onchange="previewMedia(this)">
            <button class="btn-premium" onclick="submitPost()">PUBLICAR</button>
            <p onclick="closePostModal()" style="text-align: center; margin-top: 15px; color: #555;">Cancelar</p>
        </div>
    </div>

    <script>
        // Configuração Firebase (Use a sua original aqui)
        const firebaseConfig = {
            apiKey: "AIzaSyCA1CnnU0yBuLdeEYBp1MX4KqEhEtH98aE",
            authDomain: "kchat-web-8415c.firebaseapp.com",
            projectId: "kchat-web-8415c",
            storageBucket: "kchat-web-8415c.firebasestorage.app",
            messagingSenderId: "878265144053",
            appId: "1:878265144053:web:407389cd133d955f76abbc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        let activeChat = 'geral';
        let postMediaBase64 = "";

        // LOGIN E NAVEGAÇÃO
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            
            document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
            if(id === 'feed' || id === 'profile') document.getElementById('nav-' + id).classList.add('active');

            if(id === 'feed') listenFeed();
            if(id === 'profile') renderMyProfile();
            if(id === 'chat') listenChat();
        }

        async function handleLogin() {
            const u = document.getElementById('login-user').value.toLowerCase().trim();
            const p = document.getElementById('login-pass').value;
            const doc = await db.collection("usuarios").doc(u).get();
            if(doc.exists && doc.data().pass === p) {
                currentUser = doc.data();
                startApp();
            } else { alert("Usuário ou senha incorretos."); }
        }

        async function handleRegister() {
            const u = document.getElementById('reg-user').value.toLowerCase().trim();
            const p = document.getElementById('reg-pass').value;
            const b = document.getElementById('reg-bio').value;
            if(!u || !p) return;
            
            const newUser = {
                user: u, pass: p, bio: b, 
                pic: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + u,
                followers: [], following: [], posts_count: 0
            };
            await db.collection("usuarios").doc(u).set(newUser);
            currentUser = newUser;
            startApp();
        }

        function startApp() {
            document.getElementById('main-nav').style.display = 'flex';
            showScreen('feed');
        }

        // --- SISTEMA DE FEED E LIKES (REVERSÍVEIS) ---
        function listenFeed() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                const container = document.getElementById('feed-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const post = doc.data();
                    const id = doc.id;
                    const hasLiked = post.liked_by && post.liked_by.includes(currentUser.user);

                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-header" onclick="viewOtherUser('${post.author}')">
                                <img src="${post.authorPic}">
                                <b>@${post.author}</b>
                            </div>
                            <div onclick="openPostDetail('${id}')">
                                <img src="${post.media}" class="post-media">
                            </div>
                            <div class="post-actions">
                                <i class="${hasLiked ? 'fas' : 'far'} fa-heart" 
                                   style="color: ${hasLiked ? 'var(--accent-pink)' : 'white'}" 
                                   onclick="toggleLike('${id}', ${hasLiked})"></i>
                                <i class="far fa-comment" onclick="openPostDetail('${id}')"></i>
                            </div>
                            <div class="post-info" onclick="openPostDetail('${id}')">
                                <b>${post.likes || 0} curtidas</b><br>
                                <span><b>@${post.author}</b> ${post.caption}</span><br>
                                <small style="color: #444; font-size: 10px;">${new Date(post.time).toLocaleString()}</small>
                            </div>
                        </div>
                    `;
                });
            });
        }

        async function toggleLike(postId, alreadyLiked) {
            const ref = db.collection("posts").doc(postId);
            if(alreadyLiked) {
                await ref.update({
                    likes: firebase.firestore.FieldValue.increment(-1),
                    liked_by: firebase.firestore.FieldValue.arrayRemove(currentUser.user)
                });
            } else {
                await ref.update({
                    likes: firebase.firestore.FieldValue.increment(1),
                    liked_by: firebase.firestore.FieldValue.arrayUnion(currentUser.user)
                });
            }
        }

        // --- DETALHES DO POST ---
        async function openPostDetail(id) {
            const doc = await db.collection("posts").doc(id).get();
            const post = doc.data();
            const modal = document.getElementById('modal-post-detail');
            document.getElementById('detail-username-header').innerText = "@" + post.author;
            
            document.getElementById('detail-content').innerHTML = `
                <img src="${post.media}" style="width:100%">
                <div style="padding:15px">
                    <b>@${post.author}</b> ${post.caption}<br>
                    <small style="color:#555">${new Date(post.time).toLocaleString()}</small>
                </div>
            `;
            
            modal.style.display = 'block';
            
            // Carregar Comentários
            listenComments(id);
            document.getElementById('btn-send-comment').onclick = () => addComment(id);
        }

        function closePostDetail() { document.getElementById('modal-post-detail').style.display = 'none'; }

        async function addComment(postId) {
            const input = document.getElementById('new-comment-input');
            if(!input.value) return;
            await db.collection("posts").doc(postId).collection("comments").add({
                user: currentUser.user,
                text: input.value,
                time: Date.now()
            });
            input.value = "";
        }

        function listenComments(postId) {
            db.collection("posts").doc(postId).collection("comments").orderBy("time", "asc").onSnapshot(snap => {
                const list = document.getElementById('detail-comments-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const data = c.data();
                    list.innerHTML += `<div class="comment-row"><b>@${data.user}</b> <span>${data.text}</span></div>`;
                });
            });
        }

        // --- CHAT COM CATEGORIAS ---
        function switchChat(type) {
            activeChat = type;
            document.querySelectorAll('.tab-pill').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');
            listenChat();
        }

        function listenChat() {
            db.collection("chat_" + activeChat).orderBy("time", "asc").limitToLast(50).onSnapshot(snap => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isMe = m.sender === currentUser.user;
                    box.innerHTML += `
                        <div style="align-self: ${isMe ? 'flex-end' : 'flex-start'}; background: ${isMe ? 'var(--accent-purple)' : '#222'}; padding: 12px 18px; border-radius: 20px; max-width: 80%;">
                            <small style="font-size: 10px; opacity: 0.6;">@${m.sender}</small><br>${m.text}
                        </div>
                    `;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendMessage() {
            const inp = document.getElementById('chat-input');
            if(!inp.value) return;
            await db.collection("chat_" + activeChat).add({
                sender: currentUser.user, text: inp.value, time: Date.now()
            });
            inp.value = "";
        }

        // --- PERFIL E SEGUIDORES ---
        async function renderMyProfile() {
            const p = document.getElementById('profile-content');
            p.innerHTML = `
                <div class="profile-hero">
                    <img src="${currentUser.pic}" class="profile-img">
                    <h2>@${currentUser.user}</h2>
                    <p style="color: #666; margin-top: 5px;">${currentUser.bio}</p>
                    <div class="stats-container">
                        <div class="stat-box"><span class="stat-num" id="my-p-count">0</span><span class="stat-label">Posts</span></div>
                        <div class="stat-box"><span class="stat-num">${currentUser.followers.length}</span><span class="stat-label">Seguidores</span></div>
                        <div class="stat-box"><span class="stat-num">${currentUser.following.length}</span><span class="stat-label">Seguindo</span></div>
                    </div>
                    <button class="btn-premium" style="width: auto; padding: 10px 40px; background: #1a1a1e;" onclick="location.reload()">Sair</button>
                </div>
            `;
            const snap = await db.collection("posts").where("author", "==", currentUser.user).get();
            document.getElementById('my-p-count').innerText = snap.size;
            const grid = document.getElementById('my-posts-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                grid.innerHTML += `<div class="grid-item" onclick="openPostDetail('${doc.id}')"><img src="${doc.data().media}"></div>`;
            });
        }

        async function viewOtherUser(username) {
            if(username === currentUser.user) { showScreen('profile'); return; }
            showScreen('view-user');
            const doc = await db.collection("usuarios").doc(username).get();
            const user = doc.data();
            const isFollowing = currentUser.following.includes(username);

            document.getElementById('view-user-at').innerText = "@" + username;
            document.getElementById('view-user-content').innerHTML = `
                <div class="profile-hero">
                    <img src="${user.pic}" class="profile-img">
                    <h2>@${user.user}</h2>
                    <div class="stats-container">
                        <div class="stat-box"><span class="stat-num">${user.followers.length}</span><span class="stat-label">Seguidores</span></div>
                        <div class="stat-box"><span class="stat-num">${user.following.length}</span><span class="stat-label">Seguindo</span></div>
                    </div>
                    <div style="display: flex; gap: 10px; padding: 0 20px;">
                        <button class="btn-premium" onclick="toggleFollow('${username}')" style="background: ${isFollowing ? '#222' : 'linear-gradient(45deg, #a855f7, #ec4899)'}">
                            ${isFollowing ? 'Seguindo' : 'Seguir'}
                        </button>
                        <button class="btn-premium" style="width: 60px; background: #1a1a1e;" onclick="showScreen('chat')"><i class="fas fa-envelope"></i></button>
                    </div>
                </div>
            `;
            const snap = await db.collection("posts").where("author", "==", username).get();
            const grid = document.getElementById('view-user-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                grid.innerHTML += `<div class="grid-item" onclick="openPostDetail('${d.id}')"><img src="${d.data().media}"></div>`;
            });
        }

        async function toggleFollow(targetUser) {
            const isFollowing = currentUser.following.includes(targetUser);
            const myRef = db.collection("usuarios").doc(currentUser.user);
            const targetRef = db.collection("usuarios").doc(targetUser);

            if(isFollowing) {
                await myRef.update({ following: firebase.firestore.FieldValue.arrayRemove(targetUser) });
                await targetRef.update({ followers: firebase.firestore.FieldValue.arrayRemove(currentUser.user) });
                currentUser.following = currentUser.following.filter(u => u !== targetUser);
            } else {
                await myRef.update({ following: firebase.firestore.FieldValue.arrayUnion(targetUser) });
                await targetRef.update({ followers: firebase.firestore.FieldValue.arrayUnion(currentUser.user) });
                currentUser.following.push(targetUser);
            }
            viewOtherUser(targetUser);
        }

        // --- POSTAGEM (MANTIDO) ---
        function openCreatePost() { document.getElementById('modal-post').style.display = 'flex'; }
        function closePostModal() { document.getElementById('modal-post').style.display = 'none'; }
        
        function previewMedia(input) {
            const reader = new FileReader();
            reader.onload = e => {
                postMediaBase64 = e.target.result;
                document.getElementById('preview-area').innerHTML = `<img src="${postMediaBase64}" style="width:100%; border-radius:15px;">`;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function submitPost() {
            if(!postMediaBase64) return;
            await db.collection("posts").add({
                author: currentUser.user,
                authorPic: currentUser.pic,
                caption: document.getElementById('post-caption').value,
                media: postMediaBase64,
                likes: 0,
                liked_by: [],
                time: Date.now()
            });
            closePostModal();
            postMediaBase64 = "";
            document.getElementById('preview-area').innerHTML = "";
            document.getElementById('post-caption').value = "";
        }
    </script>
</body>
</html>
